                ))}
              </div>
            ) : (
              <div style={{background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:6,padding:'7px 10px',marginBottom:8,fontSize:12}}>
                ⚠ No journey estimate. Tap Edit to enter one.
              </div>
            )}

            <div className="meta" style={{marginBottom:8}}>
              Journey: {jMins!=null ? '~'+jMins+' min ('+(state.overrides[e.id]?.journeySource==='auto'?'auto':'manual')+')' : 'unknown'} · Prep: {prep}m · Buffer: {pre}m
              {wxImpact?.extraMins>0 && <span style={{color:'var(--amber)'}}> +{wxImpact.extraMins}m weather</span>}
              {gapLabel==='comfortable'&&<span style={{color:'var(--accent)'}}> · Gap OK</span>}
            </div>
            {wxImpact?.extraMins>0 && (
              <div style={{background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:6,padding:'6px 10px',marginBottom:8,fontSize:11,color:'var(--amber)'}}>
                🌦 {wxImpact.reasons.join(' · ')} — leave {wxImpact.extraMins} min earlier.{wxImpact.prep.length?' '+wxImpact.prep.join('; ')+'.':''}
              </div>
            )}

            {/* Edit panel — simplified */}
            {isEditing && (
              <div style={{background:'var(--surface2)',borderRadius:6,padding:10,marginBottom:10}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
                  <div>
                    <div style={{fontSize:11,marginBottom:3}}>Journey time (min)</div>
                    <input className="input" type="number" min="0" placeholder="e.g. 45"
                      value={editVals.journeyMins??''} onChange={e2=>setEditVals(v=>({...v,journeyMins:e2.target.value===''?null:+e2.target.value}))}/>
                  </div>
                  <div>
                    <div style={{fontSize:11,marginBottom:3}}>Travel mode</div>
                    <select className="input" value={editVals.mode||mode} onChange={e2=>setEditVals(v=>({...v,mode:e2.target.value}))}>
                      {Object.entries(TRAVEL_MODE_LABEL).map(([vv,ll])=><option key={vv} value={vv}>{ll}</option>)}
                    </select>
                  </div>
                </div>
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:11,marginBottom:3}}>Trip preset</div>
                  <select className="input" value={editVals.presetId||''} onChange={e2=>setEditVals(v=>({...v,presetId:e2.target.value}))}>
                    <option value="">Default settings</option>
                    {presets.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                  </select>
                  {(() => { const cp = editVals.presetId ? presets.find(p=>p.id===editVals.presetId) : null; return cp?.prep_item_ids?.length > 0 ? <div style={{fontSize:10,color:'var(--accent)',marginTop:2}}>↺ {cp.prep_item_ids.length} prep items will populate checklist on save</div> : null; })()}
                </div>
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:11,marginBottom:3}}>Start from <span style={{color:'var(--muted)'}}>— leave blank to auto-detect from calendar</span></div>
                  <input className="input" placeholder={'Auto: ' + startLoc.name}
                    value={editVals.startLocationCustom?.address||''}
                    onChange={e2=>setEditVals(v=>({...v,startLocationCustom:e2.target.value?{name:e2.target.value,address:e2.target.value}:null}))}/>
                  {(startLoc.source==='previous_event'||startLoc.source==='previous_event_uncertain') && (
                    <div className="row" style={{gap:6,marginTop:6,flexWrap:'wrap'}}>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setEditVals(v=>({...v,startLocationCustom:{name:startLoc.name,address:startLoc.address}}))}>✓ Use {startLoc.name}</button>
                      <button className="btn btn-ghost btn-sm" onClick={()=>setEditVals(v=>({...v,startLocationCustom:{name:(ts||DEFAULT_TRAVEL_SETTINGS).default_start_name||'Home',address:(ts||DEFAULT_TRAVEL_SETTINGS).default_start_address||''}}))}>🏠 Force Home</button>
                    </div>
                  )}
                </div>
                <div className="row" style={{gap:6}}>
                  <button className="btn btn-primary btn-sm" onClick={()=>saveOverride(e.id, e)}>Save</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>{setEditId(null);setEditVals({});}}>Cancel</button>
                </div>
              </div>
            )}

            {isProposing && pendingBlock && (
              <div style={{background:'rgba(79,124,255,0.06)',border:'1px solid rgba(79,124,255,0.2)',borderRadius:6,padding:10,marginBottom:10,fontSize:12}}>
                <div style={{fontWeight:600,marginBottom:4}}>Create block: "{pendingBlock.title}"</div>
                <div className="meta">{pendingBlock.date} {pendingBlock.start_time}–{pendingBlock.end_time} · In Lovejoy OS calendar only</div>
                <div className="row" style={{gap:6,marginTop:8}}>
                  <button className="btn btn-primary btn-sm" disabled={submitting} onClick={approvePendingBlock}>
                    {submitting ? 'Creating…' : 'Approve'}
                  </button>
                  <button className="btn btn-ghost btn-sm" disabled={submitting} onClick={()=>{setProposing(null);setPendingBlock(null);}}>Cancel</button>
                </div>
              </div>
            )}

            {/* Action buttons */}
            <div className="row" style={{gap:6,flexWrap:'wrap'}}>
              {e.location && <a href={nav.google} target="_blank" rel="noopener" className="btn btn-ghost btn-sm">🗺 Maps</a>}
              {e.location && <a href={nav.waze}   target="_blank" rel="noopener" className="btn btn-ghost btn-sm">Waze</a>}
              <button className="btn btn-ghost btn-sm" onClick={()=>{setEditId(isEditing?null:e.id);setEditVals(state.overrides[e.id]||{});}}>
                {isEditing?'Cancel edit':'Edit'}
              </button>
              {e.location && (sg.startLoc?.address || sg.startLoc?.name) && (
                <button className="btn btn-ghost btn-sm" disabled={etaBusy===e.id}
                  onClick={()=>autoEstimate(e, sg)}
                  title="Estimate journey time from your start location (Google Routes)">
                  {etaBusy===e.id ? 'Estimating…' : '⚡ Auto-estimate'}
                </button>
              )}
              {state.createdBlocks?.[e.id] ? (
                <span style={{fontSize:11,padding:'4px 8px',color:'var(--accent)',border:'1px solid var(--accent)',borderRadius:4}}>✓ Block added</span>
              ) : !isProposing ? (
                <button className="btn btn-ghost btn-sm" onClick={()=>proposeBlock(e, sg, cfg)}>+ Travel block</button>
              ) : null}
              <button className="btn btn-ghost btn-sm" style={{color:'var(--muted)'}} onClick={()=>dismiss(e.id)}>Dismiss</button>
            </div>

            {/* Prep checklist */}
            <PrepChecklist
              eventId={e.id}
              presetPrepItemIds={pr?.prep_item_ids||[]}
              allPrepItems={prepItems}
              onSync={userId ? (cl)=>syncChecklistDB(userId, e.id, cl) : null}
            />
          </div>
        );
      })}

      <div style={{marginTop:16,paddingTop:12,borderTop:'1px solid var(--border)'}}>
        <div className="meta">Navigation links use Google Maps and Waze. No API key required. Live traffic not yet included.</div>
        <div className="meta" style={{marginTop:6,color:'var(--amber)'}}>
          If you have duplicate travel blocks from a previous session, open Google Calendar → find the duplicates in your Lovejoy OS calendar → delete the extras manually.
        </div>
        <div style={{marginTop:10,display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-primary btn-sm" style={{fontSize:11}} onClick={async ()=>{
            if (!userId) { alert('Not signed in'); return; }
            const s = loadTravelState();
            const ovEntries = Object.entries(s.overrides||{});
            const dismissed = s.dismissed||[];
            if (ovEntries.length===0 && dismissed.length===0) { alert('No local overrides to push.'); return; }
            if (!window.confirm('Push all ' + (ovEntries.length + dismissed.length) + ' local overrides to Supabase? This will make them available on all devices.')) return;
            let ok=0, fail=0;
            // Push overrides
            for (const [evId, ov] of ovEntries) {
              const ev = events.find(e=>e.id===evId)||{};
              try {
                await supabase.from('travel_event_overrides').delete().eq('user_id',userId).eq('source_event_id',evId);
                await supabase.from('travel_event_overrides').insert({
                  user_id:userId, source_event_id:evId,
                  source_event_start:ev.start||null, source_event_title:ev.title||null,
                  source_event_location:ev.location||null,
                  journey_time_minutes:ov.journeyMins>0?ov.journeyMins:null,
                  travel_mode:ov.mode||null, preset_id:ov.presetId||null,
                  custom_start_location:ov.startLocationCustom||null,
                  dismissed:false, updated_at:new Date().toISOString(),
                });
                ok++;
              } catch(e){ fail++; }
            }
            // Push dismissed
            for (const evId of dismissed) {
              const ev = events.find(e=>e.id===evId)||{};
              try {
                await supabase.from('travel_event_overrides').delete().eq('user_id',userId).eq('source_event_id',evId);
                await supabase.from('travel_event_overrides').insert({
                  user_id:userId, source_event_id:evId,
                  source_event_start:ev.start||null, source_event_title:ev.title||null,
                  source_event_location:ev.location||null, dismissed:true,
                  updated_at:new Date().toISOString(),
                });
                ok++;
              } catch(e){ fail++; }
            }
            alert('Pushed ' + ok + ' overrides to Supabase.' + (fail>0?' '+fail+' failed — check console.':'') + '\nOther devices will see these on next ↻ Sync.');
          }}>⬆ Push all to DB</button>
          <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={()=>{
            if (!window.confirm('Clear all journey overrides? This removes saved journey times, modes, presets and profiles for all events. Checklists and dismissed events are kept.')) return;
            const s = loadTravelState();
            s.overrides = {};
            saveTravelState(s);
            setEvents(ev=>[...ev]);
          }}>Clear all overrides</button>
          <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={()=>{
            if (!window.confirm('Clear dismissed events? All previously dismissed events will reappear.')) return;
            const s = loadTravelState();
            s.dismissed = [];
            saveTravelState(s);
            setEvents(ev=>[...ev]);
          }}>Restore dismissed</button>
        </div>
      </div>
    </div>
  );
}

// ── SOURCE SUMMARY ────────────────────────────────────────────
// Renders what data Helm used when generating a brief.
// compact=true → single line for dashboard card
// compact=false → expandable table for detail/history view
function SourceSummary({ snap, compact }) {
  if (!snap) return null;
  const c = snap.counts || {};
  const wx = snap.weather;
  const wxAge = wx?.age_minutes;
  const wxFresh = wx && !wx.is_stale;
  const parts = [];
  if (c.tasks    != null) parts.push(`${c.tasks} tasks`);
  if (c.projects != null) parts.push(`${c.projects} projects`);
  if (c.events   != null) parts.push(`${c.events} events`);
  if (c.waiting  != null && c.waiting > 0) parts.push(`${c.waiting} waiting`);
  if (c.decisions!= null && c.decisions > 0) parts.push(`${c.decisions} decisions`);

  if (compact) {
    const wxTag = wx
      ? (wx.is_stale ? <span style={{color:'var(--amber)'}}>⚠ Weather stale</span> : <span>Weather ✓</span>)
      : <span style={{color:'var(--muted)'}}>No weather</span>;
    const h = snap.health;
    const hTag = h?.included
      ? <span>Health: {(h.readiness||'?').toUpperCase()}{h.confidence?' ('+h.confidence+')':''}</span>
      : null;
    return (
      <div style={{fontSize:10,color:'var(--muted)',marginTop:5,lineHeight:1.5}}>
        Sources: {parts.join(' · ')}{wx !== undefined ? <> · {wxTag}</> : null}{hTag ? <> · {hTag}</> : null}
      </div>
    );
  }

  // Expanded table
  const rows = [
    {name:'Tasks',       val: c.tasks    != null ? `${c.tasks} active`  : '–'},
    {name:'Projects',    val: c.projects != null ? `${c.projects} active`: '–'},
    {name:'Calendar',    val: c.events   != null ? `${c.events} events`  : 'Not fetched'},
    {name:'Waiting For', val: c.waiting  != null ? `${c.waiting} items`  : '–'},
    {name:'Decisions',   val: c.decisions!= null ? `${c.decisions} open` : '–'},
  ];
  const wxVal  = wx ? `${wx.condition || ''} · ${wxAge != null ? wxAge+'m ago' : '?'}` : 'Not included';
  const wxColour = !wx ? 'var(--muted)' : wx.is_stale ? 'var(--amber)' : 'var(--text)';

  return (
    <div style={{marginTop:8,padding:'8px 10px',background:'var(--surface2)',borderRadius:6}}>
      <div style={{fontSize:10,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:5}}>Sources used</div>
      {rows.map(r=>(
        <div key={r.name} className="row-between" style={{fontSize:11,marginBottom:2}}>
          <span style={{color:'var(--muted)'}}>{r.name}</span>
          <span style={{color:'var(--text)'}}>{r.val}</span>
        </div>
      ))}
      <div className="row-between" style={{fontSize:11,marginBottom:2}}>
        <span style={{color:'var(--muted)'}}>Weather</span>
        <span style={{color:wxColour}}>{wxVal}</span>
      </div>
      {snap.travel && (
        <div className="row-between" style={{fontSize:11,marginBottom:2}}>
          <span style={{color:'var(--muted)'}}>Travel Buffer</span>
          <span style={{color: snap.travel.included ? (snap.travel.unknown_journey_count>0?'var(--amber)':'var(--text)') : 'var(--muted)'}}>
            {snap.travel.included
              ? snap.travel.suggestion_count + ' events' + (snap.travel.unknown_journey_count>0 ? ' · ' + snap.travel.unknown_journey_count + ' unknown journey' : '')
              : 'Not included'}
          </span>
        </div>
      )}
      {snap.health && (
        <div className="row-between" style={{fontSize:11,marginBottom:2}}>
          <span style={{color:'var(--muted)'}}>Health & Recovery</span>
          <span style={{color: snap.health.included ? (snap.health.data_quality==='good'?'var(--text)':'var(--amber)') : 'var(--muted)'}}>
            {snap.health.included
              ? (snap.health.readiness||'?').toUpperCase() + ' · ' + (snap.health.data_quality||'?') + (snap.health.recovery_is_today===false ? ' · '+(snap.health.recovery_date||'old') : '')
              : 'Not included'}
          </span>
        </div>
      )}
      {snap.task_context && (
        <div className="row-between" style={{fontSize:11,marginBottom:2}}>
          <span style={{color:'var(--muted)'}}>Tasks &amp; Focus</span>
          <span style={{color:'var(--text)'}}>
            {(snap.counts?.tasks||0)+' loaded'}
            {snap.task_context.focus_queue_requested ? ' · focus queue' : ''}
            {snap.counts?.stale_tasks ? ' · '+snap.counts.stale_tasks+' stale' : ''}
            {snap.task_context.friction_included ? ' · friction✓' : ''}
            {snap.task_context.feedback_memory_included ? ' · memory✓' : ''}
          </span>
        </div>
      )}
      {snap.generated_at && (
        <div style={{fontSize:10,color:'var(--muted)',marginTop:4}}>
          Snapshot at {new Date(snap.generated_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
        </div>
      )}
    </div>
  );
}

function HelmPage() {
  const [loading, setLoading] = useState(false);
  const [activeType, setActiveType] = useState(null);
  const [result, setResult] = useState(null);
  const [decisions, setDecisions] = useState([]);
  const [pickDecision, setPickDecision] = useState(false);
  const [history, setHistory] = useState(null);   // null=not loaded, []=loaded
  const [showHistory, setShowHistory] = useState(false);
  const [expandedHistory, setExpandedHistory] = useState(new Set());

  useEffect(()=>{
    supabase.from('decisions').select('id,name').eq('status','open').then(({data})=>setDecisions(data||[]));
  },[]);

  const loadHistory = async () => {
    const { data } = await supabase.from('reviews')
      .select('id,title,review_type,notes,prompt_used,model_used,token_usage,estimated_cost,created_at,source_snapshot')
      .order('created_at', { ascending: false })
      .limit(40);
    setHistory(data || []);
  };

  const toggleHistory = () => {
    const next = !showHistory;
    setShowHistory(next);
    if (next && history === null) loadHistory();
  };

  const toggleHistoryItem = (id) => {
    setExpandedHistory(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  // Group history by local date then sort newest first
  const groupedHistory = (() => {
    if (!history) return [];
    const groups = {};
    const todayKey = localDateKey();
    const yesterdayKey = localDateKey(new Date(Date.now() - 86400_000));
    history.forEach(h => {
      const dk = localDateKey(new Date(h.created_at));
      const label = dk === todayKey ? 'Today' : dk === yesterdayKey ? 'Yesterday' :
        new Date(h.created_at).toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
      if (!groups[dk]) groups[dk] = { label, dk, items:[] };
      groups[dk].items.push(h);
    });
    return Object.values(groups).sort((a:any,b:any) => b.dk.localeCompare(a.dk));
  })();

  const run = async (type, extra={}) => {
    setActiveType(type); setLoading(true); setResult(null); setPickDecision(false);
    // Actions that benefit from health context (week planning, weekly review)
    let healthContext = extra.healthContext;
    if (healthContext === undefined && (type==='plan_my_week' || type==='weekly_review' || type==='plan_my_day')) {
      healthContext = await buildHealthContext(null);
    }
    const r = await callHelm(type, { ...extra, healthContext });
    setResult(r); setLoading(false);
  };

  const actions = [
    { id:'plan_my_day',           label:'Plan My Day',          icon:'⚡', desc:'What to do today, around your calendar', accent:'#4f7cff', tint:'rgba(79,124,255,0.12)' },
    { id:'weekly_review',         label:'Weekly Review',         icon:'📋', desc:'Step back: what is slipping, what needs deciding', accent:'#7c5cfc', tint:'rgba(124,92,252,0.12)' },
    { id:'pressure_test_decision',label:'Pressure Test',         icon:'🤔', desc:'Sharpen your thinking on an open decision', accent:'#f59e0b', tint:'rgba(245,158,11,0.12)' },
    { id:'tidy_my_system',        label:'Tidy My System',        icon:'🧹', desc:'Find stale projects and clutter to clear', accent:'#22c55e', tint:'rgba(34,197,94,0.12)' },
  ];

  return (
    <div className="page">
      <div className="hero" style={{background:'linear-gradient(135deg, rgba(79,124,255,0.20), rgba(124,92,252,0.14) 55%, rgba(34,197,94,0.05))'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,position:'relative'}}>
          <div style={{fontSize:30}}>🧭</div>
          <div>
            <div className="hero-name" style={{fontSize:22}}>{ASSISTANT_NAME}</div>
            <div className="hero-greet" style={{marginTop:1}}>Your calm steering system</div>
          </div>
        </div>
      </div>

      <div className="section-title" style={{marginTop:0}}>Ask {ASSISTANT_NAME}</div>

      {/* Action tiles */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:18}}>
        {actions.map(a=>{
          const isActive = activeType===a.id;
          return (
            <button key={a.id}
              style={{cursor:'pointer',textAlign:'left',padding:'14px',borderRadius:14,position:'relative',overflow:'hidden',
                      border:'1px solid '+(isActive?a.accent:'var(--border)'),
                      background:isActive?a.tint:'var(--surface)',
                      transition:'transform .12s, border-color .12s',opacity:loading&&!isActive?0.5:1}}
              onMouseDown={e=>e.currentTarget.style.transform='scale(0.97)'}
              onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}
              onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}
              onClick={()=>{
                if (a.id==='pressure_test_decision') { setActiveType(a.id); setPickDecision(true); setResult(null); }
                else run(a.id);
              }}
              disabled={loading}>
              <div style={{width:42,height:42,borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,marginBottom:10,background:a.tint,border:'1px solid '+a.accent+'44'}}>{a.icon}</div>
              <div style={{fontSize:14,fontWeight:700,marginBottom:3}}>{a.label}</div>
              <div className="meta" style={{fontSize:11,lineHeight:1.4}}>{a.desc}</div>
            </button>
          );
        })}
      </div>

      {/* Helm History toggle */}
      <button className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'center',marginBottom:16}} onClick={toggleHistory}>
        {showHistory ? 'Hide history' : `${ASSISTANT_NAME} History`}
      </button>

      {showHistory && (
        <div style={{marginBottom:16}}>
          {history === null && <div className="meta" style={{padding:'8px 0'}}>Loading…</div>}
          {history?.length === 0 && <div className="meta" style={{padding:'8px 0'}}>No briefs yet. Run one above.</div>}

          {groupedHistory.map((group:any) => (
            <div key={group.dk}>
              <div className="section-title" style={{marginTop:8}}>{group.label}</div>
              {group.items.map((h:any) => {
                const isOpen = expandedHistory.has(h.id);
                let parsed = null;
                try { if (h.prompt_used) parsed = JSON.parse(h.prompt_used); } catch(_){}
                const typeColour = {
                  'Plan My Day':'var(--accent)', 'Weekly Review':'var(--accent2)',
                  'Pressure Test Decision':'var(--amber)', 'Tidy My System':'var(--green)',
                }[h.title] || 'var(--muted)';
                const stale = isBriefStale(h);
                return (
                  <div key={h.id} className="card-sm" style={{background:'var(--surface2)',cursor:'pointer',marginBottom:6}} onClick={()=>toggleHistoryItem(h.id)}>
                    <div className="row-between">
                      <div className="row" style={{gap:6,flex:1,minWidth:0}}>
                        <span style={{fontSize:10,fontWeight:600,color:typeColour,flexShrink:0}}>{h.title}</span>
                        {stale && <span style={{fontSize:10,color:'var(--amber)'}}>· {fmtBriefAge(h)}</span>}
                      </div>
                      <div className="row" style={{gap:6,flexShrink:0}}>
                        <span className="meta">{fmtTime(h.created_at)}</span>
                        <span style={{color:'var(--muted)',fontSize:11}}>{isOpen?'▲':'▼'}</span>
                      </div>
                    </div>

// ── CALENDAR PAGE (Phases 1, 2, 3) ────────────────────────────
function CalendarPage() {
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('today'); // today | week | gaps
  const [tasks, setTasks] = useState([]);

  const load = async () => {
    setLoading(true);
    const [r, t] = await Promise.all([
      fetchCalendarEvents(7),
      supabase.from('tasks').select('*').eq('is_next_action', true).neq('status','done').neq('status','cancelled'),
    ]);
    setResult(r);
    setTasks(t.data || []);
    setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  if (loading) return <div className="page"><div className="spinner"/></div>;

  // Not connected / error states
  if (result?.error === 'no_google_connection' || result?.error === 'token_refresh_failed') {
    return (
      <div className="page">
        <h1 style={{fontSize:20,fontWeight:700,marginBottom:8}}>Calendar</h1>
        <div className="card" style={{textAlign:'center',padding:'28px 16px'}}>
          <div style={{fontSize:32,marginBottom:10}}>📅</div>
          <div className="name" style={{marginBottom:6}}>Calendar not connected</div>
          <div className="meta" style={{marginBottom:16}}>Connect your Google Calendar to see today's events, your week ahead, and free gaps for scheduling.</div>
          <button className="btn btn-primary" style={{justifyContent:'center'}} onClick={connectGoogleCalendar}>Connect Google Calendar</button>
        </div>
      </div>
    );
  }

  if (result?.error) {
    return (
      <div className="page">
        <h1 style={{fontSize:20,fontWeight:700,marginBottom:8}}>Calendar</h1>
        <div className="card">
          <div className="name" style={{marginBottom:6}}>Couldn't load calendar</div>
          <div className="meta" style={{marginBottom:12}}>{result.message || result.detail || 'Something went wrong fetching your events.'}</div>
          <button className="btn btn-ghost btn-sm" onClick={load}>Try again</button>
        </div>
      </div>
    );
  }

  const events = result?.events || [];
  const byDay = groupEventsByDay(events);
  const todayKey = localDateKey();
  const todayEvents = (byDay[todayKey] || []).sort((a,b)=> (a.start||'').localeCompare(b.start||''));

  // Build 7-day ordered list of day keys (local time)
  const dayKeys = [];
  for (let i=0;i<7;i++){ const d=new Date(); d.setDate(d.getDate()+i); dayKeys.push(localDateKey(d)); }

  return (
    <div className="page">
      <div className="row-between" style={{marginBottom:12}}>
        <h1 style={{fontSize:20,fontWeight:700}}>Calendar</h1>
        <button className="btn btn-ghost btn-sm btn-icon" onClick={load} title="Refresh">↻</button>
      </div>

      <div style={{display:'flex',gap:6,marginBottom:16}}>
        <button className={`qc-type-btn ${view==='today'?'active':''}`} onClick={()=>setView('today')}>Today</button>
        <button className={`qc-type-btn ${view==='week'?'active':''}`} onClick={()=>setView('week')}>Next 7 days</button>
        <button className={`qc-type-btn ${view==='gaps'?'active':''}`} onClick={()=>setView('gaps')}>Free time</button>
      </div>

      {/* ── TODAY (Phase 1) ── */}
      {view==='today' && (
        <>
          {todayEvents.length===0 && <div className="empty"><div className="empty-icon">☀️</div>Nothing scheduled today</div>}
          {todayEvents.map(e=>(
            <div key={e.id} className="card-sm" style={{borderLeft:`3px solid ${e.colour||'var(--accent)'}`}}>
              <div className="row-between">
                <div style={{flex:1,minWidth:0}}>
                  <div className="name" style={{fontSize:13}}>{e.title}</div>
                  <div className="meta">
                    {e.allDay ? 'All day' : `${fmtTime(e.start)} – ${fmtTime(e.end)}`}
                    {e.location ? ` · 📍 ${e.location}` : ''}
                  </div>
                  {e.hangoutLink && <div className="meta" style={{color:'var(--accent)'}}>Video call</div>}
                </div>
              </div>
            </div>
          ))}
        </>
      )}

      {/* ── NEXT 7 DAYS (Phase 2) ── */}
      {view==='week' && dayKeys.map(key=>{
        const dayEvents = (byDay[key]||[]).sort((a,b)=>(a.start||'').localeCompare(b.start||''));
        const cls = classifyDay(dayEvents);
        return (
          <div key={key} style={{marginBottom:14}}>
            <div className="row-between" style={{marginBottom:6}}>
              <div className="section-title" style={{margin:0}}>{fmtDayLabel(key)}</div>
              <span className={`pill pill-${cls.tone==='green'?'green':cls.tone==='red'?'red':cls.tone==='amber'?'amber':'blue'}`}>{cls.label}</span>
            </div>
            {dayEvents.length===0 && <div className="card-sm" style={{opacity:0.6}}><div className="meta">No events</div></div>}
            {dayEvents.map(e=>(
              <div key={e.id} className="card-sm" style={{borderLeft:`3px solid ${e.colour||'var(--border)'}`}}>
                <div className="name" style={{fontSize:13}}>{e.title}</div>
                <div className="meta">{e.allDay?'All day':`${fmtTime(e.start)} – ${fmtTime(e.end)}`}{e.location?` · 📍 ${e.location}`:''}</div>
              </div>
            ))}
          </div>
        );
      })}

      {/* ── FREE TIME / GAPS (Phase 3) ── */}
      {view==='gaps' && (
        <>
          <div className="meta" style={{marginBottom:12}}>Free blocks in your day (8am–10pm) where you could schedule focused work. Pulls from your open next actions.</div>
          {dayKeys.map(key=>{
            const dayEvents = byDay[key]||[];
            const gaps = findGaps(dayEvents, key);
            if (gaps.length===0) return null;
            const nextActions = (tasks||[]).filter(t=>t.is_next_action).slice(0,3);
            return (
              <div key={key} style={{marginBottom:16}}>
                <div className="section-title">{fmtDayLabel(key)}</div>
                {gaps.map((g,i)=>{
                  const hrs = Math.floor(g.mins/60), mins = Math.round(g.mins%60);
                  const dur = `${hrs>0?`${hrs}h `:''}${mins>0?`${mins}m`:''}`.trim();
                  const suggestion = nextActions[i % Math.max(nextActions.length,1)];
                  return (
                    <div key={i} className="card-sm" style={{borderLeft:'3px solid var(--green)'}}>
                      <div className="row-between">
                        <div style={{flex:1}}>
                          <div className="name" style={{fontSize:13}}>{fmtTime(g.start)} – {fmtTime(g.end)} · {dur} free</div>
                          {suggestion
                            ? <div className="meta">Could tackle: <span style={{color:'var(--text)'}}>{suggestion.name}</span></div>
                            : <div className="meta">No next actions flagged to suggest</div>}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
          {dayKeys.every(key=>findGaps(byDay[key]||[], key).length===0) && (
            <div className="empty"><div className="empty-icon">🗓️</div>No sizeable free gaps in the next 7 days</div>
          )}
        </>
      )}
    </div>
  );
}

// ── ATTENTION ENGINE ──────────────────────────────────────────
// Pure function: takes system data, returns a ranked list of
// items that need attention, most urgent first.
const DECISION_STALE_DAYS = 7;          // configurable threshold
const CHASE_AFTER_DAYS = 0;             // waiting-for is chase-worthy once due
const DEADLINE_HORIZON_DAYS = 14;       // upcoming deadline window

function buildAttention(data) {
  const items = [];
  const today = data.today;

  // Horizons that the system actively manages. Maintenance/someday
  // projects are deliberately left alone — they should never nag.
  const activeHorizons = ['critical','active'];

  // 1. Overdue tasks — highest severity
  data.tasks.filter(t=>isOverdue(t.due_date)).forEach(t=>{
    const days = Math.abs(daysUntil(t.due_date));
    items.push({
      id:'task-'+t.id, kind:'Overdue task', name:t.name,
      detail:`Was due ${fmtDate(t.due_date)} · ${days} day${days!==1?'s':''} ago`,
      severity: 100 + days + (t.priority==='high'?20:t.priority==='medium'?10:0),
      colour:'var(--red)', goto:'tasks',
    });
  });

  // 2. Waiting For due for chase
  data.waiting.filter(w=>w.due_date && daysUntil(w.due_date) <= CHASE_AFTER_DAYS && !w.chased_at).forEach(w=>{
    const overdueChase = isOverdue(w.due_date);
    items.push({
      id:'wait-'+w.id, kind:'Chase needed', name:w.name,
      detail:`${w.waiting_on?`Waiting on ${w.waiting_on} · `:''}${overdueChase?'Past expected date':'Due today'}`,
      severity: 80 + (overdueChase?Math.abs(daysUntil(w.due_date)):0),
      colour:'var(--accent2)', goto:'tasks',
    });
  });

  // 3. Upcoming deadlines (tasks + projects + asset dates within window)
  data.tasks.filter(t=>{ const n=daysUntil(t.due_date); return n!==null && n>=0 && n<=DEADLINE_HORIZON_DAYS; }).forEach(t=>{
    const n = daysUntil(t.due_date);
    items.push({
      id:'due-'+t.id, kind:'Upcoming deadline', name:t.name,
      detail:`Due ${n===0?'today':n===1?'tomorrow':`in ${n} days`} · ${fmtDate(t.due_date)}`,
      severity: 60 - n + (t.priority==='high'?15:0),
      colour:'var(--amber)', goto:'tasks',
    });
  });
  data.assets.forEach(a=>{
    const checks = [
      {date:a.expires_at, label:'Renews'}, {date:a.mot_due_at, label:'MOT due'},
      {date:a.next_service_at, label:'Service due'}, {date:a.warranty_until, label:'Warranty ends'},
    ];
    checks.forEach(c=>{
      const n = daysUntil(c.date);
      if (c.date && (isOverdue(c.date) || (n>=0 && n<=DEADLINE_HORIZON_DAYS*2))) {
        items.push({
          id:`asset-${a.id}-${c.label}`, kind:'Asset date', name:a.name,
          detail:`${c.label} ${isOverdue(c.date)?`overdue (${fmtDate(c.date)})`:fmtDate(c.date)}`,
          severity: isOverdue(c.date) ? 85+Math.abs(n) : 55-Math.floor(n/2),
          colour: isOverdue(c.date)?'var(--red)':'var(--amber)', goto:'decisions',
        });
      }
    });
  });

  // 4. Critical/Active projects with no next action
  data.projects
    .filter(p=>activeHorizons.includes(p.horizon||'active'))
    .filter(p=>!data.tasks.some(t=>t.project_id===p.id && t.is_next_action))
    .forEach(p=>{
      items.push({
        id:'proj-'+p.id, kind:'No next action', name:p.name,
        detail:`${p.horizon==='critical'?'Critical':'Active'} project with nothing teed up`,
        severity: (p.horizon==='critical'?70:45),
        colour:'var(--amber)', goto:'projects',
      });
    });

  // 5. Open decisions older than threshold
  data.decisions.forEach(d=>{
    const age = Math.floor((new Date(today) - new Date(d.created_at)) / 86400000);
    if (age >= DECISION_STALE_DAYS) {
      items.push({
        id:'dec-'+d.id, kind:'Stale decision', name:d.name,
        detail:`Open for ${age} days · needs deciding`,
        severity: 50 + Math.min(age, 30),
        colour:'var(--accent)', goto:'decisions',
      });
    }
  });

  return items.sort((a,b)=>b.severity-a.severity);
}

// ── WEATHER CARD ──────────────────────────────────────────────
function WeatherCard({ wx, ws, location, onRefresh, fetching }) {
  if (!ws?.show_weather_card) return null;

  const RISK_CFG = {
    low:     {label:'Low',     bg:'rgba(34,197,94,0.12)',  colour:'var(--green)'},
    watch:   {label:'Watch',   bg:'rgba(245,158,11,0.12)', colour:'var(--amber)'},
    caution: {label:'Caution', bg:'rgba(245,158,11,0.12)', colour:'var(--amber)'},
    avoid:   {label:'Avoid',   bg:'rgba(239,68,68,0.12)',  colour:'var(--red)'},
    unknown: {label:'—',       bg:'var(--surface2)',        colour:'var(--muted)'},
  };

  const locName = location?.name || 'Your location';

    <div className="card" style={{marginBottom:14,minHeight:60,display:'flex',alignItems:'center'}}>

      <div className="row-between" style={{marginBottom:6}}>

  // Sunrise/sunset: Edge Function returns pre-formatted "HH:MM" (London time, BST-correct)

  const headlineLabel = wx.condition_label || wmoLabel(wx.daily_code || wx.weather_code);
  const currentLabel  = (wx.current_label && wx.current_label !== wx.condition_label) ? wx.current_label : null;

      <div className="row-between" style={{marginBottom:8}}>

          <div className="meta">{fmtTemp(wx.temp_min)} – {fmtTemp(wx.temp_max)} today</div>
        </div>
      </div>

      {/* Key stats */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,marginBottom:8}}>
        {wx.wind!=null && <div className="card-sm" style={{background:'var(--surface2)',textAlign:'center',padding:'6px 4px'}}>
          <div style={{fontSize:13,fontWeight:600}}>{Math.round(wx.wind)} {unit}</div>

        </div>}
        {wx.gusts!=null && <div className="card-sm" style={{background:'var(--surface2)',textAlign:'center',padding:'6px 4px'}}>
          <div style={{fontSize:13,fontWeight:600}}>{Math.round(wx.gusts)} {unit}</div>
          <div style={{fontSize:10,color:'var(--muted)'}}>Gusts now</div>
        </div>}
        <div className="card-sm" style={{background:'var(--surface2)',textAlign:'center',padding:'6px 4px'}}>
          <div style={{fontSize:13,fontWeight:600}}>{rainProbMax}%</div>
          <div style={{fontSize:10,color:'var(--muted)'}}>Rain max today</div>
        </div>
      </div>

      {/* Extra detail (non-compact) */}
      {!isCompact && (
        <div className="row" style={{gap:14,flexWrap:'wrap',marginBottom:risk.triggers.length>0?8:0}}>
          {ws.show_uv&&wx.uv_max!=null && <span className="meta">UV {Math.round(wx.uv_max)}</span>}
          {ws.show_pollen&&wx.grass_pollen!=null && <span className="meta">🌿 {Math.round(wx.grass_pollen)} µg/m³</span>}
          {sunriseT && <span className="meta">↑ {sunriseT}</span>}
          {sunsetT  && <span className="meta">↓ {sunsetT}</span>}
        </div>
      )}

      {/* Risk trigger pills */}
      {risk.triggers.length>0 && (
        <div className="row" style={{gap:5,flexWrap:'wrap',marginBottom:interp?8:0}}>
          {risk.triggers.map((t,i)=>{
            const col = t.level==='avoid'?'var(--red)':t.level==='caution'?'var(--amber)':'var(--muted)';
            const bg  = t.level==='avoid'?'rgba(239,68,68,0.08)':t.level==='caution'?'rgba(245,158,11,0.08)':'var(--surface2)';
            return <span key={i} style={{fontSize:10,color:col,background:bg,padding:'2px 7px',borderRadius:4}}>
              {t.reason}{t.value!=null?' '+Math.round(t.value)+(t.unit?' '+t.unit:''):''}
            </span>;
          })}
        </div>
      )}

      {/* Interpretation */}
      {interp && (
        <div style={{fontSize:12,color:'var(--muted)',lineHeight:1.55,paddingTop:8,borderTop:'1px solid var(--border)',marginBottom:watersports&&['caution','avoid'].includes(risk.overall)?6:0}}>
          {interp.split('\n').map((l,i)=><div key={i} style={{marginBottom:i<interp.split('\n').length-1?4:0}}>{l}</div>)}
        </div>
      )}

      {/* Watersports disclaimer */}
      {watersports && ['caution','avoid'].includes(risk.overall) && (
        <div style={{fontSize:10,color:'var(--muted)',fontStyle:'italic',paddingTop:5,borderTop:'1px solid var(--border)'}}>
          For water activity: refer to official forecasts, site procedures and dynamic risk assessment.
        </div>
      )}

      {/* Last updated */}
      {ws.show_last_updated && wx.fetched_at && (
        <div className="meta" style={{marginTop:6,fontSize:10}}>
          {fetching ? <span style={{color:'var(--amber)'}}>Updating…</span> : `Updated ${relTime(wx.fetched_at)}`}
        </div>
      )}
    </div>
  );
}

function DashboardPage({ user, onNavigate }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showAll, setShowAll] = useState(false);
  const [todayEvents, setTodayEvents] = useState([]);
  const [calState, setCalState] = useState(null);
  const [brief, setBrief] = useState(undefined);
  const [briefBusy, setBriefBusy] = useState(false);
  const [autoRunning, setAutoRunning] = useState(false);
  const [autoSyncing, setAutoSyncing] = useState(false);
  const [showBriefDetail, setShowBriefDetail] = useState(false);
  const [wx, setWx] = useState(null);           // weather data
  const [wxFetching, setWxFetching] = useState(false);
  const [heroReadiness, setHeroReadiness] = useState(null); // {label,colour} for hero strip

  const load = async () => {
    const today = localDateKey();
    const [tasks, waiting, decisions, projects, assets, wsRes, wlocRes] = await Promise.all([
      supabase.from('tasks').select('*').neq('status','done').neq('status','cancelled'),
      supabase.from('waiting_for').select('*').eq('status','open'),
      supabase.from('decisions').select('*').eq('status','open'),
      supabase.from('projects').select('*').eq('status','active'),
      supabase.from('assets').select('*').eq('status','active'),
      supabase.from('weather_settings').select('*').maybeSingle(),
      supabase.from('weather_locations').select('*').eq('is_active',true).order('sort_order').limit(6),
    ]);
    setData({ tasks:tasks.data||[], waiting:waiting.data||[], decisions:decisions.data||[], projects:projects.data||[], assets:assets.data||[], today });
    setLoading(false);

    // Resolve which location to use for weather
    const wsCfg = wsRes.data || DEFAULT_WEATHER_SETTINGS;
    const wlocs  = wlocRes.data || [];
    let wloc = wlocs.find(l=>l.id===wsCfg.dashboard_location_id) || wlocs.find(l=>l.is_default) || wlocs[0] || null;
    _wxSettings = wsCfg;
    _wxLocation = wloc;

    // Calendar — rolling next-24-hours window (non-blocking)
    fetchCalendarEvents(2).then(r=>{
      if (r && r.events) {
        const nowMs = Date.now();
        const horizonMs = nowMs + 24*60*60*1000;
        const upcoming = r.events.filter(e=>{
          if (!e.start) return false;
          if (e.allDay) {
            // Keep all-day events for today and tomorrow
            const todayKey = localDateKey();
            const tmrwKey = localDateKey(new Date(nowMs + 86400000));
            return e.start.startsWith(todayKey) || e.start.startsWith(tmrwKey);
          }
          const startMs = new Date(e.start).getTime();
          const endMs = e.end ? new Date(e.end).getTime() : startMs;
          // Include events that haven't ended yet and start within the next 24h
          return endMs >= nowMs && startMs <= horizonMs;
        }).sort((a,b)=>(a.start||'').localeCompare(b.start||''));
        setTodayEvents(upcoming);
      }
      setCalState(r?.error || 'ok');
    });

    // Today's Helm brief — read-only, with auto-morning-briefing
    fetchTodaysBrief().then(b=>{
      setBrief(b);
      // Auto-briefing: if no brief today, it's after 4am, and we haven't auto-run
      // for this morning yet, generate one automatically (once per morning).
      const now = new Date();
      const afterFourAM = now.getHours() >= 4;
      const mKey = morningKey();
      const alreadyAutoRan = getAutoBriefDate() === mKey;
      const autoBriefEnabled = (wsCfg.auto_morning_brief !== false); // default on
      if (!b && afterFourAM && !alreadyAutoRan && autoBriefEnabled) {
        setAutoBriefDate(mKey);          // mark immediately to prevent double-runs
        // Sync Withings FIRST so last night's sleep/HRV is present, THEN plan.
        // syncWithingsAndWait never throws; if it times out we still plan (Helm
        // will flag stale recovery data via recovery_is_today).
        setAutoSyncing(true);
        syncWithingsAndWait().then(()=>{
          setAutoSyncing(false);
          runPlanMyDay(true);
        });
      }
    });

    // Readiness for hero strip (non-blocking)
    (async ()=>{
      try {
        const {data:{user:u}} = await supabase.auth.getUser();
        if (!u) return;
        const snapRes = await supabase.from('health_daily_snapshots').select('*').eq('user_id',u.id).order('date',{ascending:false}).limit(1).maybeSingle();
        if (snapRes.data) { const r = calcReadiness(snapRes.data, null, null); setHeroReadiness(r); }
      } catch(e) {}
    })();

    // Weather — show snapshot instantly, background-refresh if stale
    if (wsCfg.show_weather_card && wloc) {
      // 1. Try module-level cache (survives navigation within session)
      let snap = (_wxCache.data && _wxCache.locId===wloc.id) ? _wxCache : null;

      // 2. Fall back to localStorage (survives page reload)
      if (!snap) {
        const stored = loadWxSnap();
        if (stored && stored.locId===wloc.id && stored.data && !stored.data.error) {
          snap = stored;
          _wxCache = { data:stored.data, locId:stored.locId, ts:stored.ts };
        }
      }

      // 3. Show snapshot immediately if available
      if (snap) setWx(snap.data);

      // 4. Decide whether to fetch
      const staleMs  = getStaleMs(wsCfg);
      const age      = Date.now() - (snap?.ts || 0);
      const isStale  = !snap || age > staleMs;
      const shouldFetch = wsCfg.refresh_on_open !== false && isStale;

      if (shouldFetch) {
        setWxFetching(true);
        fetchWeather(wloc.latitude, wloc.longitude, wsCfg, wloc.name).then(d => {
          if (!d.error) {
            _wxCache = { data:d, locId:wloc.id, ts:Date.now() };
            saveWxSnap(d, wloc.id);
            setWx(d);
          } else if (!snap) {
            setWx(d); // show error card only if nothing cached
          }
          // On failure with cached data: keep showing cache (silent fail)
          setWxFetching(false);
        });
      }
    }
  };
  useEffect(()=>{ load(); },[]);

  // Foreground refresh: fire when tab returns to foreground and data is stale
  useEffect(()=>{
    const handleFg = () => {
      if (document.visibilityState!=='visible') return;
      if (_wxSettings?.refresh_on_foreground===false || !_wxLocation) return;
      const age = Date.now()-(_wxCache.ts||0);
      if (age <= getStaleMs(_wxSettings)) return;
      setWxFetching(true);
      fetchWeather(_wxLocation.latitude, _wxLocation.longitude, _wxSettings, _wxLocation.name).then(d=>{
        if (!d.error) {
          _wxCache = { data:d, locId:_wxLocation.id, ts:Date.now() };
          saveWxSnap(d, _wxLocation.id);
          setWx(d);
        }
        setWxFetching(false);
      });
    };
    document.addEventListener('visibilitychange', handleFg);
    return ()=> document.removeEventListener('visibilitychange', handleFg);
  },[]);

  const refreshWeather = async () => {
    const wloc = _wxLocation;
    const wsCfg = _wxSettings || DEFAULT_WEATHER_SETTINGS;
    if (!wloc) return;
    setWxFetching(true);
    const d = await fetchWeather(wloc.latitude, wloc.longitude, wsCfg, wloc.name);
    _wxCache = { data:d, locId:wloc.id, ts:Date.now() };
    if (!d.error) saveWxSnap(d, wloc.id);
    setWx(d); setWxFetching(false);
    // Log to helm_logs for System Health tracking
    const {data:{user:u}} = await supabase.auth.getUser();
    if (u) supabase.from('helm_logs').insert({
      user_id:u.id, function_name:'weather', action:'fetch',
      status: d.error ? 'error' : 'success',
      meta:{ location: wloc.name, lat: wloc.latitude, lng: wloc.longitude },
      error_code: d.error ? 'weather_fetch_failed' : null,
      error_detail: d.error || null,
    }).then(()=>{}).catch(()=>{});
  };

  // Explicit Helm calls only — on button press
  const runPlanMyDay = async (auto=false) => {
    setBriefBusy(true);
    if (auto) setAutoRunning(true);
    // Build lightweight travel context for Helm (if travel enabled & include_in_helm)
    let travelContext = null;
    try {
      const {data:{user}} = await supabase.auth.getUser();
      const tsRes = await supabase.from('travel_settings').select('*').eq('user_id',user.id).maybeSingle();
      const prRes = await supabase.from('travel_presets').select('*').eq('user_id',user.id).eq('is_active',true).order('sort_order');
      const tsCfg = tsRes.data || DEFAULT_TRAVEL_SETTINGS;
      const allPresets = prRes.data || [];
      if (tsCfg.enabled && tsCfg.include_in_helm) {
        const cal = await fetchCalendarEvents(2);
        const tstate = loadTravelState();
        const evts = (cal?.events||[]).filter(e=>!e.allDay && e.start && e.location && !tstate.dismissed.includes(e.id));
        if (evts.length > 0) {
          const nowMs = Date.now();
          const suggestions = evts.slice(0,8).map(e=>{
            const ov = tstate.overrides[e.id]||{};
            const pr = ov.presetId ? allPresets.find(p=>p.id===ov.presetId) : allPresets[0] || null;
            const mode  = ov.mode || pr?.travel_mode || tsCfg.default_travel_mode;
            const jMins = (ov.journeyMins > 0 ? ov.journeyMins : null) ?? pr?.default_journey_mins ?? null;
            const prep  = pr?.prep_buffer_mins  ?? tsCfg.prep_buffer_mins;
            const pre   = pr?.pre_event_buffer_mins ?? tsCfg.pre_event_buffer_mins;
            const times = jMins!=null ? calcTravelTimes(e.start, jMins, pre, prep) : null;
            const blockStatus = tstate.createdBlocks?.[e.id] ? 'created' : 'missing';

            // v2: start location intelligence
            const startLoc = ov.startLocationCustom
              ? {...ov.startLocationCustom, source:'custom'}
              : calcStartLocation(e, evts, tsCfg.default_start_name, tsCfg.default_start_address);
            const prevEvt  = evts.filter(ev=>ev.id!==e.id&&!ev.allDay&&new Date(ev.start)<new Date(e.start)).sort((a,b)=>new Date(b.start)-new Date(a.start))[0];
            const prevEndTs= prevEvt?.end||(prevEvt?new Date(new Date(prevEvt.start).getTime()+3600000).toISOString():null);
            const normD = s => (s||'').toLowerCase().replace(/[\s,]+/g,'').trim();
            const sameLocD = !!e.location && !!startLoc.address && normD(startLoc.address)===normD(e.location);
            const gapLabel = calcGapLabel(times?.getReady, prevEndTs, {sameLocation: sameLocD, hasEstimate: jMins!=null});

            // Evening-before prep: event is tomorrow before 9am and journey is significant
            const eventDate = new Date(e.start);
            const isEarlyNextDay = (eventDate.getTime() - nowMs) < 36*3600000 && eventDate.getHours() < 9;
            const prepSuggs = calcPrepSuggestions(ov.profile||{});
            const kitHeavy  = ov.profile?.kit_level==='kit-heavy';
            const overnightReq = ov.profile?.requires_overnight;
            const eveningPrep = (isEarlyNextDay || kitHeavy || overnightReq) && (jMins || kitHeavy || overnightReq)
              ? [isEarlyNextDay?'Early start — prep tonight':`Kit-heavy trip`,...prepSuggs].filter(Boolean).join(', ')
              : null;

            // Tight gap: get-ready time is within 2 hours of now
            const tightGap = times && (times.getReady.getTime() - nowMs) < 2*3600000 && (times.getReady.getTime() - nowMs) > 0
              ? 'Less than 2 hours until get-ready time'
              : null;

            return {
              event_title:    e.title,
              event_start:    e.start,
              event_location: e.location,
              travel_mode:    mode,
              journey_mins:   jMins,
              confidence:     jMins!=null ? 'manual' : 'unknown',
              preset_name:    pr?.name || null,
              get_ready:      times ? times.getReady.toISOString() : null,
              leave_by:       times ? times.leaveBy.toISOString()  : null,
              arrival_target: times ? times.arrivalTarget.toISOString() : null,
              block_status:   blockStatus,
              // v2 fields
              start_location_name:    startLoc.name,
              start_location_source:  startLoc.source,
              start_location_confidence: startLoc.confidence || 'high',
              gap_label:              gapLabel,
              kit_level:              ov.profile?.kit_level || 'normal',
              requires_laptop:        ov.profile?.requires_laptop || false,
              requires_overnight:     ov.profile?.requires_overnight || false,
              requires_smart_clothes: ov.profile?.requires_smart_clothes || false,
              prep_items:             prepSuggs,
              tight_gap:              tightGap,
              evening_prep_needed:    eveningPrep,
              // checklist from localStorage
              checklist_pending:      (() => { try { const tst=loadTravelState(); const cl=tst.checklists?.[e.id]; if(!cl) return []; return [...(cl.items||[]),...(cl.custom||[])].filter(x=>!x.done).map(x=>x.name); } catch(e2){return [];} })(),
              checklist_night_before: (() => { try { const tst=loadTravelState(); const cl=tst.checklists?.[e.id]; if(!cl) return []; return [...(cl.items||[]),...(cl.custom||[])].filter(x=>!x.done&&x.timing==='night_before').map(x=>x.name); } catch(e2){return [];} })(),
            };
          });
          const totalMins = suggestions.reduce((acc,s)=>{
            if (s.journey_mins==null) return acc;
            const pr2 = allPresets.find(p=>p.name===s.preset_name)||allPresets[0];
            return acc + s.journey_mins + (pr2?.prep_buffer_mins||tsCfg.prep_buffer_mins) + (pr2?.pre_event_buffer_mins||tsCfg.pre_event_buffer_mins);
          }, 0);
          travelContext = {
            planning_window: '48h',
            start_location:  tsCfg.default_start_name || 'Home',
            travel_pressure_today:    calcTravelPressure(suggestions.filter(s=>s.event_start?.slice(0,10)===new Date().toISOString().slice(0,10))),
            travel_pressure_tomorrow: calcTravelPressure(suggestions.filter(s=>s.event_start?.slice(0,10)===new Date(Date.now()+86400000).toISOString().slice(0,10))),
            suggestions,
            total_travel_time_hours: totalMins > 0 ? parseFloat((totalMins/60).toFixed(1)) : null,
            calculated_at: new Date().toISOString(),
            is_stale: false,
          };
        }
      }
    } catch(e) { /* travel context is optional — don't block Helm */ }

    // Health context — combines last night's recovery + yesterday's activity load
    const healthContext = await buildHealthContext(travelContext);

    await callHelm('plan_my_day', { travelContext, healthContext });
    const b = await fetchTodaysBrief();
    setBrief(b); setBriefBusy(false); setAutoRunning(false);
  };

  const archiveBrief = async () => {
    if (!brief) return;
    await supabase.from('reviews').update({ title: 'Plan My Day (archived)' }).eq('id', brief.id);
    setBrief(null); setShowBriefDetail(false);
  };

  // Parse the stored structured brief (saved as JSON in prompt_used)
  const parsedBrief = (() => {
    if (!brief) return null;
    try { return JSON.parse(brief.prompt_used); } catch { return { summary: brief.notes || '' }; }
  })();

  if (loading) return <div className="spinner"/>;

  const attention = buildAttention(data);
  const visible = showAll ? attention : attention.slice(0, 6);

  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';

  return (
    <div className="page">
      <div className="hero">
        <div className="hero-greet">{greeting}</div>
        <div className="hero-name">Freddie</div>
        <div className="hero-date">{new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</div>
        <div className="stat-strip">
          <div className="stat-chip" onClick={()=>onNavigate('health')}>
            <div className="stat-val" style={{color: heroReadiness?heroReadiness.colour:'var(--muted)'}}>{heroReadiness ? READINESS_LABELS[heroReadiness.label] : '–'}</div>
            <div className="stat-lbl">Readiness</div>
          </div>
          <div className="stat-chip" onClick={()=>_wxLocation&&onNavigate('weathersettings')}>
            <div className="stat-val">{wx&&!wx.error&&wx.temp!=null ? Math.round(wx.temp)+'°' : '–'}</div>
            <div className="stat-lbl">{wx&&!wx.error&&wx.condition_label ? wx.condition_label : 'Weather'}</div>
          </div>
          <div className="stat-chip" onClick={()=>onNavigate('calendar')}>
            <div className="stat-val" style={{color: todayEvents.length?'var(--accent)':'var(--muted)'}}>{todayEvents.length}</div>
            <div className="stat-lbl">Events</div>
          </div>
          <div className="stat-chip" onClick={()=>{const el=document.getElementById('attention-anchor'); el&&el.scrollIntoView({behavior:'smooth'});}}>
            <div className="stat-val" style={{color: attention.length?'var(--amber)':'var(--green)'}}>{attention.length}</div>
            <div className="stat-lbl">To action</div>
          </div>
        </div>
      </div>

      {/* Today's calendar (Phase 1) — leads the day with real context */}
      {calState === 'no_google_connection' ? (
        <div className="card" style={{marginBottom:18,background:'rgba(79,124,255,0.05)',border:'1px solid rgba(79,124,255,0.2)'}}>
          <div className="row-between">
            <div style={{flex:1}}>
              <div className="name" style={{fontSize:13,marginBottom:2}}>📅 Connect your calendar</div>
              <div className="meta">See today's events and free time here.</div>
            </div>
            <button className="btn btn-primary btn-sm" onClick={connectGoogleCalendar}>Connect</button>
          </div>
        </div>
      ) : todayEvents.length > 0 ? (
        <div style={{marginBottom:18}}>
          <div className="section-title" style={{marginTop:0}}>Next 24 hours</div>
          {todayEvents.map(e=>{
            const todayKey = localDateKey();
            const evtKey = (e.start||'').slice(0,10);
            const isTomorrow = evtKey !== todayKey;
            const startMs = e.allDay ? null : new Date(e.start).getTime();
            const inProgress = startMs!=null && e.end && new Date(e.end).getTime() >= Date.now() && startMs <= Date.now();
            return (
              <div key={e.id} className="card-sm" style={{borderLeft:`3px solid ${e.colour||'var(--accent)'}`}}>
                <div className="row-between">
                  <div className="name" style={{fontSize:13}}>{e.title}</div>
                  {inProgress && <span className="pill pill-green" style={{fontSize:9}}>Now</span>}
                  {isTomorrow && !inProgress && <span className="pill pill-muted" style={{fontSize:9}}>Tomorrow</span>}
                </div>
                <div className="meta">{e.allDay?'All day':`${fmtTime(e.start)} – ${fmtTime(e.end)}`}{e.location?` · 📍 ${e.location}`:''}</div>
              </div>
            );
          })}
          <button className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'center',marginTop:4}} onClick={()=>onNavigate('calendar')}>
            View week →
          </button>
        </div>
      ) : calState === 'ok' ? (
        <div className="card-sm" style={{marginBottom:18,opacity:0.7}}>
          <div className="meta">☀️ Nothing in the next 24 hours</div>
        </div>
      ) : null}

      {/* Helm Brief card */}
      <WeatherCard wx={wx} ws={_wxSettings||DEFAULT_WEATHER_SETTINGS} location={_wxLocation} onRefresh={refreshWeather} fetching={wxFetching}/>
      <HealthTrendsCard onNavigate={onNavigate}/>

      {/* Helm Brief */}
      <div className="card" style={{marginBottom:18,border:'1px solid var(--border)'}}>
        <div className="row-between" style={{marginBottom:8}}>
          <div className="section-title" style={{margin:0}}>🧭 {ASSISTANT_NAME} Brief</div>
          {parsedBrief && <span className="meta">{brief && fmtTime(brief.created_at)}</span>}
        </div>

        {brief === undefined ? (
          <div className="meta">Loading…</div>
        ) : (autoSyncing || autoRunning) && !parsedBrief ? (
          <div style={{textAlign:'center',padding:'14px 8px'}}>
            <div style={{fontSize:22,marginBottom:8}}>🌅</div>
            <div className="spinner" style={{margin:'0 auto 10px'}}/>
            <div style={{fontSize:13,fontWeight:600,marginBottom:2}}>Good morning, Freddie</div>
            <div className="meta">{autoSyncing ? 'Pulling in last night’s sleep & recovery…' : `${ASSISTANT_NAME} is preparing your morning briefing…`}</div>
          </div>
        ) : !parsedBrief ? (
          <div>
            <div className="meta" style={{marginBottom:10}}>No {ASSISTANT_NAME} brief yet today.</div>
            <button className="btn btn-primary btn-sm" style={{width:'100%',justifyContent:'center'}} disabled={briefBusy} onClick={()=>runPlanMyDay()}>
              {briefBusy ? `${ASSISTANT_NAME} is thinking…` : `Plan my day with ${ASSISTANT_NAME}`}
            </button>
          </div>
        ) : (
          <div>
            <div style={{fontSize:13,lineHeight:1.55,marginBottom:8}}>{parsedBrief.summary}</div>
            <SourceSummary snap={brief.source_snapshot} compact={true}/>

            {isBriefStale(brief) && (
              <div style={{fontSize:12,color:'var(--amber)',background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.2)',borderRadius:6,padding:'7px 10px',marginBottom:8,lineHeight:1.4}}>
                ⚠ Generated {fmtBriefAge(brief)}. Calendar, tasks or projects may have changed.
              </div>
            )}

            {showBriefDetail && (
              <div style={{marginBottom:10}}>
                {parsedBrief.next_actions?.length>0 && (
                  <>
                    <div className="section-title">Recommended next actions</div>
                    {parsedBrief.next_actions.map((a,i)=>(
                      <div key={i} style={{fontSize:13,lineHeight:1.5,marginBottom:5,display:'flex',gap:8}}><span style={{color:'var(--accent)'}}>{i+1}.</span><span>{a}</span></div>
                    ))}
                  </>
                )}
                {parsedBrief.attention?.length>0 && (
                  <>
                    <div className="section-title">What needs attention</div>
                    {parsedBrief.attention.map((a,i)=>(
                      <div key={i} style={{fontSize:13,lineHeight:1.5,marginBottom:5,display:'flex',gap:8}}><span style={{color:'var(--amber)'}}>•</span><span>{a}</span></div>
                    ))}
                  </>
                )}
                <SourceSummary snap={brief.source_snapshot} compact={false}/>
              </div>
            )}

            <div className="row" style={{gap:6,flexWrap:'wrap'}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setShowBriefDetail(s=>!s)}>{showBriefDetail?'Hide':'View latest brief'}</button>
              <button className="btn btn-ghost btn-sm" disabled={briefBusy} onClick={()=>runPlanMyDay()}>{briefBusy?'Refreshing…':'Refresh '+ASSISTANT_NAME}</button>
              <button className="btn btn-ghost btn-sm" style={{color:'var(--muted)'}} onClick={archiveBrief}>Archive</button>
            </div>
          </div>
        )}
      </div>

      {/* Attention Required */}
      <div id="attention-anchor" className="row-between" style={{marginBottom:8}}>
        <div className="section-title" style={{margin:0}}>Attention required</div>
        {attention.length>0 && <span className="pill pill-muted">{attention.length}</span>}
      </div>

      {attention.length === 0 && (
        <div className="empty" style={{marginTop:12}}>
          <div className="empty-icon">✨</div>
          <div style={{color:'var(--text)',fontWeight:500}}>Nothing needs you right now</div>
          <div className="meta" style={{marginTop:4}}>Everything's on track. Good time to do focused work.</div>
        </div>
      )}

      {visible.map(item=>(
        <div key={item.id} className="card-sm" style={{borderLeft:`3px solid ${item.colour}`,cursor:'pointer'}} onClick={()=>onNavigate(item.goto)}>
          <div className="row-between">
            <div style={{flex:1,minWidth:0}}>
              <div className="row" style={{gap:6,marginBottom:2}}>
                <span style={{fontSize:10,fontWeight:600,color:item.colour,textTransform:'uppercase',letterSpacing:'0.05em'}}>{item.kind}</span>
              </div>
              <div className="name" style={{fontSize:13}}>{item.name}</div>
              <div className="meta">{item.detail}</div>
            </div>
            <Icon name="chevron" size={16} style={{color:'var(--muted)',flexShrink:0,marginLeft:8}}/>
          </div>
        </div>
      ))}

      {attention.length > 6 && (
        <button className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'center',marginTop:4}} onClick={()=>setShowAll(s=>!s)}>
          {showAll ? 'Show less' : `Show ${attention.length-6} more`}
        </button>
      )}

      {/* Waiting for summary (informational, not urgent) */}
      {data.waiting.length > 0 && (
        <div className="card" style={{marginTop:16,background:'rgba(124,92,252,0.06)',border:'1px solid rgba(124,92,252,0.2)'}}>
          <div style={{fontSize:12,color:'var(--muted)'}}>
            <strong style={{color:'var(--accent2)'}}>Also waiting for ({data.waiting.length})</strong>
            <div style={{marginTop:4}}>{data.waiting.slice(0,2).map(w=>`${w.name}${w.waiting_on?` — ${w.waiting_on}`:''}`).join(' · ')}{data.waiting.length>2?` · +${data.waiting.length-2} more`:''}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);
  const [page, setPage] = useState('dashboard');

  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null); setChecking(false);
      if (session?.provider_refresh_token) storeGoogleToken(session);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
      if (session?.provider_refresh_token) storeGoogleToken(session);
    });
    // Withings OAuth callback — detect ?code= + ?state= with withings marker
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code'), state = params.get('state');
    if (code && state && state.includes('user_id')) {
      window.history.replaceState({}, '', window.location.pathname);
      supabase.auth.getSession().then(async ({data:{session}}) => {
        if (!session) return;
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/withings-auth', {
            method: 'POST',
            headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+session.access_token, 'apikey': SUPABASE_KEY },
            body: JSON.stringify({ action:'exchange', code, redirect_uri: window.location.origin + window.location.pathname }),
          });
          const data = await res.json();
          if (data.ok) { setPage('health'); }
        } catch(e) { console.warn('Withings exchange failed', e); }
      });
    }
    return ()=>subscription.unsubscribe();
  },[]);

  if (checking) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100dvh'}}><div className="spinner"/></div>;
  if (!user) return <Login onLogin={setUser}/>;

  const navItems = [
    { id:'dashboard', label:'Dashboard',     icon:'home' },
    { id:'helm',       label:ASSISTANT_NAME,  icon:'zap' },
    { id:'tasks',     label:'Focus',         icon:'check' },
    { id:'capture',   label:'Capture',       icon:'plus' },
    { id:'more',      label:'More',          icon:'layers' },
  ];

  const moreGroups = [
    { title:'Daily', accent:'#4f7cff', tint:'rgba(79,124,255,0.14)', tintB:'rgba(79,124,255,0.28)', items:[
      { id:'helm',           label:ASSISTANT_NAME,        emoji:'🧭', desc:'Plan your day, run reviews' },
      { id:'calendar',       label:'Calendar',            emoji:'📅', desc:'Week view and events' },
      { id:'travel',         label:'Travel Buffer',       emoji:'🚗', desc:'Leave-by times and prep' },
    ]},
    { title:'Health & Body', accent:'#22c55e', tint:'rgba(34,197,94,0.14)', tintB:'rgba(34,197,94,0.28)', items:[
      { id:'health',         label:'Health & Recovery',   emoji:'🫀', desc:'Readiness, sleep, vitals, goals' },
      { id:'weathersettings',label:'Weather & Outdoor',   emoji:'🌤️', desc:'Forecast and activity risk' },
    ]},
    { title:'Planning', accent:'#7c5cfc', tint:'rgba(124,92,252,0.14)', tintB:'rgba(124,92,252,0.28)', items:[
      { id:'projects',       label:'Projects',            emoji:'📁', desc:'Active projects and next actions' },
      { id:'backlog',        label:'Task Backlog',        emoji:'🗂️', desc:'Full task list, filters and modes' },
      { id:'areas',          label:'Areas & Roles',       emoji:'🎯', desc:'Life areas and responsibilities' },
      { id:'decisions',      label:'Decisions & Assets',  emoji:'⚖️', desc:'Open decisions, tracked assets' },
      { id:'reviews',        label:'Weekly Review',       emoji:'🔄', desc:'Reflect and reset each week' },
      { id:'roadmap',        label:'Roadmap Queue',       emoji:'🗺️', desc:'What to build next' },
    ]},
    { title:'Settings', accent:'#f59e0b', tint:'rgba(245,158,11,0.14)', tintB:'rgba(245,158,11,0.28)', items:[
      { id:'helmsettings',   label:ASSISTANT_NAME+' Settings', emoji:'⚙️', desc:'Tune how '+ASSISTANT_NAME+' works' },
      { id:'travelsettings', label:'Travel Settings',     emoji:'🧳', desc:'Defaults, buffers, locations' },
      { id:'prepitems',      label:'Prep Item Library',   emoji:'📦', desc:'Reusable packing items' },
    ]},
    { title:'System', accent:'#7b82a0', tint:'rgba(123,130,160,0.14)', tintB:'rgba(123,130,160,0.28)', items:[
      { id:'systemhealth',   label:'System Health',       emoji:'💚', desc:'Integrations and sync status' },
      { id:'security',       label:'Security & Privacy',  emoji:'🔒', desc:'Access and data controls' },
      { id:'features',       label:'Features Guide',      emoji:'📖', desc:'What the app can do' },
      { id:'debug',          label:'Debug Log',           emoji:'🐛', desc:'Technical event log' },
    ]},
  ];

  const renderPage = () => {
    if (page==='dashboard')       return <DashboardPage user={user} onNavigate={setPage}/>;
    if (page==='helm')            return <HelmPage/>;
    if (page==='helmsettings')    return <HelmSettingsPage/>;
    if (page==='weathersettings') return <WeatherSettingsPage/>;
    if (page==='projects')        return <ProjectsPage/>;
    if (page==='tasks')           return <FocusQueuePage onNavigate={setPage}/>;
    if (page==='backlog')         return <TasksPage/>;
    if (page==='capture')         return <QuickCapturePage/>;
    if (page==='calendar')        return <CalendarPage/>;
    if (page==='areas')           return <AreasPage/>;
    if (page==='decisions')       return <DecisionsAssetsPage/>;
    if (page==='reviews')         return <ReviewsPage/>;
    if (page==='travel')         return <TravelPage/>;
    if (page==='travelsettings') return <TravelSettingsPage/>;
    if (page==='health')         return <HealthPage/>;
    if (page==='prepitems')      return <PrepItemLibraryPage/>;
    if (page==='roadmap')        return <RoadmapQueuePage/>;
    if (page==='systemhealth')    return <SystemHealthPage onNavigate={setPage}/>;
    if (page==='security')        return <SecurityPage/>;
    if (page==='features')        return <FeaturesWikiPage/>;
    if (page==='debug')           return <DebugPage/>;
    if (page==='more') return (
      <div className="page">
        <h1 style={{fontSize:22,fontWeight:800,letterSpacing:'-0.5px',marginBottom:4}}>More</h1>
        <div className="meta" style={{marginBottom:18}}>Everything beyond your daily essentials</div>
        {moreGroups.map(group=>(
          <div key={group.title} style={{marginBottom:22}}>
            <div className="row" style={{gap:7,marginBottom:8,marginTop:0}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:group.accent}}/>
              <div className="section-title" style={{margin:0}}>{group.title}</div>
            </div>
            <div className="card" style={{padding:4}}>
              {group.items.map((item,idx)=>(
                <div key={item.id} onClick={()=>setPage(item.id)}
                     style={{display:'flex',alignItems:'center',gap:12,padding:'11px 10px',cursor:'pointer',borderBottom: idx<group.items.length-1?'1px solid var(--border)':'none',borderRadius:10,transition:'background .12s'}}
                     onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
                     onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <div style={{width:38,height:38,borderRadius:11,display:'flex',alignItems:'center',justifyContent:'center',fontSize:19,flexShrink:0,background:group.tint,border:'1px solid '+group.tintB}}>{item.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600}}>{item.label}</div>
                    <div className="meta" style={{fontSize:11,marginTop:1}}>{item.desc}</div>
                  </div>
                  <span style={{color:'var(--muted)',flexShrink:0,display:'flex'}}><Icon name="chevron" size={16}/></span>
                </div>
              ))}
            </div>
          </div>
        ))}
        <div className="card-sm" style={{cursor:'pointer',marginTop:8}} onClick={()=>supabase.auth.signOut()}>
          <div className="row" style={{gap:10,color:'var(--muted)'}}>
            <Icon name="logout" size={16}/><span style={{fontSize:14}}>Sign out</span>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-logo">Lovejoy OS</div>
        <div className="topbar-title">
          {page==='dashboard'?'Dashboard':page==='helm'?ASSISTANT_NAME:page==='helmsettings'?ASSISTANT_NAME+' Settings':page==='weathersettings'?'Weather & Outdoor Settings':page==='travel'?'Travel Buffer':page==='travelsettings'?'Travel Settings':page==='prepitems'?'Prep Item Library':page==='health'?'Health & Recovery':page==='projects'?'Projects':page==='tasks'?'Focus Queue':page==='backlog'?'Task Backlog':page==='capture'?'Quick Capture':page==='calendar'?'Calendar':page==='areas'?'Areas & Roles':page==='decisions'?'Decisions & Assets':page==='reviews'?'Weekly Review':page==='roadmap'?'Roadmap Queue':page==='systemhealth'?'System Health':page==='security'?'Security & Privacy':page==='features'?'Features Guide':page==='debug'?'Debug Log':'More'}
        </div>
        <div className="topbar-user" onClick={()=>setPage('more')}>F</div>
      </div>
      <div className="main">
        <ErrorBoundary page={page} onHome={()=>setPage('dashboard')}>
          {renderPage()}
        </ErrorBoundary>
      </div>
      <div className="bottomnav">
        {navItems.map(item=>(
          <button key={item.id} className={`nav-item ${page===item.id||(item.id==='more'&&['helmsettings','weathersettings','calendar','projects','backlog','areas','decisions','reviews','roadmap','systemhealth','features','debug'].includes(page))?'active':''}`} onClick={()=>setPage(item.id)}>
            <Icon name={item.icon} size={22}/>
            <span>{item.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
