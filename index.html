      locsData = await loadLocs(user.id);
    }
    setLocs(locsData);
    setWs(wsRes.data || {...DEFAULT_WEATHER_SETTINGS});
    setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  const persist = async updates => {
    const updated = {...ws,...updates,user_id:uid,updated_at:new Date().toISOString()};
    setWs(updated);
    await supabase.from('weather_settings').upsert(updated,{onConflict:'user_id'});
  };

  const saveLoc = async () => {
    if (!editLoc.name||!editLoc.latitude||!editLoc.longitude) return;
    setSaving(true);
    const payload = {
      user_id:uid, name:editLoc.name.trim(),
      latitude:parseFloat(editLoc.latitude), longitude:parseFloat(editLoc.longitude),
      address:editLoc.address||null, postcode:editLoc.postcode||null,
      location_type:editLoc.location_type||'other', notes:editLoc.notes||null,
      is_active:true, is_default:!!editLoc.is_default,
      sort_order:editLoc.sort_order||99,
    };
    if (editLoc.id) await supabase.from('weather_locations').update({...payload,updated_at:new Date().toISOString()}).eq('id',editLoc.id);
    else await supabase.from('weather_locations').insert(payload);
    const fresh = await loadLocs(uid); setLocs(fresh);
    setSaving(false); setEditLoc(null);
  };

  const setDefault = async id => {
    await supabase.from('weather_locations').update({is_default:false}).eq('user_id',uid);
    await supabase.from('weather_locations').update({is_default:true}).eq('id',id);
    await persist({dashboard_location_id:id});
    const fresh = await loadLocs(uid); setLocs(fresh);
  };

  const archiveLoc = async id => {
    await supabase.from('weather_locations').update({is_active:false}).eq('id',id);
    setLocs(l=>l.map(x=>x.id===id?{...x,is_active:false}:x));
  };

  const restoreLoc = async id => {
    await supabase.from('weather_locations').update({is_active:true}).eq('id',id);
    setLocs(l=>l.map(x=>x.id===id?{...x,is_active:true}:x));
  };

  if (loading) return <div className="page"><div className="spinner"/></div>;

  const activeLocs   = locs.filter(l=>l.is_active);
  const archivedLocs = locs.filter(l=>!l.is_active);
  const TYPE_LABEL   = {home:'🏠 Home',work_site:'⚓ Work Site',leisure:'🌊 Leisure',other:'📍 Other'};

  // ── Location form (full-page) ─────────────────────────────
  if (editLoc !== null) {
    const isNew = !editLoc.id;
    const mapsUrl = editLoc.latitude && editLoc.longitude
      ? `https://www.google.com/maps?q=${editLoc.latitude},${editLoc.longitude}` : null;
    return (
      <div className="page">
        <div className="row-between" style={{marginBottom:16}}>
          <h1 style={{fontSize:18,fontWeight:700}}>{isNew?'Add Location':'Edit Location'}</h1>
          <button className="btn btn-ghost btn-sm" onClick={()=>setEditLoc(null)}>✕ Cancel</button>
        </div>
        <div className="field"><label className="label">Name</label>
          <input className="input" value={editLoc.name||''} onChange={e=>setEditLoc(p=>({...p,name:e.target.value}))} placeholder="e.g. Hampton, Home"/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div className="field"><label className="label">Latitude</label>
            <input className="input" type="number" step="0.0001" value={editLoc.latitude||''} onChange={e=>setEditLoc(p=>({...p,latitude:e.target.value}))} placeholder="51.4700"/>
          </div>
          <div className="field"><label className="label">Longitude</label>
            <input className="input" type="number" step="0.0001" value={editLoc.longitude||''} onChange={e=>setEditLoc(p=>({...p,longitude:e.target.value}))} placeholder="-0.4543"/>
          </div>
        </div>
        <div className="meta" style={{marginBottom:8}}>Get coordinates: Google Maps → right-click any point → copy the first item (lat, lng).</div>
        {mapsUrl && <a href={mapsUrl} target="_blank" style={{fontSize:12,color:'var(--accent)',display:'block',marginBottom:12}}>→ Verify on Google Maps ↗</a>}
        <div className="field"><label className="label">Type</label>
          <select className="input" value={editLoc.location_type||'other'} onChange={e=>setEditLoc(p=>({...p,location_type:e.target.value}))}>
            {Object.entries(TYPE_LABEL).map(([v,l])=><option key={v} value={v}>{l}</option>)}
          </select>
        </div>
        <div className="field"><label className="label">Notes (optional)</label>
          <input className="input" value={editLoc.notes||''} onChange={e=>setEditLoc(p=>({...p,notes:e.target.value}))} placeholder="e.g. Lee Navigation, Hackney Wick"/>
        </div>
        <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}}
          onClick={saveLoc} disabled={saving||!editLoc.name||!editLoc.latitude||!editLoc.longitude}>
          {saving?'Saving…':isNew?'Add Location':'Save Changes'}
        </button>
        {!isNew && (
          <button className="btn btn-ghost" style={{width:'100%',justifyContent:'center',marginTop:8,color:'var(--muted)'}}
            onClick={()=>{archiveLoc(editLoc.id);setEditLoc(null);}}>Archive this location</button>
        )}
      </div>
    );
  }

  // ── Shared sub-components ─────────────────────────────────
  const Toggle = ({label,val,onChange,detail=null}) => (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 0',borderBottom:'1px solid var(--border)'}}>
      <div>
        <div style={{fontSize:13}}>{label}</div>
        {detail && <div className="meta">{detail}</div>}
      </div>
      <div onClick={()=>onChange(!val)} style={{width:40,height:22,borderRadius:11,background:val?'var(--accent)':'var(--surface2)',cursor:'pointer',flexShrink:0,position:'relative',transition:'background 0.2s',marginLeft:12}}>
        <div style={{position:'absolute',top:2,left:val?20:2,width:18,height:18,borderRadius:9,background:'white',transition:'left 0.2s'}}/>
      </div>
    </div>
  );

  const Seg = ({label,val,onChange,opts}) => (
    <div style={{padding:'11px 0',borderBottom:'1px solid var(--border)'}}>
      <div style={{fontSize:13,marginBottom:6}}>{label}</div>
      <div className="row" style={{gap:4,flexWrap:'wrap'}}>
        {opts.map(([v,l])=>(
          <button key={v} className={`btn btn-sm ${val===v?'btn-primary':'btn-ghost'}`} onClick={()=>onChange(v)}>{l}</button>
        ))}
      </div>
    </div>
  );

  const Num = ({label,val,unit,onChange}) => (
    <div>
      <div style={{fontSize:10,color:'var(--muted)',marginBottom:2}}>{label}</div>
      <div className="row" style={{gap:4}}>
        <input className="input" type="number" min={0} value={val??''} style={{padding:'5px 8px',fontSize:12}}
          onChange={e=>onChange(parseFloat(e.target.value)||0)}/>
        {unit&&<span style={{fontSize:10,color:'var(--muted)',flexShrink:0,alignSelf:'center'}}>{unit}</span>}
      </div>
    </div>
  );

  const TABS = ['locations','units','risk','activities','dashboard'];
  const TAB_LBL = {locations:'Locations',units:'Units',risk:'Thresholds',activities:'Activities',dashboard:'Dashboard'};

  return (
    <div className="page">
      <h1 style={{fontSize:20,fontWeight:700,marginBottom:4}}>Weather & Outdoor Settings</h1>
      <div className="meta" style={{marginBottom:12}}>Locations, units, risk thresholds and activity preferences.</div>

      {/* Tab bar */}
      <div style={{display:'flex',gap:4,overflowX:'auto',paddingBottom:8,marginBottom:16,WebkitOverflowScrolling:'touch'}}>
        {TABS.map(t=>(
          <button key={t} className={`btn btn-sm ${tab===t?'btn-primary':'btn-ghost'}`}
            style={{flexShrink:0}} onClick={()=>setTab(t)}>{TAB_LBL[t]}</button>
        ))}
      </div>

      {/* ── LOCATIONS ── */}
      {tab==='locations' && (
        <div>
          <button className="btn btn-primary btn-sm" style={{marginBottom:12}} onClick={()=>setEditLoc({location_type:'other'})}>+ Add Location</button>
          {activeLocs.length===0 && <div className="empty"><div className="empty-icon">📍</div>No active locations.</div>}
          {activeLocs.map(loc=>(
            <div key={loc.id} className="card" style={{marginBottom:8,borderLeft:`3px solid ${loc.is_default?'var(--accent)':'var(--border)'}`}}>
              <div>
                <div className="row" style={{gap:6,marginBottom:2}}>
                  <div style={{fontSize:14,fontWeight:600}}>{loc.name}</div>
                  {loc.is_default && <span style={{fontSize:10,color:'var(--accent)',fontWeight:700}}>DEFAULT</span>}
                  <span className="meta">{TYPE_LABEL[loc.location_type]||loc.location_type}</span>
                </div>
                <div className="meta">{parseFloat(loc.latitude).toFixed(4)}°N, {parseFloat(loc.longitude).toFixed(4)}°</div>
                {loc.notes && <div className="meta" style={{marginTop:2}}>{loc.notes}</div>}
              </div>
              <div className="row" style={{gap:8,marginTop:8}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>setEditLoc({...loc})}>Edit</button>
                {!loc.is_default && <button className="btn btn-ghost btn-sm" onClick={()=>setDefault(loc.id)}>Set default</button>}
                <button className="btn btn-ghost btn-sm" style={{color:'var(--muted)',marginLeft:'auto'}} onClick={()=>archiveLoc(loc.id)}>Archive</button>
              </div>
            </div>
          ))}
          {archivedLocs.length>0 && (
            <div style={{marginTop:8}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setShowArc(s=>!s)} style={{marginBottom:8}}>
                {showArchived?'Hide':'Show'} {archivedLocs.length} archived
              </button>
              {showArchived && archivedLocs.map(loc=>(
                <div key={loc.id} className="card-sm" style={{marginBottom:6,opacity:0.5}}>
                  <div className="row-between">
                    <span>{loc.name}</span>
                    <button className="btn btn-ghost btn-sm" onClick={()=>restoreLoc(loc.id)}>Restore</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ── UNITS ── */}
      {tab==='units' && ws && (
        <div>
          <Seg label="Temperature" val={ws.temp_unit} onChange={v=>persist({temp_unit:v})} opts={[['celsius','°C'],['fahrenheit','°F']]}/>
          <Seg label="Wind speed" val={ws.wind_unit} onChange={v=>persist({wind_unit:v})} opts={[['mph','mph'],['knots','knots'],['kmh','km/h']]}/>
          <Seg label="Precipitation" val={ws.rain_unit} onChange={v=>persist({rain_unit:v})} opts={[['mm','mm'],['inches','inches']]}/>
          <Seg label="Time format" val={ws.time_format} onChange={v=>persist({time_format:v})} opts={[['24h','24h'],['12h','12h']]}/>
          <div style={{height:8}}/>
          <Toggle label="Show UV index" val={ws.show_uv} onChange={v=>persist({show_uv:v})}/>
          <Toggle label="Show pollen" val={ws.show_pollen} onChange={v=>persist({show_pollen:v})}/>
          <Toggle label="Show thunderstorm risk" val={ws.thunder_show} onChange={v=>persist({thunder_show:v})}/>
          <div className="meta" style={{marginTop:12}}>Settings save automatically when changed.</div>
        </div>
      )}

      {/* ── RISK THRESHOLDS ── */}
      {tab==='risk' && ws && (
        <div>
          <div className="meta" style={{marginBottom:12}}>
            These levels trigger Watch / Caution / Avoid labels on the weather card.
            Wind thresholds are stored in mph; adjust to match your experience level.
          </div>
          <div className="section-title">Wind speed (mph)</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
            <Num label="Watch" val={ws.wind_watch_mph} unit="mph" onChange={v=>setWs(p=>({...p,wind_watch_mph:v}))}/>
            <Num label="Caution" val={ws.wind_caution_mph} unit="mph" onChange={v=>setWs(p=>({...p,wind_caution_mph:v}))}/>
            <Num label="Avoid" val={ws.wind_avoid_mph} unit="mph" onChange={v=>setWs(p=>({...p,wind_avoid_mph:v}))}/>
          </div>
          <div className="section-title">Gusts (mph)</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
            <Num label="Watch" val={ws.gust_watch_mph} unit="mph" onChange={v=>setWs(p=>({...p,gust_watch_mph:v}))}/>
            <Num label="Caution" val={ws.gust_caution_mph} unit="mph" onChange={v=>setWs(p=>({...p,gust_caution_mph:v}))}/>
            <Num label="Avoid" val={ws.gust_avoid_mph} unit="mph" onChange={v=>setWs(p=>({...p,gust_avoid_mph:v}))}/>
          </div>
          <div className="section-title">Rain probability (%)</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
            <Num label="Watch %" val={ws.rain_watch_pct} onChange={v=>setWs(p=>({...p,rain_watch_pct:v}))}/>
            <Num label="Caution %" val={ws.rain_caution_pct} onChange={v=>setWs(p=>({...p,rain_caution_pct:v}))}/>
            <Num label="Avoid %" val={ws.rain_avoid_pct} onChange={v=>setWs(p=>({...p,rain_avoid_pct:v}))}/>
          </div>
          <div className="section-title">UV index</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
            <Num label="Watch" val={ws.uv_watch} onChange={v=>setWs(p=>({...p,uv_watch:v}))}/>
            <Num label="Caution" val={ws.uv_caution} onChange={v=>setWs(p=>({...p,uv_caution:v}))}/>
            <Num label="Avoid" val={ws.uv_avoid} onChange={v=>setWs(p=>({...p,uv_avoid:v}))}/>
          </div>
          <div className="section-title">Pollen — grass (µg/m³)</div>
          <div className="meta" style={{marginBottom:8}}>Grass pollen via Copernicus data. Low &lt;15 · Moderate 15–35 · High 35–70 · Very high &gt;70.</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
            <Num label="Watch" val={ws.pollen_watch} unit="µg" onChange={v=>setWs(p=>({...p,pollen_watch:v}))}/>
            <Num label="Caution" val={ws.pollen_caution} unit="µg" onChange={v=>setWs(p=>({...p,pollen_caution:v}))}/>
            <Num label="Avoid" val={ws.pollen_avoid} unit="µg" onChange={v=>setWs(p=>({...p,pollen_avoid:v}))}/>
          </div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}}
            onClick={()=>persist(ws)} disabled={saving}>{saving?'Saving…':'Save thresholds'}</button>
        </div>
      )}

      {/* ── ACTIVITIES ── */}
      {tab==='activities' && ws && (
        <div>
          <div className="meta" style={{marginBottom:12}}>Enabled activities shape Helm's outdoor interpretation of weather conditions.</div>
          {[
            ['act_watersports','Watersports / Work delivery','FL teaching on water — highlights wind, gusts and thunderstorm risk'],
            ['act_sailing','Sailing','Dinghy and keelboat — wind and sea conditions'],
            ['act_sup','SUP','Standup paddleboarding'],
            ['act_winging','Winging','Wing foiling — higher wind threshold needed'],
            ['act_cycling','Cycling','Road or off-road cycling — rain and wind'],
            ['act_swimming','Outdoor swimming','Open water — temperature and conditions'],
            ['act_gardening','Gardening','Sunset, rain, frost awareness'],
            ['act_walking','Walking / Running','Wind and rain awareness'],
            ['act_outdoor_work','General outdoor work','Other outdoor tasks'],
            ['act_hayfever','Hayfever management','Pollen alerts when levels are moderate or high'],
          ].map(([k,l,d])=>(
            <Toggle key={k} label={l} detail={d} val={ws[k]} onChange={v=>persist({[k]:v})}/>
          ))}
        </div>
      )}

      {/* ── DASHBOARD ── */}
      {tab==='dashboard' && ws && (
        <div>
          <Toggle label="Show weather card on dashboard" val={ws.show_weather_card} onChange={v=>persist({show_weather_card:v})}/>
          <div style={{padding:'11px 0',borderBottom:'1px solid var(--border)'}}>
            <div style={{fontSize:13,marginBottom:6}}>Default dashboard location</div>
            <select className="input" value={ws.dashboard_location_id||''} onChange={e=>persist({dashboard_location_id:e.target.value||null})}>
              <option value="">Auto (first active default)</option>
              {activeLocs.map(l=><option key={l.id} value={l.id}>{l.name}</option>)}
            </select>
          </div>
          <Toggle label="Compact card" detail="Fewer fields on dashboard" val={ws.compact_card} onChange={v=>persist({compact_card:v})}/>
          <Toggle label="Show Helm outdoor interpretation" detail="Rule-based interpretation line below the card" val={ws.show_interpretation} onChange={v=>persist({show_interpretation:v})}/>
          <Toggle label="Include weather in Plan My Day" detail="Helm reads the current weather snapshot when generating a brief" val={ws.include_in_helm} onChange={v=>persist({include_in_helm:v})}/>
          <Toggle label="Show last updated time" val={ws.show_last_updated} onChange={v=>persist({show_last_updated:v})}/>
          <Toggle label="Show cached while refreshing" detail="Display last snapshot instantly while fresh data loads" val={ws.show_cached_while_refreshing!==false} onChange={v=>persist({show_cached_while_refreshing:v})}/>
          <div style={{padding:'11px 0',borderBottom:'1px solid var(--border)'}}>
            <div style={{fontSize:13,marginBottom:6}}>Consider data stale after</div>
            <select className="input" value={ws.stale_after||'1h'} onChange={e=>persist({stale_after:e.target.value})}>
              <option value="manual">Manual only — never auto-refresh</option>
              <option value="15m">15 minutes</option>
              <option value="30m">30 minutes</option>
              <option value="1h">1 hour (recommended)</option>
              <option value="3h">3 hours</option>
            </select>
          </div>
          <Toggle label="Refresh on app open" detail="Fetch fresh data when you open the dashboard (if stale)" val={ws.refresh_on_open!==false} onChange={v=>persist({refresh_on_open:v})}/>
          <Toggle label="Refresh when returning to app" detail="Refresh if stale when you switch back to this tab" val={ws.refresh_on_foreground!==false} onChange={v=>persist({refresh_on_foreground:v})}/>
          <div className="meta" style={{marginTop:12}}>All settings save automatically when changed.</div>
        </div>
      )}
    </div>
  );
}

// ── ROADMAP QUEUE ─────────────────────────────────────────────
// Shows only items with a lane (queue items). Feature Log items
// (live/experimental with no lane) stay in the Features Guide.
function RoadmapQueuePage() {
  const [items,   setItems]    = useState([]);
  const [loading, setLoading]  = useState(true);
  const [filter,  setFilter]   = useState('all');
  const [expanded,setExpanded] = useState(new Set());
  const [formItem,setFormItem] = useState(null); // null=list, {}=new, {...}=edit
  const [saving,  setSaving]   = useState(false);

  const LANES = ['now','next','later','parked'];
  const LANE_CFG = {
    now:    {label:'Now',    colour:'var(--red)',    desc:'Active / doing next'},
    next:   {label:'Next',   colour:'var(--amber)',  desc:'Committed for upcoming builds'},
    later:  {label:'Later',  colour:'var(--accent)', desc:'Good idea, not yet scheduled'},
    parked: {label:'Parked', colour:'var(--muted)',  desc:'Not pursuing right now'},
  };
  const AREAS = ['helm','calendar','dashboard','health','finance','work','integrations','reliability','settings','other'];
  const AREA_ICON = {helm:'🧭',calendar:'📅',dashboard:'🏠',health:'💪',finance:'💰',work:'💼',integrations:'🔗',reliability:'🛡️',settings:'⚙️',other:'📦'};
  const S_COL = {idea:'var(--muted)',queued:'var(--amber)',approved:'var(--green)',in_progress:'var(--accent)',parked:'var(--muted)',rejected:'var(--red)',live:'var(--green)',experimental:'var(--amber)'};
  const S_LBL = {idea:'Idea',queued:'Queued',approved:'Approved',in_progress:'In Progress',parked:'Parked',rejected:'Rejected',live:'Built',experimental:'Built',planned:'Planned',someday:'Someday'};

  const load = async () => {
    setLoading(true);
    const {data} = await supabase.from('roadmap').select('*').not('lane','is',null).order('sort_order').order('created_at');
    setItems(data||[]);
    setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  const toggle = id => setExpanded(p=>{ const n=new Set(p); n.has(id)?n.delete(id):n.add(id); return n; });

  const moveLane = async (id, lane) => {
    await supabase.from('roadmap').update({lane, updated_at:new Date().toISOString()}).eq('id',id);
    setItems(p=>p.map(i=>i.id===id?{...i,lane}:i));
    setExpanded(p=>{ const n=new Set(p); n.delete(id); return n; });
  };

  const markBuilt = async id => {
    await supabase.from('roadmap').update({status:'live',lane:null,updated_at:new Date().toISOString()}).eq('id',id);
    setItems(p=>p.filter(i=>i.id!==id));
    setExpanded(p=>{ const n=new Set(p); n.delete(id); return n; });
  };

  const markRejected = async id => {
    await supabase.from('roadmap').update({status:'rejected',updated_at:new Date().toISOString()}).eq('id',id);
    setItems(p=>p.map(i=>i.id===id?{...i,status:'rejected'}:i));
  };

  const saveForm = async () => {
    if (!formItem.name?.trim()) return;
    setSaving(true);
    const payload = {
      name: formItem.name.trim(),
      description: formItem.description||null,
      problem: formItem.problem||null,
      notes: formItem.notes||null,
      decision_note: formItem.decision_note||null,
      dependencies: formItem.dependencies||null,
      expected_value: formItem.expected_value||null,
      effort: formItem.effort||null,
      risk: formItem.risk||null,
      lane: formItem.lane||'next',
      status: formItem.status||'idea',
      system_area: formItem.system_area||'other',
      feature_type: formItem.feature_type||'core',
      updated_at: new Date().toISOString(),
    };
    if (formItem.id) {
      await supabase.from('roadmap').update(payload).eq('id',formItem.id);
    } else {
      await supabase.from('roadmap').insert({...payload, created_at:new Date().toISOString()});
    }
    await load();
    setSaving(false); setFormItem(null);
  };

  const filteredItems = items.filter(i=>{
    if (filter==='all') return true;
    if (filter==='in_progress') return i.status==='in_progress';
    if (filter==='high_value') return (i.expected_value||'').toLowerCase().includes('high');
    if (filter==='high_risk') return (i.risk||'').toLowerCase()==='high';
    return i.lane===filter;
  });
  const grouped = LANES.reduce((a,l)=>({...a,[l]:items.filter(i=>i.lane===l)}),{});

  const valC    = v => v?.toLowerCase().includes('high')?'var(--green)':v?.toLowerCase()==='medium'?'var(--amber)':'var(--muted)';
  const effortC = v => v?.toLowerCase()==='high'?'var(--amber)':'var(--muted)';
  const riskC   = v => v?.toLowerCase()==='high'?'var(--red)':v?.toLowerCase()==='medium'?'var(--amber)':'var(--green)';

  // ── item card ─────────────────────────────────────────────
  const renderItem = item => {
    const isExp = expanded.has(item.id);
    const lc = LANE_CFG[item.lane]||LANE_CFG.parked;
    return (
      <div key={item.id} className="card" style={{marginBottom:10,borderLeft:`3px solid ${lc.colour}`}}>
        <div className="row-between" style={{cursor:'pointer'}} onClick={()=>toggle(item.id)}>
          <div style={{flex:1,minWidth:0,paddingRight:8}}>
            <div style={{fontSize:14,fontWeight:600,lineHeight:1.3,marginBottom:5}}>{item.name}</div>
            <div className="row" style={{gap:8,flexWrap:'wrap'}}>
              {item.system_area && <span style={{fontSize:10,color:'var(--accent2)'}}>{AREA_ICON[item.system_area]} {item.system_area}</span>}
              <span style={{fontSize:10,fontWeight:600,color:S_COL[item.status]||'var(--muted)'}}>{S_LBL[item.status]||item.status}</span>
              {item.expected_value && <span style={{fontSize:10,color:valC(item.expected_value)}}>↑ {item.expected_value}</span>}
              {item.effort && <span style={{fontSize:10,color:effortC(item.effort)}}>⚙ {item.effort}</span>}
              {item.risk && <span style={{fontSize:10,color:riskC(item.risk)}}>⚡ {item.risk}</span>}
            </div>
          </div>
          <span style={{color:'var(--muted)',fontSize:11,flexShrink:0}}>{isExp?'▲':'▼'}</span>
        </div>

        {isExp && (
          <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}}>
            {item.description && <div style={{fontSize:13,lineHeight:1.6,marginBottom:10}}>{item.description}</div>}
            {item.problem && (
              <div style={{marginBottom:10}}>
                <div style={{fontSize:10,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:3}}>Problem</div>
                <div className="meta" style={{lineHeight:1.5}}>{item.problem}</div>
              </div>
            )}
            {item.decision_note && (
              <div style={{marginBottom:10,background:'rgba(79,124,255,0.06)',border:'1px solid rgba(79,124,255,0.15)',borderRadius:6,padding:'8px 10px'}}>
                <div style={{fontSize:10,fontWeight:600,color:'var(--accent)',textTransform:'uppercase',marginBottom:3}}>Decision note</div>
                <div className="meta" style={{lineHeight:1.5}}>{item.decision_note}</div>
              </div>
            )}
            {item.notes && <div className="meta" style={{marginBottom:10,lineHeight:1.5}}>{item.notes}</div>}
            {item.dependencies && <div className="meta" style={{marginBottom:10}}><strong style={{color:'var(--text)'}}>Dependencies:</strong> {item.dependencies}</div>}

            <div style={{marginBottom:10}}>
              <div style={{fontSize:10,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',marginBottom:6}}>Move to lane</div>
              <div className="row" style={{gap:6,flexWrap:'wrap'}}>
                {LANES.filter(l=>l!==item.lane).map(l=>(
                  <button key={l} className="btn btn-ghost btn-sm" style={{fontSize:11,color:LANE_CFG[l].colour,padding:'4px 10px'}}
                    onClick={e=>{e.stopPropagation();moveLane(item.id,l);}}>
                    {LANE_CFG[l].label}
                  </button>
                ))}
              </div>
            </div>

            <div className="row" style={{gap:8,flexWrap:'wrap'}}>
              <button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();setFormItem({...item});}}>Edit</button>
              <button className="btn btn-ghost btn-sm" style={{color:'var(--green)'}}
                onClick={e=>{e.stopPropagation();markBuilt(item.id);}}>✓ Mark built</button>
              {item.status!=='rejected' && (
                <button className="btn btn-ghost btn-sm" style={{color:'var(--red)',marginLeft:'auto'}}
                  onClick={e=>{e.stopPropagation();markRejected(item.id);}}>Reject</button>
              )}
            </div>
          </div>
        )}
      </div>
    );
  };

  // ── form view ─────────────────────────────────────────────
  if (formItem !== null) {
    const isNew = !formItem.id;
    const F = ({label,children}) => <div className="field">{label&&<label className="label">{label}</label>}{children}</div>;
    const sel = (key,opts,placeholder='—') => (
      <select className="input" value={formItem[key]||''} onChange={e=>setFormItem(p=>({...p,[key]:e.target.value}))}>
        {placeholder&&<option value="">{placeholder}</option>}
        {opts.map(([v,l])=><option key={v} value={v}>{l}</option>)}
      </select>
    );
    return (
      <div className="page">
        <div className="row-between" style={{marginBottom:16}}>
          <h1 style={{fontSize:18,fontWeight:700}}>{isNew?'Add Idea':'Edit Item'}</h1>
          <button className="btn btn-ghost btn-sm" onClick={()=>setFormItem(null)}>✕ Cancel</button>
        </div>
        <F label="Title *">
          <input className="input" value={formItem.name||''} onChange={e=>setFormItem(p=>({...p,name:e.target.value}))} placeholder="What are we building or exploring?"/>
        </F>
        <F label="Description">
          <textarea className="input" rows={2} value={formItem.description||''} onChange={e=>setFormItem(p=>({...p,description:e.target.value}))} placeholder="Brief description"/>
        </F>
        <F label="Problem it solves">
          <textarea className="input" rows={2} value={formItem.problem||''} onChange={e=>setFormItem(p=>({...p,problem:e.target.value}))} placeholder="What problem does this address?"/>
        </F>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:4}}>
          <F label="Lane">{sel('lane',LANES.map(l=>[l,LANE_CFG[l].label]),null)}</F>
          <F label="Status">{sel('status',[['idea','Idea'],['queued','Queued'],['approved','Approved'],['in_progress','In Progress'],['parked','Parked'],['rejected','Rejected']],null)}</F>
          <F label="Expected value">{sel('expected_value',[['high','High'],['medium','Medium'],['low','Low']])}</F>
          <F label="Effort">{sel('effort',[['low','Low'],['medium','Medium'],['high','High']])}</F>
          <F label="Risk">{sel('risk',[['low','Low'],['medium','Medium'],['high','High']])}</F>
          <F label="System area">{sel('system_area',AREAS.map(a=>[a,`${AREA_ICON[a]} ${a}`]))}</F>
        </div>
        <F label="Decision note">
          <textarea className="input" rows={2} value={formItem.decision_note||''} onChange={e=>setFormItem(p=>({...p,decision_note:e.target.value}))} placeholder="Why building, waiting, parking or rejecting?"/>
        </F>
        <F label="Dependencies">
          <input className="input" value={formItem.dependencies||''} onChange={e=>setFormItem(p=>({...p,dependencies:e.target.value}))} placeholder="e.g. Requires Google Maps API"/>
        </F>
        <F label="Notes">
          <textarea className="input" rows={2} value={formItem.notes||''} onChange={e=>setFormItem(p=>({...p,notes:e.target.value}))} placeholder="Any extra context"/>
        </F>
        <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',marginTop:4}}
          onClick={saveForm} disabled={saving||!formItem.name?.trim()}>
          {saving?'Saving…':isNew?'Add to Roadmap':'Save Changes'}
        </button>
        {!isNew && (
          <div className="row" style={{gap:8,marginTop:12,justifyContent:'center'}}>
            <button className="btn btn-ghost btn-sm" style={{color:'var(--green)'}} onClick={()=>{markBuilt(formItem.id);setFormItem(null);}}>Mark Built</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>{moveLane(formItem.id,'parked');setFormItem(null);}}>Park</button>
            <button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={()=>{markRejected(formItem.id);setFormItem(null);}}>Reject</button>
          </div>
        )}
      </div>
    );
  }

  if (loading) return <div className="page"><div className="spinner"/></div>;

  const active = items.filter(i=>i.lane!=='parked').length;

  // ── main list view ────────────────────────────────────────
  return (
    <div className="page">
      <div className="row-between" style={{marginBottom:4}}>
        <h1 style={{fontSize:20,fontWeight:700}}>Roadmap Queue</h1>
        <button className="btn btn-primary btn-sm" onClick={()=>setFormItem({lane:'next',status:'idea'})}>+ Idea</button>
      </div>
      <div className="meta" style={{marginBottom:14}}>
        {active} active · {grouped.now?.length||0} now · {grouped.next?.length||0} next · {grouped.parked?.length||0} parked
      </div>

      {/* Filter chips */}
      <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:8,marginBottom:14,WebkitOverflowScrolling:'touch'}}>
        {[
          {k:'all',l:'All'},{k:'now',l:'🔴 Now'},{k:'next',l:'🟡 Next'},
          {k:'later',l:'🔵 Later'},{k:'parked',l:'⚫ Parked'},
          {k:'in_progress',l:'In Progress'},{k:'high_value',l:'High Value'},{k:'high_risk',l:'High Risk'},
        ].map(f=>(
          <button key={f.k} className={`btn btn-sm ${filter===f.k?'btn-primary':'btn-ghost'}`}
            style={{flexShrink:0,whiteSpace:'nowrap'}} onClick={()=>setFilter(f.k)}>{f.l}</button>
        ))}
      </div>

      {/* Filtered flat list */}
      {filter !== 'all' && (
        filteredItems.length === 0
          ? <div className="empty"><div className="empty-icon">📭</div>No items match this filter.</div>
          : filteredItems.map(item => renderItem(item))
      )}

      {/* Grouped by lane (default view) */}
      {filter === 'all' && LANES.map(lane=>{
        const laneItems = grouped[lane]||[];
        const cfg = LANE_CFG[lane];
        return (
          <div key={lane} style={{marginBottom:20}}>
            <div className="row" style={{gap:8,marginBottom:8,alignItems:'center'}}>
              <div style={{fontSize:11,fontWeight:700,color:cfg.colour,textTransform:'uppercase',letterSpacing:'0.08em'}}>{cfg.label}</div>
              <span className="pill pill-muted" style={{fontSize:10}}>{laneItems.length}</span>
              <div className="meta" style={{fontSize:11}}>{cfg.desc}</div>
            </div>
            {laneItems.length===0
              ? <div className="card-sm" style={{color:'var(--muted)',fontSize:12,fontStyle:'italic'}}>No items in this lane.</div>
              : laneItems.map(item=>renderItem(item))
            }
          </div>
        );
      })}
    </div>
  );
}

// ── SECURITY & PRIVACY PAGE ──────────────────────────────────
function SecurityPage() {
  const REVIEW_DATE = 'June 2026';
  const MODULE    = 'security';
  const STORE_KEY = 'ljos_security_done'; // kept as migration source + offline fallback
  const [done,      setDone]      = useState([]);
  const [saving,    setSaving]    = useState(null); // item ID currently saving
  const [saveError, setSaveError] = useState(null);

  useEffect(()=>{
    (async ()=>{
      // Load from Supabase first
      const dbState = await loadActionStates(MODULE);
      if (Object.keys(dbState).length > 0) {
        const ids = Object.entries(dbState).filter(([,v])=>v).map(([k])=>k);
        setDone(ids);
        try { localStorage.setItem(STORE_KEY, JSON.stringify(ids)); } catch(e){}
      } else {
        // Migrate from localStorage on first load
        try {
          const local = JSON.parse(localStorage.getItem(STORE_KEY)||'[]');
          if (local.length > 0) {
            setDone(local);
            for (const id of local) await saveActionState(MODULE, id, true);
          }
        } catch(e){}
      }
    })();
  },[]);

  const markDone = async (id) => {
    setSaving(id); setSaveError(null);
    const next = [...new Set([...done, id])];
    setDone(next); // optimistic update
    const ok = await saveActionState(MODULE, id, true);
    if (!ok) { setDone(done); setSaveError(id); } // revert on failure
    else { try { localStorage.setItem(STORE_KEY, JSON.stringify(next)); } catch(e){} }
    setSaving(null);
  };

  const unmark = async (id) => {
    setSaving(id); setSaveError(null);
    const next = done.filter(x=>x!==id);
    setDone(next);
    const ok = await saveActionState(MODULE, id, false);
    if (!ok) { setDone(done); setSaveError(id); }
    else { try { localStorage.setItem(STORE_KEY, JSON.stringify(next)); } catch(e){} }
    setSaving(null);
  };

  const findings = [
    {
      id:'signups', risk:'HIGH', title:'Sign-ups may be enabled in Supabase Auth',
      detail:'Core data tables (tasks, projects, decisions, etc.) have no user_id column. Any signed-up user can access all rows. PRIMARY FIX: Supabase Dashboard → Authentication → Settings → disable "Enable sign-ups".',
      action:'Manual: Supabase → Auth → Settings → disable sign-ups',
    },
    {
      id:'rls_sql', risk:'HIGH', title:'Run 15_security_rls_fix.sql',
      detail:'Confirms/tightens user-scoped RLS policies on all tables that have a user_id column (helm_settings, billing, flags, weather, travel tables).',
      action:'Manual: Supabase → SQL Editor → run 15_security_rls_fix.sql',
    },
    {
      id:'cal_disconnect', risk:'MEDIUM', title:'Google Calendar disconnect not available in-app',
      detail:'To revoke calendar access, go to myaccount.google.com → Security → Third-party apps. Future sprint: add disconnect button here.',
      action:'Future: add disconnect button',
    },
    {
      id:'session_timeout', risk:'LOW', title:'No session timeout enforcement',
      detail:'Supabase sessions expire per Supabase config. No in-app forced timeout. Reduce session lifetime in Supabase Auth settings if desired.',
      action:'Optional: Supabase → Auth → Session lifetime',
    },
    {
      id:'helm_prompts', risk:'LOW', title:'Helm prompts contain personal context',
      detail:'reviews.prompt_used stores full planning context. Protected by RLS. No tokens or secrets in prompts. Acceptable for personal app.',
      action:'Future: add Helm history purge option',
    },
  ];

  const withStatus = findings.map(f => ({...f, isDone: done.includes(f.id)}));
  const highCount = withStatus.filter(f => f.risk==='HIGH' && !f.isDone).length;
  const medCount  = withStatus.filter(f => f.risk==='MEDIUM' && !f.isDone).length;
  const overallStatus = highCount > 0
    ? {label:'Needs attention', colour:'var(--amber)'}
    : medCount > 0
      ? {label:'Good — minor items remaining', colour:'var(--accent)'}
      : {label:'All clear', colour:'var(--accent)'};

  const rlsStatus = [
    {table:'Core tables (tasks, projects, etc.)', scoped:'✗ No user_id', risk:'HIGH'},
    {table:'helm_settings, billing, flags', scoped:'✓ auth.uid()', risk:'Low'},
    {table:'helm_logs, proposed_actions', scoped:'✓ auth.uid()', risk:'Low'},
    {table:'google_credentials', scoped:'✓ service-role write only', risk:'Low'},
    {table:'weather_locations, weather_settings', scoped:'✓ auth.uid()', risk:'Low'},
    {table:'travel_settings, travel_presets', scoped:'✓ auth.uid()', risk:'Low'},
    {table:'roadmap, feature_flags', scoped:'Any authenticated (system tables)', risk:'Low'},
  ];

  const secrets = [
    {item:'ANTHROPIC_API_KEY', status:'✓ Edge Function secrets only'},
    {item:'METOFFICE_API_KEY', status:'✓ Edge Function secrets only'},
    {item:'GOOGLE_CLIENT_SECRET', status:'✓ Edge Function secrets only'},
    {item:'SUPABASE_SERVICE_ROLE_KEY', status:'✓ Edge Function env only'},
    {item:'SUPABASE_KEY', status:'⚠ Public in index.html (by design)'},
    {item:'Google refresh token', status:'✓ google_credentials (service-role write only)'},
  ];

  return (
    <div className="page">
      <h1 style={{fontSize:18,fontWeight:700,marginBottom:4}}>Security & Privacy</h1>
      <div className="meta" style={{marginBottom:16}}>Last reviewed: {REVIEW_DATE}</div>

      <div className="card" style={{marginBottom:16,borderLeft:'3px solid ' + overallStatus.colour}}>
        <div className="row-between">
          <div style={{fontWeight:600}}>Overall status</div>
          <div style={{fontWeight:700,color:overallStatus.colour}}>{overallStatus.label}</div>
        </div>
        <div className="meta" style={{marginTop:4}}>
          {highCount} high-risk · {medCount} medium · {withStatus.filter(f=>f.risk==='LOW'&&!f.isDone).length} low still open
          {done.length > 0 && ` · ${done.length} completed`}
        </div>
      </div>

      <div className="section-title">Action items</div>
      {withStatus.map((f)=>(
        <div key={f.id} className="card-sm" style={{marginBottom:8,opacity:f.isDone?0.55:1,
          borderLeft:'3px solid ' + (f.isDone?'var(--border)':f.risk==='HIGH'?'var(--red)':f.risk==='MEDIUM'?'var(--amber)':'var(--border)'),padding:'8px 10px'}}>
          <div className="row-between" style={{marginBottom:2}}>
            <div style={{fontSize:12,fontWeight:600,textDecoration:f.isDone?'line-through':'none'}}>{f.title}</div>
            <div className="row" style={{gap:6}}>
              {!f.isDone && <span style={{fontSize:10,padding:'1px 6px',borderRadius:3,fontWeight:700,
                color:f.risk==='HIGH'?'#fff':f.risk==='MEDIUM'?'#000':'var(--muted)',
                background:f.risk==='HIGH'?'var(--red)':f.risk==='MEDIUM'?'var(--amber)':'var(--surface2)'}}>
                {f.risk}
              </span>}
              <button className="btn btn-ghost btn-sm" style={{fontSize:10,padding:'2px 7px',
                color:saveError===f.id?'var(--red)':f.isDone?'var(--muted)':'var(--accent)',
                opacity:saving===f.id?0.5:1,pointerEvents:saving===f.id?'none':'auto'}}
                onClick={()=>f.isDone?unmark(f.id):markDone(f.id)}>
                {saving===f.id?'Saving…':saveError===f.id?'✗ Retry':f.isDone?'✓ Done — undo':'Mark done'}
              </button>
            </div>
          </div>
          {!f.isDone && <>
            <div className="meta" style={{marginBottom:4}}>{f.detail}</div>
            <div style={{fontSize:11,color:'var(--accent)'}}>→ {f.action}</div>
          </>}
        </div>
      ))}

      <div className="section-title" style={{marginTop:16}}>RLS table status</div>
      {rlsStatus.map((r,i)=>(
        <div key={i} className="row-between" style={{fontSize:11,padding:'5px 0',borderBottom:'1px solid var(--border)'}}>
          <span style={{color:'var(--muted)',flex:1}}>{r.table}</span>
          <span style={{color:r.risk==='HIGH'?'var(--red)':'var(--text)',marginLeft:8}}>{r.scoped}</span>
        </div>
      ))}

      <div className="section-title" style={{marginTop:16}}>Secrets & token status</div>
      {secrets.map((s,i)=>(
        <div key={i} className="row-between" style={{fontSize:11,padding:'5px 0',borderBottom:'1px solid var(--border)'}}>
          <span style={{color:'var(--muted)',fontFamily:'monospace'}}>{s.item}</span>
          <span style={{color:s.status.startsWith('✓')?'var(--accent)':'var(--amber)',marginLeft:8}}>{s.status}</span>
        </div>
      ))}

      <div className="section-title" style={{marginTop:16}}>Google Calendar</div>
      <div className="card-sm" style={{fontSize:12}}>
        <div className="meta">Scopes: calendar.readonly + calendar.app.created</div>
        <div className="meta">Writes: dedicated Lovejoy OS calendar only ✓</div>
        <div className="meta">Existing events: protected — cannot edit or delete ✓</div>
        <div className="meta">Revoke: myaccount.google.com → Security → Third-party apps</div>
      </div>

      <div className="section-title" style={{marginTop:16}}>Edge Functions</div>
      {[['ai-chief-of-staff','Auth required ✓ · User-scoped ✓ · No secrets in logs ✓'],
        ['calendar','Auth required ✓ · Writes to Helm calendar only ✓'],
        ['weather','Auth required ✓ · API key server-side only ✓'],
      ].map(([n,d])=>(
        <div key={n} className="row-between" style={{fontSize:11,padding:'5px 0',borderBottom:'1px solid var(--border)'}}>
          <span style={{fontFamily:'monospace',color:'var(--muted)'}}>{n}</span>
          <span style={{color:'var(--accent)',fontSize:10}}>{d}</span>
        </div>
      ))}

      <div style={{marginTop:16,padding:'10px',background:'var(--surface2)',borderRadius:6,fontSize:11}}>
        <div style={{fontWeight:600,marginBottom:4}}>Full documentation</div>
        <div className="meta">SECURITY_REVIEW.md and 15_security_rls_fix.sql are in the project docs folder.</div>
        <div className="meta" style={{marginTop:4}}>Next review: September 2026 or before Gmail/Health/Finance integrations.</div>
      </div>
    </div>
  );
}

function FeaturesWikiPage() {
  const [features, setFeatures] = useState([]);
  const [loading, setLoading] = useState(true);
  const [openSections, setOpenSections] = useState(new Set(['live','experimental']));

  useEffect(()=>{
    supabase.from('roadmap')
      .select('id,name,description,status,feature_type,priority,sort_order,notes')
      .order('sort_order')
      .then(({data}) => { setFeatures(data||[]); setLoading(false); });
  },[]);

  const toggle = id => setOpenSections(prev => {
    const next = new Set(prev); next.has(id) ? next.delete(id) : next.add(id); return next;
  });

  // Status display config — order matters for page flow
  const STATUS_CONFIG = [
    { key:'live',         label:'Built and Working',    icon:'✅', colour:'var(--green)'   },
    { key:'experimental', label:'Experimental',          icon:'🧪', colour:'var(--amber)'   },
    { key:'in_progress',  label:'Currently Building',    icon:'🔨', colour:'var(--accent)'  },
    { key:'queued',       label:'Coming Next',           icon:'📋', colour:'var(--accent2)' },
    { key:'planned',      label:'Planned',               icon:'🗺️', colour:'var(--accent2)' },
    { key:'someday',      label:'Someday / Ideas',       icon:'💡', colour:'var(--muted)'   },
    { key:'idea',         label:'Someday / Ideas',       icon:'💡', colour:'var(--muted)'   },
    { key:'cancelled',    label:'Cancelled / Dropped',   icon:'🚫', colour:'var(--red)'     },
  ];

  const TYPE_LABELS = {
    core:'Core', helm:'Helm', calendar:'Calendar',
    integration:'Integration', safety:'Safety', infrastructure:'Infrastructure',
  };
  const TYPE_COLOURS = {
    core:'var(--accent)', helm:'var(--accent2)', calendar:'var(--green)',
    integration:'var(--amber)', safety:'var(--red)', infrastructure:'var(--muted)',
  };

  // Group features by status
  const grouped = {};
  features.forEach(f => { (grouped[f.status] = grouped[f.status]||[]).push(f); });

  // Merge 'idea' into 'someday' display
  if (grouped.idea && !grouped.someday) grouped.someday = grouped.idea;
  else if (grouped.idea && grouped.someday) grouped.someday = [...grouped.someday, ...grouped.idea];

  const Sec = ({id, icon, title, colour, count, children}) => {
    const isOpen = openSections.has(id);
    return (
      <div className="card" style={{marginBottom:10,borderLeft:`3px solid ${colour}`}}>
        <div className="row-between" style={{cursor:'pointer',userSelect:'none'}} onClick={()=>toggle(id)}>
          <div className="row" style={{gap:10}}>
            <span style={{fontSize:18}}>{icon}</span>
            <div className="name">{title}</div>
            {count>0 && <span className="pill pill-muted" style={{fontSize:10}}>{count}</span>}
          </div>
          <span style={{color:'var(--muted)',fontSize:11}}>{isOpen?'▲':'▼'}</span>
        </div>
        {isOpen && <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}}>{children}</div>}
      </div>
    );
  };

  const Recipe = ({title, steps}) => (
    <div className="card-sm" style={{background:'var(--surface2)',marginBottom:8}}>
      <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>📖 {title}</div>
      {steps.map((s,i)=>(
        <div key={i} style={{fontSize:12,color:'var(--muted)',marginBottom:4,display:'flex',gap:8}}>
          <span style={{color:'var(--accent)',flexShrink:0,minWidth:14}}>{i+1}.</span>
          <span style={{lineHeight:1.5}}>{s}</span>
        </div>
      ))}
    </div>
  );

  if (loading) return <div className="page"><div className="spinner"/></div>;

  return (
    <div className="page">
      <h1 style={{fontSize:20,fontWeight:700,marginBottom:4}}>Features Guide</h1>

// ── SYSTEM HEALTH PAGE (registry-driven) ──────────────────────
function SystemHealthPage({ onNavigate }) {
  const [health, setHealth]             = useState(null);
  const [billing, setBilling]           = useState(null);
  const [flags, setFlags]               = useState(null);
  const [loading, setLoading]           = useState(true);
  const [openCats, setOpenCats]         = useState(new Set(['Core','AI','Calendar','Monitoring']));
  const [openEntries, setOpenEntries]   = useState(new Set());
  const [editingBilling, setEditingBilling] = useState(false);
  const [billingForm, setBillingForm]   = useState({});
  const [savingBilling, setSavingBilling] = useState(false);
  const [exporting, setExporting]       = useState(false);
  const [exportDone, setExportDone]     = useState(false);

  const load = async () => {
    setLoading(true);
    const last7d  = new Date(Date.now() - 7*86400_000).toISOString();
    const last24h = new Date(Date.now() - 86400_000).toISOString();
    const monthStart = new Date().toISOString().slice(0,7) + '-01';
    const todayStart = localDateKey() + 'T00:00:00';
    const [sessRes, credRes, logsRes, reviewsRes, billingRes, flagsRes] = await Promise.all([
      supabase.auth.getSession(),
      supabase.from('google_credentials').select('helm_calendar_id').maybeSingle(),
      supabase.from('helm_logs').select('*').gte('created_at', last7d).order('created_at',{ascending:false}).limit(200),
      supabase.from('reviews').select('estimated_cost,title,created_at').gte('created_at', monthStart).order('created_at',{ascending:false}),
      supabase.from('billing_snapshots').select('*').maybeSingle(),
      supabase.from('feature_flags').select('*').maybeSingle(),
    ]);
    const cred    = credRes.data;
    const logs    = logsRes.data  || [];
    const reviews = reviewsRes.data || [];
    const lastCalRead  = logs.find(l=>l.function_name==='calendar'&&l.action==='read_events'&&l.status==='success');
    const lastHelmRun  = logs.find(l=>l.function_name==='ai-chief-of-staff'&&l.status==='success');
    const lastCalWrite = logs.find(l=>l.action==='create_block'&&l.status==='success');
    const lastExport   = logs.find(l=>l.action==='data_export'&&l.status==='success');
    const recentErrors = logs.filter(l=>l.status==='error'&&l.created_at>=last24h);
    const calConnectedViaLogs = !!lastCalRead;
    const helmCalViaLogs = logs.some(l=>l.action==='setup_helm_calendar'&&l.status==='success') ||
                           logs.some(l=>l.action==='create_block'&&l.status==='success');
    const monthlySpend  = reviews.reduce((s,r)=>s+(r.estimated_cost||0),0);
    const helmsThisMonth = reviews.length;
    const helmsToday = reviews.filter(r=>r.created_at>=todayStart).length;
    const lastBrief  = reviews[0]||null;
    setHealth({ session:sessRes.data?.session, cred, logs, lastCalRead, lastHelmRun, lastCalWrite,
      lastExport, recentErrors, calConnectedViaLogs, helmCalViaLogs, helmCalId:cred?.helm_calendar_id||null,
      monthlySpend, helmsThisMonth, helmsToday, lastBrief });
    setBilling(billingRes.data);
    setBillingForm(billingRes.data||{ credit_balance:'4.40', monthly_limit:'5.00', auto_reload:'off' });
    setFlags(flagsRes.data);
    setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  const saveBilling = async () => {
    setSavingBilling(true);
    const { data:{user} } = await supabase.auth.getUser();
    if (user) {
      await supabase.from('billing_snapshots').upsert({
        user_id: user.id,
        credit_balance: parseFloat(billingForm.credit_balance)||null,
        monthly_limit: parseFloat(billingForm.monthly_limit)||null,
        auto_reload: billingForm.auto_reload||'off',
        billing_url: BILLING_URL,
        snapshot_at: new Date().toISOString(),
      },{ onConflict:'user_id' });
      await load();
    }
    setSavingBilling(false); setEditingBilling(false);
  };

  const exportData = async () => {
    setExporting(true);
    const { data:{user} } = await supabase.auth.getUser();
    const tables = ['areas','roles','projects','tasks','waiting_for','decisions','assets',
      'contacts','notes','reviews','helm_settings','proposed_actions','automation_rules',
      'roadmap','billing_snapshots','feature_flags'];
    const result = { _meta:{
      exported_at: new Date().toISOString(), version:'1.0',
      note:'Lovejoy OS data backup. Does not include secrets, tokens or API keys.',
      excluded_tables:['google_credentials','auth.users','helm_logs'],
    }};
    for (const t of tables) {
      const {data} = await supabase.from(t).select('*');
      result[t] = data||[];
    }
    // Log the export so System Health can show last backup time
    if (user) {
      await supabase.from('helm_logs').insert({
        user_id:user.id, function_name:'app', action:'data_export', status:'success',
        meta:{ tables_count: tables.length, exported_at: new Date().toISOString() },
      });
    }
    const blob = new Blob([JSON.stringify(result,null,2)],{type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download=`lovejoy-os-backup-${localDateKey()}.json`; a.click();
    URL.revokeObjectURL(url);
    setExporting(false); setExportDone(true);
    setTimeout(()=>setExportDone(false),3000);
  };

  if (loading) return <div className="page"><div className="spinner"/></div>;

  // Status colour map
  const STATUS_COLOUR = {
    'Working':'var(--green)', 'Connected':'var(--green)', 'Configured':'var(--green)',
    'Manual snapshot only':'var(--amber)', 'Needs reconnect':'var(--amber)', 'Unknown':'var(--muted)',
    'Not configured':'var(--muted)', 'Disabled':'var(--muted)', 'Failed':'var(--red)',
    'Planned':'var(--accent2)', 'Not signed in':'var(--red)',
  };

  const getEntryStatus = entry => entry.getStatus(health, flags, billing);

  // Summary counts (live systems only)
  const liveSystems = SYSTEM_REGISTRY.filter(e=>!e.plannedOnly);
  const workingCount = liveSystems.filter(e=>['Working','Connected','Configured','Manual snapshot only'].includes(getEntryStatus(e).status)).length;
  const attentionCount = liveSystems.filter(e=>['Unknown','Needs reconnect','Not configured','Failed'].includes(getEntryStatus(e).status)).length;
  const plannedCount = SYSTEM_REGISTRY.filter(e=>e.plannedOnly).length;

  const CATEGORIES = ['Core','AI','Calendar','Monitoring','Config','Planned'];
  const CAT_ICONS = { Core:'🏛️', AI:'🧭', Calendar:'📅', Monitoring:'📊', Config:'⚙️', Planned:'🗺️' };

  const toggleCat = id => setOpenCats(p=>{ const n=new Set(p); n.has(id)?n.delete(id):n.add(id); return n; });
  const toggleEntry = id => setOpenEntries(p=>{ const n=new Set(p); n.has(id)?n.delete(id):n.add(id); return n; });

  const ACCESS_LABEL = { 'read-only':'Read only', 'read-write':'Read + write', 'approval-gated':'Approval-gated', 'none':'No data access' };

  const balance   = parseFloat(billing?.credit_balance)||0;
  const limit     = parseFloat(billing?.monthly_limit)||0;
  const spent     = health.monthlySpend||0;
  const remaining = billing ? Math.max(0, balance - spent) : null;
  const balanceLow  = billing && balance < 1.00;
  const limitClose  = billing && limit>0 && spent/limit > 0.8;

  return (
    <div className="page">
      <div className="row-between" style={{marginBottom:4}}>
        <h1 style={{fontSize:20,fontWeight:700}}>System Health</h1>
        <button className="btn btn-ghost btn-sm" onClick={load}>↻ Refresh</button>
      </div>
      <div className="meta" style={{marginBottom:14}}>Status of all background systems, connections and integrations.</div>

      {/* Summary bar */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
        {[
          {label:'Working',val:workingCount,colour:'var(--green)'},
          {label:'Needs attention',val:attentionCount,colour:attentionCount>0?'var(--amber)':'var(--muted)'},
          {label:'Planned',val:plannedCount,colour:'var(--accent2)'},
        ].map(s=>(
          <div key={s.label} className="card-sm" style={{textAlign:'center',padding:'10px 6px'}}>
            <div style={{fontSize:22,fontWeight:700,color:s.colour,lineHeight:1}}>{s.val}</div>
            <div className="meta" style={{marginTop:3,fontSize:11}}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Registry by category */}
      {CATEGORIES.map(cat=>{
        const entries = SYSTEM_REGISTRY.filter(e=>e.category===cat);
        if (entries.length===0) return null;
        const isOpen = openCats.has(cat);
        const catErrors = entries.filter(e=>['Failed','Needs reconnect'].includes(getEntryStatus(e).status)).length;
        const catWarns  = entries.filter(e=>['Unknown','Not configured'].includes(getEntryStatus(e).status)).length;
        return (
          <div key={cat} className="card" style={{marginBottom:10}}>
            <div className="row-between" style={{cursor:'pointer',userSelect:'none'}} onClick={()=>toggleCat(cat)}>
              <div className="row" style={{gap:8}}>
                <span style={{fontSize:16}}>{CAT_ICONS[cat]}</span>
                <div className="name">{cat}</div>
                {catErrors>0 && <span className="pill pill-red">{catErrors} issue{catErrors!==1?'s':''}</span>}
                {catErrors===0&&catWarns>0 && <span className="pill pill-amber">{catWarns} unknown</span>}
              </div>
              <span style={{color:'var(--muted)',fontSize:11}}>{isOpen?'▲':'▼'}</span>
            </div>
            {isOpen && (
              <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}}>
                {entries.map(entry=>{
                  const st = getEntryStatus(entry);
                  const isExpanded = openEntries.has(entry.id);
                  const statusColour = STATUS_COLOUR[st.status]||'var(--muted)';
                  return (
                    <div key={entry.id} style={{paddingBottom:10,marginBottom:10,borderBottom:'1px solid var(--border)'}}>
                      <div className="row-between" style={{cursor:'pointer'}} onClick={()=>toggleEntry(entry.id)}>
                        <div style={{flex:1,minWidth:0}}>
                          <div className="row" style={{gap:6,marginBottom:2}}>
                            <span style={{fontSize:13,fontWeight:500}}>{entry.name}</span>
                            {entry.required && <span style={{fontSize:9,color:'var(--amber)',textTransform:'uppercase',flexShrink:0}}>required</span>}
                          </div>
                          {!isExpanded && st.detail && <div className="meta">{st.detail}</div>}
                        </div>
                        <span style={{fontSize:12,fontWeight:600,color:statusColour,flexShrink:0,marginLeft:8}}>{st.status}</span>
                      </div>
                      {isExpanded && (
                        <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)'}}>
                          <div className="meta" style={{marginBottom:8,lineHeight:1.5}}>{entry.description}</div>
                          {st.detail && <div className="meta" style={{marginBottom:4}}>Status detail: {st.detail}</div>}
                          {st.lastSuccess && <div className="meta" style={{marginBottom:6}}>Last success: {relTime(st.lastSuccess)} ({new Date(st.lastSuccess).toLocaleDateString('en-GB')})</div>}
                          <div className="row" style={{gap:6,flexWrap:'wrap',marginBottom:8}}>
                            <span className="pill pill-muted">{ACCESS_LABEL[entry.accessType]||entry.accessType}</span>
                            {entry.usesSecrets && <span className="pill pill-muted">Uses secrets (server-side only)</span>}
                            {entry.required ? <span className="pill pill-amber">Required</span> : <span className="pill pill-muted">Optional</span>}
                          </div>
                          {entry.settingsPage && entry.settingsPage!=='systemhealth' && (
                            <button className="btn btn-ghost btn-sm" onClick={()=>onNavigate(entry.settingsPage)}>
                              Open {entry.settingsPage==='debug'?'Debug Log':entry.settingsPage==='calendar'?'Calendar':'Settings'} →
                            </button>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}

      {/* Billing card (interactive — needs edit UI) */}
      <div className="section-title">Billing Detail</div>
      <div className="card" style={{marginBottom:10}}>
        {(balanceLow||limitClose) && (
          <div style={{background:'rgba(245,158,11,0.08)',border:'1px solid rgba(245,158,11,0.25)',borderRadius:6,padding:'8px 10px',marginBottom:12,fontSize:12,color:'var(--amber)',lineHeight:1.5}}>
            {balanceLow && <div>⚠ Credit balance low (${balance.toFixed(2)}). Top up at Claude Console.</div>}
            {limitClose && <div>⚠ Approaching monthly limit (${spent.toFixed(4)} of ${limit.toFixed(2)} used).</div>}
          </div>
        )}
        {!editingBilling ? (
          <>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
              {[
                {label:'Credit balance',   val:billing?`$${parseFloat(billing.credit_balance||0).toFixed(2)}`:'—', warn:balanceLow},
                {label:'Monthly limit',    val:billing?`$${parseFloat(billing.monthly_limit||0).toFixed(2)}`:'—'},
                {label:'Spend this month', val:`$${spent.toFixed(4)}`, sub:'from Helm data'},
                {label:'Remaining',        val:remaining!==null?`$${remaining.toFixed(4)}`:'—', warn:remaining!==null&&remaining<0.50},
              ].map(s=>(
                <div key={s.label} className="card-sm" style={{textAlign:'center',background:'var(--surface2)'}}>
                  <div style={{fontSize:18,fontWeight:700,color:s.warn?'var(--amber)':'var(--text)',lineHeight:1}}>{s.val}</div>
                  <div className="meta" style={{marginTop:3}}>{s.label}</div>
                  {s.sub && <div style={{fontSize:10,color:'var(--muted)'}}>{s.sub}</div>}
                </div>
              ))}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
              {[{label:'Helm runs today',val:health.helmsToday},{label:'Helm runs this month',val:health.helmsThisMonth}].map(s=>(
                <div key={s.label} className="card-sm" style={{textAlign:'center',background:'var(--surface2)'}}>
                  <div style={{fontSize:22,fontWeight:700,lineHeight:1}}>{s.val}</div>
                  <div className="meta" style={{marginTop:3}}>{s.label}</div>
                </div>
              ))}
            </div>
            <div className="meta" style={{marginBottom:12}}>
              Auto-reload: {billing?.auto_reload||'Off'} · Balance manually entered{billing?.snapshot_at?` · Updated ${relTime(billing.snapshot_at)}`:''}
            </div>
            <div className="row" style={{gap:8}}>
              <button className="btn btn-primary btn-sm" onClick={()=>window.open(BILLING_URL,'_blank')}>Open Claude Billing ↗</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>{setBillingForm(billing||{credit_balance:'4.40',monthly_limit:'5.00',auto_reload:'off'});setEditingBilling(true);}}>Update snapshot</button>
            </div>
          </>
        ) : (
          <div>
            <div className="field"><label className="label">Credit balance (USD)</label>
              <input className="input" type="number" step="0.01" value={billingForm.credit_balance||''} onChange={e=>setBillingForm(p=>({...p,credit_balance:e.target.value}))} placeholder="4.40"/>
            </div>
            <div className="field"><label className="label">Monthly spend limit (USD)</label>
              <input className="input" type="number" step="0.01" value={billingForm.monthly_limit||''} onChange={e=>setBillingForm(p=>({...p,monthly_limit:e.target.value}))} placeholder="5.00"/>
            </div>
            <div className="field"><label className="label">Auto-reload</label>
              <select className="input" value={billingForm.auto_reload||'off'} onChange={e=>setBillingForm(p=>({...p,auto_reload:e.target.value}))}>
                <option value="off">Off</option><option value="on">On</option>
              </select>
            </div>
            <div className="row" style={{gap:8}}>
              <button className="btn btn-primary btn-sm" onClick={saveBilling} disabled={savingBilling}>{savingBilling?'Saving…':'Save snapshot'}</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>setEditingBilling(false)}>Cancel</button>
            </div>
          </div>
        )}
      </div>

      {/* Data export */}
      <div className="section-title">Data Export</div>
      <div className="card" style={{marginBottom:10}}>
        <div className="meta" style={{marginBottom:12,lineHeight:1.6}}>
          Download all Lovejoy OS data as a JSON backup. Excludes secrets, tokens and API keys.
          {health.lastExport && <span style={{color:'var(--muted)'}}> · Last backup {relTime(health.lastExport.created_at)}</span>}
        </div>
        <button className="btn btn-primary" style={{justifyContent:'center',width:'100%'}} onClick={exportData} disabled={exporting}>
          {exporting?'Preparing…':exportDone?'✓ Downloaded':'⬇ Download backup'}
        </button>
      </div>

      {/* Quick links */}
      <div className="section-title">Quick Links</div>
      <div className="card">
        {[
          {label:'Debug Log', fn:()=>onNavigate('debug')},
          {label:'Helm Settings', fn:()=>onNavigate('helmsettings')},
          {label:'Features Guide', fn:()=>onNavigate('features')},
          {label:'Claude Console Billing ↗', fn:()=>window.open(BILLING_URL,'_blank')},
          {label:'Supabase Dashboard ↗', fn:()=>window.open('https://supabase.com/dashboard','_blank')},
        ].map((l,i)=>(
          <div key={i} style={{padding:'9px 0',borderBottom:'1px solid var(--border)',cursor:'pointer'}} onClick={l.fn}>
            <div style={{fontSize:13,color:'var(--accent)'}}>{l.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}



// ── DEBUG PAGE ────────────────────────────────────────────────
function DebugPage() {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [expanded, setExpanded] = useState(new Set());

  const load = async () => {
    setLoading(true);
    const { data } = await supabase.from('helm_logs')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(50);
    setLogs(data || []);
    setLoading(false);
  };

  useEffect(()=>{ load(); },[]);

  const clearLogs = async () => {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return;
    await supabase.from('helm_logs').delete().eq('user_id', user.id);
    setLogs([]);
  };

  const toggle = (id) => setExpanded(prev => {
    const next = new Set(prev);
    if (next.has(id)) next.delete(id); else next.add(id);
    return next;
  });

  const statusColour = s => s==='error'?'var(--red)':s==='warning'?'var(--amber)':'var(--green)';
  const statusIcon   = s => s==='error'?'✗':s==='warning'?'⚠':'✓';

  if (loading) return <div className="page"><div className="spinner"/></div>;

  return (
    <div className="page">
      <div className="row-between" style={{marginBottom:4}}>
        <h1 style={{fontSize:20,fontWeight:700}}>Debug Log</h1>
        <div className="row" style={{gap:8}}>
          <button className="btn btn-ghost btn-sm" onClick={load}>↻ Refresh</button>
          <button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={clearLogs}>Clear</button>
        </div>
      </div>
      <div className="meta" style={{marginBottom:14}}>Last 50 Edge Function calls. Tap any entry to see full detail.</div>

      {logs.length === 0 && (
        <div className="empty"><div className="empty-icon">🪵</div>No logs yet — logs appear here after the first Helm or Calendar action.</div>
      )}

      {logs.map(log => {
        const isOpen = expanded.has(log.id);
        const colour = statusColour(log.status);
        return (
          <div key={log.id} className="card-sm" style={{marginBottom:6,borderLeft:`3px solid ${colour}`,cursor:'pointer'}} onClick={()=>toggle(log.id)}>
            <div className="row-between">
              <div className="row" style={{gap:6,flex:1,minWidth:0}}>
                <span style={{fontSize:12,color:colour,flexShrink:0}}>{statusIcon(log.status)}</span>
                <span style={{fontSize:12,fontWeight:600,flexShrink:0}}>{log.function_name}</span>
                {log.action && <span className="pill pill-muted" style={{fontSize:10}}>{log.action.replace(/_/g,' ')}</span>}
              </div>
              <div className="row" style={{gap:8,flexShrink:0,marginLeft:8}}>
                {log.duration_ms != null && <span className="meta">{log.duration_ms}ms</span>}
                <span className="meta">{fmtTime(log.created_at)}</span>
              </div>
            </div>

            {log.error_code && (
              <div style={{fontSize:11,color:'var(--red)',marginTop:3,fontFamily:'monospace'}}>{log.error_code}</div>
            )}

            {log.meta && Object.keys(log.meta).length>0 && (
              <div className="meta" style={{marginTop:2}}>
                {Object.entries(log.meta).map(([k,v])=>`${k}: ${v}`).join(' · ')}
              </div>
            )}

            {isOpen && log.error_detail && (
              <div style={{fontSize:11,color:'var(--muted)',marginTop:8,wordBreak:'break-all',lineHeight:1.5,background:'var(--bg)',padding:8,borderRadius:6,fontFamily:'monospace'}}>
                {log.error_detail}
              </div>
            )}

            {isOpen && !log.error_detail && (
              <div className="meta" style={{marginTop:6}}>No error detail. Created at {new Date(log.created_at).toLocaleString('en-GB', {timeZone:'Europe/London'})}.</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── HELM SETTINGS PAGE ────────────────────────────────────────
function HelmSettingsPage() {
  const [s, setS] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saved, setSaved] = useState(false);

  useEffect(()=>{ loadHelmSettings().then(v=>{ setS(v); setLoading(false); }); },[]);

  const upd = (k,v) => { setS(p=>({...p,[k]:v})); setSaved(false); };

  const save = async () => {
    await saveHelmSettings(s);
    setSaved(true);
    setTimeout(()=>setSaved(false), 2500);
  };

    const arr = [...s.priority_ranking];

  return (

        ]}/>
        <Segmented label="Suggestion strictness" k="suggestion_strictness" options={[
          {v:'free',label:'Suggest freely'},{v:'high_confidence',label:'High-confidence only'},{v:'ask_major',label:'Ask before major changes'},
        ]}/>

      <div className="card">
        <div className="section-title" style={{marginTop:0}}>How {ASSISTANT_NAME} plans</div>
        <Segmented label="Default energy assumption" k="default_energy" options={[
          {v:'high',label:'High'},{v:'medium',label:'Medium'},{v:'low',label:'Low'},{v:'ask',label:'Ask each time'},
        ]}/>
        <Segmented label="Workload bias" k="workload_bias" options={[

        ]}/>
        <Segmented label="Weekend behaviour" k="weekend_behaviour" options={[
