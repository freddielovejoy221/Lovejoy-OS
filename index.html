        <div style={{marginTop:4}}>
          <Toggle label="Allow focus blocks" k="allow_focus_blocks"/>
          <Toggle label="Allow travel buffers" k="allow_travel_buffers"/>
          <Toggle label="Allow workout blocks" k="allow_workout_blocks"/>
          <Toggle label="Allow admin blocks" k="allow_admin_blocks"/>
        </div>
      </div>

      <div className="card">
        <div className="section-title" style={{marginTop:0}}>Personal priorities</div>
        <div className="meta" style={{marginBottom:10}}>Rank what matters most. {ASSISTANT_NAME} weights its advice toward the top.</div>
        {s.priority_ranking.map((key,i)=>(
          <div key={key} className="card-sm" style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
            <div className="row" style={{gap:8}}>
              <span style={{fontSize:11,color:'var(--muted)',width:18}}>{i+1}.</span>
              <span style={{fontSize:13}}>{priorityLabels[key]||key}</span>
            </div>
            <div className="row" style={{gap:4}}>
              <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>movePriority(i,-1)} disabled={i===0} style={{opacity:i===0?0.3:1}}>↑</button>
              <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>movePriority(i,1)} disabled={i===s.priority_ranking.length-1} style={{opacity:i===s.priority_ranking.length-1?0.3:1}}>↓</button>
            </div>
          </div>
        ))}
      </div>

      <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:'12px',marginTop:4}} onClick={save}>
        {saved ? '✓ Settings saved' : 'Save settings'}
      </button>
    </div>
  );
}

// ── PROPOSED ACTIONS (approve / reject / edit) ────────────────
// Each proposal is its own card. Nothing writes until Approve is
// tapped. Edit lets you change details first. Every outcome is
// logged to proposed_actions (the audit trail).
function ProposedActions({ changes, sourceRequest }) {
  // status per card: 'pending' | 'approved' | 'rejected' | 'failed'
  const [states, setStates] = useState(() => changes.map(c => ({ status:'pending', edited:{...c}, editing:false, note:'' })));
  const [names, setNames] = useState({}); // {task_id/project_id/decision_id: name}

  // Resolve human names for any ids referenced in the proposals
  useEffect(()=>{
    (async ()=>{
      const taskIds = changes.filter(c=>c.task_id).map(c=>c.task_id);
      const anchorIds = changes.filter(c=>c.anchor_task_id).map(c=>c.anchor_task_id);
      const allTaskIds = [...new Set([...taskIds, ...anchorIds])];
      const projIds = changes.filter(c=>c.project_id).map(c=>c.project_id);
      const decIds  = changes.filter(c=>c.decision_id).map(c=>c.decision_id);
      const out = {};
      try {
        if (allTaskIds.length) {
          const {data} = await supabase.from('tasks').select('id,name,status,priority,due_date').in('id',allTaskIds);
          (data||[]).forEach(t=>out[t.id]={...t});
        }
        if (projIds.length) {
          const {data} = await supabase.from('projects').select('id,name').in('id',projIds);
          (data||[]).forEach(p=>out[p.id]={name:p.name});
        }
        if (decIds.length) {
          const {data} = await supabase.from('decisions').select('id,name').in('id',decIds);
          (data||[]).forEach(d=>out[d.id]={name:d.name});
        }
      } catch(e) {}
      setNames(out);
    })();
  },[]);

  // Human-readable description of what a change will do
  const describe = (c) => {
    const tName = c.task_id && names[c.task_id]?.name;
    const pName = c.project_id && names[c.project_id]?.name;
    const dName = c.decision_id && names[c.decision_id]?.name;
    switch (c.type) {
      case 'create_task': return `Create a task: "${c.name}"`;
      case 'update_project_next_action': return `Set next action${pName?' on "'+pName+'"':' on a project'}: "${c.task_name || c.name}"`;
      case 'update_task_priority': return tName ? `Change "${tName}" priority to ${c.priority}` : `Change a task's priority to ${c.priority}`;
      case 'create_waiting_for': return `Track waiting for: "${c.name}"${c.waiting_on ? ` (from ${c.waiting_on})` : ''}`;
      case 'update_decision_status': return dName ? `Mark "${dName}" as ${c.status}` : `Mark a decision as ${c.status}`;
      case 'create_calendar_block': return `Block calendar: "${c.title}" ${c.date || ''} ${c.start_time || ''}–${c.end_time || ''}`;
      case 'archive_project': return pName ? `Archive "${pName}"` : `Archive a project`;
      case 'set_focus_queue': { const aName = c.anchor_task_id && names[c.anchor_task_id]?.name; return aName ? `Set today's Focus Queue — anchor: "${aName}"` : `Set today's Focus Queue`; }
      case 'shrink_task': return tName ? `Shrink "${tName}" → "${c.shrunk_name}"` : `Shrink a task → "${c.shrunk_name}"`;
      default: return c.type;
    }
  };

  // Which fields are editable per action type
  const editableFields = (type) => {
    if (type === 'create_task') return [['name','Task title','text'],['due_date','Due date','date'],['priority','Priority','priority'],['notes','Notes','text']];
    if (type === 'update_project_next_action') return [['task_name','Next action','text'],['due_date','Due date','date'],['priority','Priority','priority']];
    if (type === 'create_waiting_for') return [['name','Waiting for','text'],['waiting_on','From whom','text'],['due_date','Expected by','date']];
    if (type === 'update_decision_status') return [['status','New status','decstatus'],['outcome','Outcome','text']];
    if (type === 'create_calendar_block') return [['title','Title','text'],['date','Date','date'],['start_time','Start','time'],['end_time','End','time']];
    if (type === 'update_task_priority') return [['priority','Priority','priority']];
    if (type === 'shrink_task') return [['shrunk_name','Smaller next action','text']];
    return [];
  };

  const setCard = (i, patch) => setStates(prev => prev.map((s,idx)=> idx===i ? {...s, ...patch} : s));
  const setField = (i, key, val) => setStates(prev => prev.map((s,idx)=> idx===i ? {...s, edited:{...s.edited, [key]:val}} : s));

  const approve = async (i, wasEdited) => {
    const card = states[i];
    const c = card.edited;
    setCard(i, { status:'applying' });
    const res = await applyProposedAction(c.type, c);
    await logProposal({
      action_type: c.type,
      explanation: c.rationale || '',
      payload: changes[i],
      final_payload: c,
      status: res.ok ? (wasEdited ? 'edited_approved' : 'approved') : 'failed',
      result_ref: res.ref,
      result_note: res.note,
      source_request: sourceRequest,
    });
    setCard(i, { status: res.ok ? 'approved' : 'failed', note: res.note || '', editing:false });
  };

  const reject = async (i) => {
    const c = states[i].edited;
    await logProposal({
      action_type: c.type,
      explanation: c.rationale || '',
      payload: changes[i],
      status: 'rejected',
      source_request: sourceRequest,
    });
    setCard(i, { status:'rejected' });
  };

  // Mark the referenced task complete instead of changing priority
  const markComplete = async (i) => {
    const c = states[i].edited;
    if (!c.task_id) return;
    setCard(i, { status:'applying' });
    try {
      const { error } = await supabase.from('tasks').update({ status:'done', completed_at:new Date().toISOString() }).eq('id', c.task_id);
      if (error) { setCard(i,{status:'failed', note:error.message}); return; }
      await logProposal({
        action_type: 'complete_task',
        explanation: 'Marked complete instead of raising priority',
        payload: changes[i],
        final_payload: { task_id:c.task_id, status:'done' },
        status: 'edited_approved',
        result_ref: c.task_id,
        source_request: sourceRequest,
      });
      setCard(i, { status:'approved', note:'Marked complete ✓', editing:false });
    } catch(e) { setCard(i,{status:'failed', note:String(e)}); }
  };

  // Visual identity per proposal type
  const typeMeta = {
    create_task:                {icon:'✅', colour:'#4f7cff', label:'New task'},
    update_project_next_action: {icon:'🎯', colour:'#7c5cfc', label:'Next action'},
    update_task_priority:       {icon:'⬆️', colour:'#f59e0b', label:'Priority change'},
    create_waiting_for:         {icon:'⏳', colour:'#7c5cfc', label:'Waiting for'},
    update_decision_status:     {icon:'⚖️', colour:'#22c55e', label:'Decision'},
    create_calendar_block:      {icon:'📅', colour:'#039be5', label:'Calendar block'},
    archive_project:            {icon:'📦', colour:'#7b82a0', label:'Archive'},
    set_focus_queue:            {icon:'🧭', colour:'#4f7cff', label:'Focus queue'},
    shrink_task:                {icon:'✂️', colour:'#22c55e', label:'Shrink task'},
  };

  return (
    <div className="card" style={{marginBottom:10,borderLeft:'3px solid var(--accent2)',background:'linear-gradient(135deg, rgba(124,92,252,0.06), transparent 70%)'}}>
      <div className="row" style={{gap:8,marginBottom:6}}>
        <div style={{width:26,height:26,borderRadius:8,background:'rgba(124,92,252,0.15)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0}}>🧭</div>
        <div style={{fontSize:13,fontWeight:700,color:'var(--accent2)'}}>Proposed by {ASSISTANT_NAME}</div>
      </div>
      <div className="meta" style={{marginBottom:12}}>Nothing changes until you approve. Edit any proposal first if you want to tweak it.</div>

      {states.map((card, i) => {
        const c = card.edited;
        const tm = typeMeta[c.type] || {icon:'•', colour:'var(--muted)', label:(c.type||'change').replace(/_/g,' ')};
        const done = card.status==='approved';
        const dead = card.status==='rejected';
        return (
          <div key={i} style={{background:'var(--surface2)',borderRadius:12,marginBottom:8,padding:'12px',borderLeft:'3px solid '+(done?'var(--green)':dead?'var(--border)':tm.colour),opacity:dead?0.55:1}}>
            <div className="row" style={{gap:10,alignItems:'flex-start'}}>
              <div style={{width:34,height:34,borderRadius:10,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,background:done?'rgba(34,197,94,0.15)':'rgba(124,92,252,0.08)',border:'1px solid '+(done?'rgba(34,197,94,0.3)':tm.colour+'33')}}>{done?'✓':tm.icon}</div>
              <div style={{flex:1,minWidth:0}}>
                <div className="row-between" style={{marginBottom:2}}>
                  <span style={{fontSize:10,fontWeight:700,color:tm.colour,textTransform:'uppercase',letterSpacing:'0.05em'}}>{tm.label}</span>
                  {done && <span className="pill pill-green" style={{fontSize:9}}>Approved</span>}
                  {dead && <span className="pill pill-muted" style={{fontSize:9}}>Rejected</span>}
                  {card.status==='failed' && <span className="pill pill-red" style={{fontSize:9}}>Failed</span>}
                </div>
                <div style={{fontSize:13,fontWeight:600,color:'var(--text)',lineHeight:1.4}}>{describe(c)}</div>
                {c.rationale && <div className="meta" style={{marginTop:4,lineHeight:1.45}}>{c.rationale}</div>}

                {/* Editing form */}
                {card.editing && card.status==='pending' && (
                  <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}}>
                    {editableFields(c.type).map(([key,label,kind])=>(
                      <div className="field" key={key} style={{marginBottom:8}}>
                        <label className="label">{label}</label>
                        {kind==='priority' ? (
                          <select className="input" value={c[key]||'medium'} onChange={e=>setField(i,key,e.target.value)}>
                            <option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>
                          </select>
                        ) : kind==='decstatus' ? (
                          <select className="input" value={c[key]||'decided'} onChange={e=>setField(i,key,e.target.value)}>
                            <option value="decided">Decided</option><option value="deferred">Deferred</option><option value="dropped">Dropped</option>
                          </select>
                        ) : (
                          <input className="input" type={kind==='date'?'date':kind==='time'?'time':'text'} value={c[key]||''} onChange={e=>setField(i,key,e.target.value)}/>
                        )}
                      </div>
                    ))}
                  </div>
                )}

                {/* Action buttons */}
                {card.status==='pending' && (
                  <div className="row" style={{gap:6,marginTop:10,flexWrap:'wrap'}}>
                    <button className="btn btn-primary btn-sm" onClick={()=>approve(i, card.editing)}>Approve</button>
                    {(c.type==='update_task_priority' && c.task_id && names[c.task_id]?.status!=='done') && (
                      <button className="btn btn-ghost btn-sm" style={{color:'var(--green)'}} onClick={()=>markComplete(i)}>✓ Mark complete</button>
                    )}
                    <button className="btn btn-ghost btn-sm" onClick={()=>setCard(i,{editing:!card.editing})}>{card.editing?'Done':'Edit'}</button>
                    <button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={()=>reject(i)}>Reject</button>
                  </div>
                )}
                {card.status==='applying' && <div className="meta" style={{marginTop:6}}>Applying…</div>}
                {card.status==='failed' && <div className="meta" style={{marginTop:6,color:'var(--red)'}}>{card.note}</div>}
                {done && <div className="meta" style={{marginTop:6,color:'var(--green)'}}>{card.note||'Done — added to your system.'}</div>}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function HealthPage() {
  const [hs,       setHs]       = useState(null);
  const [latest,   setLatest]   = useState(null);
  const [workouts, setWorkouts] = useState([]);
  const [saving,   setSaving]   = useState(false);
  const [tab,      setTab]      = useState('status');
  const [withings, setWithings] = useState(null); // {connected, last_sync}
  const [wSyncing, setWSyncing] = useState(false);
  const [goals,    setGoals]    = useState({});

  useEffect(()=>{ load(); },[]);

  const load = async () => {
    const {data:{user}} = await supabase.auth.getUser();
    if (!user) return;
    const today = new Date().toISOString().slice(0,10);
    const [hsRes, snapRes, wRes] = await Promise.all([
      supabase.from('health_settings').select('*').eq('user_id',user.id).maybeSingle(),
      supabase.from('health_daily_snapshots').select('*').eq('user_id',user.id).order('date',{ascending:false}).limit(1).maybeSingle(),
      supabase.from('health_workouts').select('*').eq('user_id',user.id).eq('date',today).order('start_time'),
    ]);
    setHs(hsRes.data || {enabled:true,preferred_source:'apple_health_bridge',include_in_helm:true});
    setLatest(snapRes.data);
    setWorkouts(wRes.data||[]);
    // Load goals
    try {
      const gRes = await supabase.from('health_goals').select('*').eq('user_id',user.id);
      const g={}; (gRes.data||[]).forEach(x=>g[x.metric]=x); setGoals(g);
    } catch(e) {}
    // Withings connection status
    try {
      const {data:{session}} = await supabase.auth.getSession();
      if (session) {
        const res = await fetch(SUPABASE_URL+'/functions/v1/withings-auth?action=status', {
          headers: { 'Authorization':'Bearer '+session.access_token, 'apikey':SUPABASE_KEY }
        });
        const d = await res.json();
        setWithings(d);
      }
    } catch(e) { setWithings({connected:false}); }
  };

  const [wConnecting, setWConnecting] = useState(false);
  const [wError,      setWError]      = useState(null);

  const saveGoal = async (metric, patch) => {
    const {data:{user}} = await supabase.auth.getUser();
    if (!user) return;
    const existing = goals[metric] || {metric, goal_type:'track', enabled:true};
    const merged = {...existing, ...patch, user_id:user.id, metric, updated_at:new Date().toISOString()};
    setGoals({...goals, [metric]:merged});
    await supabase.from('health_goals').upsert(merged, {onConflict:'user_id,metric'});
  };

  const connectWithings = async () => {
    setWConnecting(true); setWError(null);
    try {

      const redirectUri = window.location.origin + window.location.pathname;
      const res = await fetch(SUPABASE_URL+'/functions/v1/withings-auth', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token,'apikey':SUPABASE_KEY},
        body: JSON.stringify({ action:'get_auth_url', redirect_uri: redirectUri }),
      });
      if (!res.ok) { setWError('Edge Function error: ' + res.status + ' — is withings-auth deployed?'); setWConnecting(false); return; }
      const d = await res.json();
      if (d.url) { window.location.href = d.url; }
      else { setWError(d.error || JSON.stringify(d)); setWConnecting(false); }
    } catch(e) {
      setWError('Network error — is the withings-auth Edge Function deployed? ' + e.message);
      setWConnecting(false);
    }
  };

  const syncWithings = async () => {
    setWSyncing(true);
    const {data:{session}} = await supabase.auth.getSession();

        method:'POST',

      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token,'apikey':SUPABASE_KEY},

const GOAL_METRICS = [
  {key:'weight_kg',      label:'Weight',      unit:'kg',   defType:'track'},
  {key:'body_fat_pct',   label:'Body fat',    unit:'%',    defType:'lose'},
  {key:'muscle_mass_kg', label:'Muscle mass', unit:'kg',   defType:'gain'},
  {key:'systolic_bp',    label:'Systolic BP', unit:'mmHg', defType:'maintain'},
  {key:'diastolic_bp',   label:'Diastolic BP',unit:'mmHg', defType:'maintain'},
];

// Determine zone colour from value + goal + trend
function evalGoalZone(metric, value, goal, trendDir) {
  // trendDir: -1 falling, 0 flat, +1 rising (over last 7 days)
  if (value == null) return {zone:'none', colour:'var(--muted)'};
  if (!goal || goal.goal_type === 'track' || !goal.enabled) return {zone:'track', colour:'var(--muted)'};

  const {goal_type, target_min, target_max, target_value} = goal;

  // In-range check (green)
  if (target_min != null && target_max != null) {
    if (value >= target_min && value <= target_max) return {zone:'good', colour:'var(--accent)'};
    // Close to range = orange, far = red
    const dist = value < target_min ? (target_min - value) : (value - target_max);
    const span = Math.max((target_max - target_min), 1);
    return dist <= span*0.5 ? {zone:'warn', colour:'var(--amber)'} : {zone:'bad', colour:'var(--red,#e55)'};
  }

  // Direction-based when no explicit range
  if (target_value != null) {
    const off = value - target_value;
    const goodDir = goal_type === 'lose' ? off <= 0 : goal_type === 'gain' ? off >= 0 : Math.abs(off) < target_value*0.05;
    if (goodDir) return {zone:'good', colour:'var(--accent)'};
    return Math.abs(off) < target_value*0.1 ? {zone:'warn', colour:'var(--amber)'} : {zone:'bad', colour:'var(--red,#e55)'};
  }

  // No target — judge by trend alone
  if (goal_type === 'lose')  return trendDir < 0 ? {zone:'good',colour:'var(--accent)'} : trendDir>0 ? {zone:'warn',colour:'var(--amber)'} : {zone:'track',colour:'var(--muted)'};
  if (goal_type === 'gain')  return trendDir > 0 ? {zone:'good',colour:'var(--accent)'} : trendDir<0 ? {zone:'warn',colour:'var(--amber)'} : {zone:'track',colour:'var(--muted)'};
  return {zone:'track', colour:'var(--muted)'};
}

function HealthTrendsCard({onNavigate}) {
  const [snap,  setSnap]  = useState(undefined); // most recent full snapshot (readiness)
  const [rows,  setRows]  = useState([]);        // recent rows for trends
  const [goals, setGoals] = useState({});
  const [hs,    setHs]    = useState(null);
  const [workouts, setWorkouts] = useState([]);

  useEffect(()=>{
    (async ()=>{
      const {data:{user}} = await supabase.auth.getUser();
      if (!user) { setSnap(null); return; }
      const today = new Date().toISOString().slice(0,10);
      const since = new Date(Date.now()-31*86400000).toISOString().slice(0,10); // 30d window for last-known
      const [hsRes, snapRes, rowsRes, goalRes, wRes] = await Promise.all([
        supabase.from('health_settings').select('enabled,include_in_helm').eq('user_id',user.id).maybeSingle(),
        supabase.from('health_daily_snapshots').select('*').eq('user_id',user.id).order('date',{ascending:false}).limit(1).maybeSingle(),
        supabase.from('health_daily_snapshots').select('date,weight_kg,body_fat_pct,muscle_mass_kg,systolic_bp,diastolic_bp').eq('user_id',user.id).gte('date',since).order('date',{ascending:true}),
        supabase.from('health_goals').select('*').eq('user_id',user.id),
        supabase.from('health_workouts').select('workout_type,duration_minutes').eq('user_id',user.id).eq('date',today).limit(3),
      ]);
      setHs(hsRes.data);
      setSnap(snapRes.data||null);
      setRows(rowsRes.data||[]);
      setWorkouts(wRes.data||[]);
      const g={}; (goalRes.data||[]).forEach(x=>g[x.metric]=x); setGoals(g);
    })().catch(()=>setSnap(null));
  },[]);

  if (snap === undefined) return null;
  if (hs?.enabled === false) return null;

  const today = new Date().toISOString().slice(0,10);
  const readiness = snap ? calcReadiness(snap, null, null) : null;
  const dq = snap ? calcDataQuality(snap, workouts) : null;
  const isToday = snap?.date === today;
  const CONF_C = {high:'var(--accent)',medium:'var(--text)',low:'var(--amber)',unknown:'var(--muted)'};
  const arrow = d => d>0?'↑':d<0?'↓':'→';
  const fmtDate = ds => { const dt=new Date(ds+'T00:00:00'); return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); };

  // Per-metric: last KNOWN value (most recent non-null in window) + trend over available points
  const metricData = GOAL_METRICS.map(m => {
    const vals = rows.filter(r=>r[m.key]!=null).map(r=>({date:r.date, v:Number(r[m.key])}));
    if (vals.length === 0) return null;
    const lastPt = vals[vals.length-1];
    const first  = vals[0].v;
    const delta  = lastPt.v - first;
    const trendDir = Math.abs(delta) < (lastPt.v*0.005) ? 0 : (delta > 0 ? 1 : -1);
    const zone = evalGoalZone(m.key, lastPt.v, goals[m.key], trendDir);
    const stale = lastPt.date !== today;
    return {...m, latest:lastPt.v, asOf:lastPt.date, stale, delta, trendDir, zone, n:vals.length};
  }).filter(Boolean);

  return (
    <div className="card" style={{marginBottom:14}}>
      <div className="row-between" style={{marginBottom:6}}>
        <div style={{fontWeight:600,fontSize:13}}>🫀 Health & Recovery</div>
        {snap && <button className="btn btn-ghost btn-sm" onClick={()=>onNavigate('health')}>Details</button>}
      </div>

      {snap ? (
        <>
          {/* Readiness row */}
          <div className="row-between" style={{marginBottom:4}}>
            <div style={{fontSize:22,fontWeight:700,color:readiness.colour}}>{READINESS_LABELS[readiness.label]}</div>
            <div className="row" style={{gap:8}}>
              {readiness.confidence!=='unknown' && <span style={{fontSize:10,color:CONF_C[readiness.confidence]}}>{readiness.confidence} confidence</span>}
              {dq && <span style={{fontSize:10,color:dq.colour,fontWeight:600}}>{dq.label}</span>}
            </div>
          </div>
          <div className="row" style={{gap:12,flexWrap:'wrap',marginBottom:4}}>
            {snap.sleep_duration_hours!=null && <span className="meta">😴 {snap.sleep_duration_hours}h</span>}
            {snap.resting_heart_rate!=null && <span className="meta">💓 {snap.resting_heart_rate}bpm</span>}
            {snap.steps!=null && <span className="meta">👟 {snap.steps.toLocaleString()}</span>}
            {workouts.length>0 && <span className="meta">🏃 {workouts[0].workout_type} {workouts[0].duration_minutes}min</span>}
          </div>
          {!isToday && <div className="meta" style={{color:'var(--amber)'}}>⚠ Recovery data from {fmtDate(snap.date)} — not today</div>}
          {readiness.drivers.length>0 && <div className="meta" style={{color:'var(--amber)',fontSize:10,marginBottom:2}}>{readiness.drivers[0]}</div>}

          {/* Body & Vitals trends */}
          {metricData.length>0 && (
            <div style={{borderTop:'1px solid var(--border)',marginTop:8,paddingTop:8}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',marginBottom:6}}>BODY & VITALS</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                {metricData.map(m => (
                  <div key={m.key} style={{background:'var(--surface2)',borderRadius:8,padding:'8px 10px',borderLeft:'3px solid '+m.zone.colour}}>
                    <div className="row-between" style={{marginBottom:2}}>
                      <span style={{fontSize:10,color:'var(--muted)'}}>{m.label}</span>
                      {m.stale && <span style={{fontSize:9,color:'var(--muted)'}}>{fmtDate(m.asOf)}</span>}
                    </div>
                    <div className="row-between" style={{alignItems:'baseline'}}>
                      <span style={{fontSize:16,fontWeight:700,color:m.zone.colour}}>{m.latest}<span style={{fontSize:10,fontWeight:400,color:'var(--muted)'}}> {m.unit}</span></span>
                      {m.n>1 && <span style={{fontSize:11,color:m.trendDir===0?'var(--muted)':m.zone.colour}}>{arrow(m.trendDir)} {Math.abs(m.delta).toFixed(1)}</span>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      ) : (
        <div>
          <div className="meta" style={{marginBottom:4}}>Health data not connected.</div>
          <div className="meta">Set up the iOS Shortcut or connect Withings. <span style={{color:'var(--accent)',cursor:'pointer'}} onClick={()=>onNavigate('health')}>Set up →</span></div>
        </div>
      )}
    </div>
  );
}

    if (data && data.length > 0) { setItems(data); return; }

    const seeds = PREP_STARTERS.map((s,i)=>({...s,user_id:user.id,is_active:true,related_area:'travel',sort_order:i,notes:''}));
    const {data:ins} = await supabase.from('prep_items').insert(seeds).select();
    setItems(ins||[]);
  };

  const save = async () => {
    if (!edit?.name) return;
    setSaving(true);
    const {data:{user}} = await supabase.auth.getUser();
    if (edit.id) {
      await supabase.from('prep_items').update({name:edit.name,category:edit.category||'Other',notes:edit.notes||null,importance:edit.importance||'normal',default_timing:edit.default_timing||'anytime',is_active:edit.is_active!==false}).eq('id',edit.id);
    } else {
      await supabase.from('prep_items').insert({user_id:user.id,name:edit.name,category:edit.category||'Other',notes:edit.notes||null,importance:edit.importance||'normal',default_timing:edit.default_timing||'anytime',is_active:true,sort_order:items.length});
    }
    setSaving(false); setEdit(null); load();
  };

  const archive = async (id) => {
    await supabase.from('prep_items').update({is_active:false}).eq('id',id);
    setItems(it=>it.filter(x=>x.id!==id));
  };

  const filtered = filter==='all' ? items : filter==='archived' ? items.filter(x=>!x.is_active) : items.filter(x=>x.is_active);
  const IMP_C = {critical:'var(--red)',important:'var(--amber)',normal:'var(--text)'};

  if (edit !== null) return (
    <div className="page">
      <h1 style={{fontSize:18,fontWeight:700,marginBottom:16}}>{edit.id?'Edit prep item':'New prep item'}</h1>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:13,marginBottom:4}}>Name</div>
        <input className="input" value={edit.name||''} onChange={e=>setEdit(p=>({...p,name:e.target.value}))} placeholder="e.g. Sailing kit"/>
      </div>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:13,marginBottom:4}}>Category</div>
        <select className="input" value={edit.category||'Other'} onChange={e=>setEdit(p=>({...p,category:e.target.value}))}>
          {PREP_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
        <div>
          <div style={{fontSize:12,marginBottom:4}}>Importance</div>
          <select className="input" value={edit.importance||'normal'} onChange={e=>setEdit(p=>({...p,importance:e.target.value}))}>
            <option value="normal">Normal</option><option value="important">Important</option><option value="critical">Critical</option>
          </select>
        </div>
        <div>
          <div style={{fontSize:12,marginBottom:4}}>Default timing</div>
          <select className="input" value={edit.default_timing||'anytime'} onChange={e=>setEdit(p=>({...p,default_timing:e.target.value}))}>
            {Object.entries(PREP_TIMINGS).map(([v,l])=><option key={v} value={v}>{l}</option>)}
          </select>
        </div>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,marginBottom:4}}>Notes (optional)</div>
        <input className="input" value={edit.notes||''} onChange={e=>setEdit(p=>({...p,notes:e.target.value}))} placeholder="e.g. Check charged"/>
      </div>
      <div className="row" style={{gap:8}}>
        <button className="btn btn-primary" disabled={saving||!edit.name} onClick={save}>{saving?'Saving…':'Save'}</button>
        <button className="btn btn-ghost" onClick={()=>setEdit(null)}>Cancel</button>
      </div>
    </div>
  );

  return (
    <div className="page">
      <div className="row-between" style={{marginBottom:8}}>
        <h1 style={{fontSize:18,fontWeight:700,margin:0}}>Prep Item Library</h1>
        <button className="btn btn-ghost btn-sm" onClick={()=>setEdit({name:'',category:'Other',importance:'normal',default_timing:'anytime'})}>+ Add</button>
      </div>
      <div className="row" style={{gap:6,marginBottom:12}}>
        {[['all','All'],['active','Active'],['archived','Archived']].map(([v,l])=>(
          <button key={v} className={'btn btn-sm '+(filter===v?'btn-primary':'btn-ghost')} onClick={()=>setFilter(v)}>{l}</button>
        ))}
      </div>
      {PREP_CATEGORIES.filter(cat=>filtered.some(it=>it.category===cat)).map(cat=>(
        <div key={cat} style={{marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:4}}>{cat}</div>
          {filtered.filter(it=>it.category===cat).map(it=>(
            <div key={it.id} className="card-sm" style={{marginBottom:6,opacity:it.is_active?1:0.5}}>
              <div className="row-between">
                <div>
                  <span style={{fontSize:13,fontWeight:500}}>{it.name}</span>
                  <span style={{fontSize:10,color:IMP_C[it.importance]||'var(--muted)',marginLeft:6}}>{it.importance}</span>
                  <span style={{fontSize:10,color:'var(--muted)',marginLeft:6}}>{PREP_TIMINGS[it.default_timing]||it.default_timing}</span>
                </div>
                <div className="row" style={{gap:4}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setEdit({...it})}>Edit</button>
                  {it.is_active && <button className="btn btn-ghost btn-sm" style={{color:'var(--muted)'}} onClick={()=>archive(it.id)}>Archive</button>}
                </div>
              </div>
            </div>
          ))}
        </div>
      ))}
      {filtered.length===0&&<div className="meta">No items. Add one above.</div>}
    </div>
  );
}

// ── PREP CHECKLIST COMPONENT ──────────────────────────────────
// Compact per-trip checklist inside TravelPage event cards
function PrepChecklist({eventId, presetPrepItemIds, allPrepItems, onSync}) {
  const getChecklist = () => {
    const s = loadTravelState();
    return s.checklists?.[eventId] || null;
  };
  const [cl, setCl] = useState(()=>getChecklist());
  const [expanded,     setExpanded]     = useState(false);
  const [addingCustom, setAddingCustom] = useState(false);
  const [addingFromLib,setAddingFromLib]= useState(false);
  const [customName,   setCustomName]   = useState('');
  const [libFilter,    setLibFilter]    = useState('');

  const persist = (newCl) => {
    const s = loadTravelState();
    if (!s.checklists) s.checklists = {};
    s.checklists[eventId] = newCl;
    saveTravelState(s);
    setCl(newCl);
    if (onSync) onSync(newCl); // non-blocking DB write-through
  };

  const generateFromPreset = () => {
    const ids = presetPrepItemIds || [];
    const items = ids.map(id=>{
      const pi = allPrepItems.find(p=>p.id===id);
      if (!pi) return null;
      return {id:pi.id, name:pi.name, timing:pi.default_timing, importance:pi.importance, done:false};
    }).filter(Boolean);
    persist({items, custom:[], generated_at:new Date().toISOString()});
    setExpanded(true);
  };

  const toggle = (id, isCustom) => {
    const newCl = {...cl};
    if (isCustom) newCl.custom = (newCl.custom||[]).map(x=>x.id===id?{...x,done:!x.done}:x);
    else          newCl.items  = (newCl.items ||[]).map(x=>x.id===id?{...x,done:!x.done}:x);
    persist(newCl);
  };

  const removeItem = (id, isCustom) => {
    const newCl = {...cl};
    if (isCustom) newCl.custom = (newCl.custom||[]).filter(x=>x.id!==id);
    else          newCl.items  = (newCl.items ||[]).filter(x=>x.id!==id);
    persist(newCl);
  };

  const addCustom = () => {
    if (!customName.trim()) return;
    const newCl = {...(cl||{items:[],custom:[],generated_at:new Date().toISOString()})};
    newCl.custom = [...(newCl.custom||[]), {id:'c_'+Date.now(), name:customName.trim(), timing:'anytime', importance:'normal', done:false}];
    persist(newCl);
    setCustomName(''); setAddingCustom(false);
  };

  const addFromLibrary = (pi) => {
    const newCl = {...(cl||{items:[],custom:[],generated_at:new Date().toISOString()})};
    // Add as a library item (not custom) so it carries timing/importance
    newCl.items = [...(newCl.items||[]).filter(x=>x.id!==pi.id), {id:pi.id, name:pi.name, timing:pi.default_timing, importance:pi.importance, done:false}];
    persist(newCl);
  };

  const allItems = [...(cl?.items||[]), ...(cl?.custom||[])];
  const doneCount = allItems.filter(x=>x.done).length;
  const total = allItems.length;
  const criticalPending = allItems.filter(x=>!x.done && x.importance==='critical');
  const nightBefore = allItems.filter(x=>!x.done && x.timing==='night_before');
  const status = total===0?'empty':doneCount===total?'ready':doneCount>0?'part-done':'not-started';
  const statusLabel = {empty:'No checklist',ready:'✓ Ready','part-done':`${doneCount}/${total} done`,'not-started':`0/${total} done`}[status];
  const statusColour = {empty:'var(--muted)',ready:'var(--accent)','part-done':'var(--amber)','not-started':'var(--red)'}[status];

  // Library items not already in checklist
  const libAvailable = allPrepItems.filter(pi=>!allItems.find(x=>x.id===pi.id));
  const libFiltered = libFilter ? libAvailable.filter(pi=>pi.name.toLowerCase().includes(libFilter.toLowerCase())||pi.category.toLowerCase().includes(libFilter.toLowerCase())) : libAvailable;

  if (!cl) return (
    <div style={{borderTop:'1px solid var(--border)',paddingTop:8,marginTop:4}}>
      <div className="row-between" style={{marginBottom:4}}>
        <div style={{fontSize:11,color:'var(--muted)'}}>Prep checklist</div>
        <div className="row" style={{gap:4}}>
          {presetPrepItemIds?.length>0 && (
            <button className="btn btn-primary btn-sm" style={{fontSize:10}} onClick={generateFromPreset}>
              Generate ({presetPrepItemIds.length} items)
            </button>
          )}
          <button className="btn btn-ghost btn-sm" style={{fontSize:10}} onClick={()=>{persist({items:[],custom:[],generated_at:new Date().toISOString()});setExpanded(true);}}>
            Start empty
          </button>
        </div>
      </div>
      {presetPrepItemIds?.length===0 && allPrepItems.length>0 && (
        <div className="meta" style={{fontSize:10}}>Link prep items to this preset in Travel Settings → edit preset.</div>
      )}
    </div>
  );

  return (
    <div style={{borderTop:'1px solid var(--border)',paddingTop:8,marginTop:4}}>
      <div className="row-between" style={{marginBottom:expanded?6:0}}>
        <div className="row" style={{gap:6}}>
          <span style={{fontSize:11,fontWeight:600,color:statusColour}}>{statusLabel}</span>
          {criticalPending.length>0&&!expanded&&<span style={{fontSize:10,color:'var(--red)'}}>⚠ {criticalPending[0].name}</span>}
          {nightBefore.length>0&&!expanded&&<span style={{fontSize:10,color:'var(--amber)'}}>🌙 {nightBefore.length} tonight</span>}
        </div>
        <div className="row" style={{gap:4}}>
          <button className="btn btn-ghost btn-sm" style={{fontSize:10}} onClick={()=>setExpanded(e=>!e)}>{expanded?'Collapse':'Checklist'}</button>
          <button className="btn btn-ghost btn-sm" style={{fontSize:10,color:'var(--muted)'}} title="Reset to preset" onClick={generateFromPreset}>↺</button>
        </div>
      </div>
      {expanded && (
        <div>
          {allItems.map((item)=>{
            const isCustom = !!(cl.custom||[]).find(c=>c.id===item.id);
            return (
              <div key={item.id} className="row-between" style={{padding:'4px 0',borderBottom:'1px solid var(--border)'}}>
                <label style={{display:'flex',gap:6,alignItems:'center',flex:1,cursor:'pointer',fontSize:12}}>
                  <input type="checkbox" checked={!!item.done} onChange={()=>toggle(item.id,isCustom)}/>
                  <span style={{textDecoration:item.done?'line-through':'none',color:item.done?'var(--muted)':'var(--text)'}}>{item.name}</span>
                  {item.importance==='critical'&&!item.done&&<span style={{fontSize:9,color:'var(--red)'}}>critical</span>}
                  {item.timing==='night_before'&&!item.done&&<span style={{fontSize:9,color:'var(--accent)'}}>🌙</span>}
                </label>
                <button style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:14,padding:'0 4px'}} onClick={()=>removeItem(item.id,isCustom)}>×</button>
              </div>
            );
          })}

          {/* Add from library picker */}
          {addingFromLib ? (
            <div style={{marginTop:6,background:'var(--surface2)',borderRadius:6,padding:8}}>
              <div style={{fontSize:11,fontWeight:600,marginBottom:4}}>Add from library</div>
              <input className="input" style={{fontSize:11,marginBottom:6}} placeholder="Search…" value={libFilter}
                onChange={e=>setLibFilter(e.target.value)} autoFocus/>
              <div style={{maxHeight:140,overflowY:'auto'}}>
                {libFiltered.slice(0,20).map(pi=>(
                  <div key={pi.id} className="row-between" style={{padding:'3px 0'}}>
                    <span style={{fontSize:11}}>{pi.name} <span style={{color:'var(--muted)',fontSize:10}}>{pi.category}</span></span>
                    <button className="btn btn-ghost btn-sm" style={{fontSize:10}} onClick={()=>{addFromLibrary(pi);setLibFilter('');}}>+</button>
                  </div>
                ))}
                {libFiltered.length===0&&<div className="meta" style={{fontSize:10}}>Nothing found</div>}
              </div>
              <button className="btn btn-ghost btn-sm" style={{marginTop:4,fontSize:10}} onClick={()=>{setAddingFromLib(false);setLibFilter('');}}>Close</button>
            </div>
          ) : addingCustom ? (
            <div className="row" style={{gap:4,marginTop:6}}>
              <input className="input" style={{flex:1,fontSize:12}} placeholder="One-off item" value={customName}
                onChange={e=>setCustomName(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==='Enter')addCustom();}}/>
              <button className="btn btn-primary btn-sm" onClick={addCustom}>Add</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>{setAddingCustom(false);setCustomName('');}}>✕</button>
            </div>
          ) : (
            <div className="row" style={{gap:4,marginTop:6,flexWrap:'wrap'}}>
              {libAvailable.length>0&&<button className="btn btn-ghost btn-sm" style={{fontSize:10}} onClick={()=>setAddingFromLib(true)}>+ From library</button>}
              <button className="btn btn-ghost btn-sm" style={{fontSize:10}} onClick={()=>setAddingCustom(true)}>+ Custom</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function TravelSettingsPage() {
  const [ts,  setTs]  = useState(null);
  const [presets, setPresets] = useState([]);
  const [prepItems, setPrepItems] = useState([]);
  const [editPreset, setEditPreset] = useState(null);
  const [saving, setSaving] = useState(false);
  const [seeded, setSeeded] = useState(false);

  const Toggle = ({label, val, onChange, detail=null}) => (
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)',gap:12}}>
      <div style={{flex:1}}>
        <div style={{fontSize:13}}>{label}</div>
        {detail && <div className="meta" style={{marginTop:2}}>{detail}</div>}
      </div>
      <div onClick={()=>onChange(!val)} style={{width:40,height:22,borderRadius:11,background:val?'var(--accent)':'var(--surface2)',cursor:'pointer',flexShrink:0,position:'relative',transition:'background 0.15s'}}>
        <div style={{position:'absolute',top:3,left:val?20:3,width:16,height:16,borderRadius:'50%',background:'#fff',transition:'left 0.15s'}}/>
      </div>
    </div>
  );

  useEffect(()=>{ load(); },[]);

  const load = async () => {
    const {data:{user}} = await supabase.auth.getUser();
    if (!user) return;
    const [tsRes, prRes, piRes] = await Promise.all([
      supabase.from('travel_settings').select('*').eq('user_id',user.id).maybeSingle(),
      supabase.from('travel_presets').select('*').eq('user_id',user.id).eq('is_active',true).order('sort_order'),
      supabase.from('prep_items').select('*').eq('user_id',user.id).eq('is_active',true).order('sort_order'),
    ]);
    const cfg = tsRes.data || {...DEFAULT_TRAVEL_SETTINGS};
    setTs(cfg); setPrepItems(piRes.data||[]);
    if (prRes.data && prRes.data.length > 0) {
      setPresets(prRes.data);
    } else if (!seeded) {
      // Seed default presets on first load
      setSeeded(true);
      const seeds = DEFAULT_PRESETS.map(p=>({...p, user_id:user.id}));
      const {data:ins} = await supabase.from('travel_presets').insert(seeds).select();
      setPresets(ins||[]);
    }
  };

  const persist = async (patch) => {
    const merged = {...(ts||DEFAULT_TRAVEL_SETTINGS), ...patch};
    setTs(merged);
    const {data:{user}} = await supabase.auth.getUser();
    if (!user) return;
    await supabase.from('travel_settings').upsert({...merged, user_id:user.id}, {onConflict:'user_id'});
  };

  const savePreset = async () => {
    if (!editPreset?.name) return;
    setSaving(true);
    const {data:{user}} = await supabase.auth.getUser();
    if (editPreset.id) {
      await supabase.from('travel_presets').update({
        name:editPreset.name, travel_mode:editPreset.travel_mode,
        prep_buffer_mins:+editPreset.prep_buffer_mins||15,
        pre_event_buffer_mins:+editPreset.pre_event_buffer_mins||15,
        post_event_buffer_mins:+editPreset.post_event_buffer_mins||10,
        default_journey_mins:editPreset.default_journey_mins?+editPreset.default_journey_mins:null,
        notes:editPreset.notes||null,
        prep_item_ids: editPreset.prep_item_ids||[],
      }).eq('id',editPreset.id);
    } else {
      await supabase.from('travel_presets').insert({
        user_id:user.id, name:editPreset.name, travel_mode:editPreset.travel_mode||'driving',
        prep_buffer_mins:+editPreset.prep_buffer_mins||15,
        pre_event_buffer_mins:+editPreset.pre_event_buffer_mins||15,
        post_event_buffer_mins:+editPreset.post_event_buffer_mins||10,
        default_journey_mins:editPreset.default_journey_mins?+editPreset.default_journey_mins:null,
        notes:editPreset.notes||null, sort_order:presets.length,
        prep_item_ids: editPreset.prep_item_ids||[],
      });
    }
    setSaving(false); setEditPreset(null); load();
  };

  const deletePreset = async (id) => {
    await supabase.from('travel_presets').update({is_active:false}).eq('id',id);
    setPresets(p=>p.filter(x=>x.id!==id));
  };

  if (!ts) return <div className="page"><div className="meta">Loading…</div></div>;

  if (editPreset !== null) return (
    <div className="page">
      <h1 style={{fontSize:18,fontWeight:700,marginBottom:16}}>{editPreset.id?'Edit preset':'New preset'}</h1>
      {[['name','Preset name','text'],['notes','Notes','text']].map(([k,l,t])=>(
        <div key={k} style={{marginBottom:12}}>
          <div style={{fontSize:13,marginBottom:4}}>{l}</div>
          <input className="input" type={t} value={editPreset[k]||''} onChange={e=>setEditPreset(p=>({...p,[k]:e.target.value}))}/>
        </div>
      ))}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:13,marginBottom:4}}>Travel mode</div>
        <select className="input" value={editPreset.travel_mode||'driving'} onChange={e=>setEditPreset(p=>({...p,travel_mode:e.target.value}))}>
          {Object.entries(TRAVEL_MODE_LABEL).map(([v,l])=><option key={v} value={v}>{l}</option>)}
        </select>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
        {[['prep_buffer_mins','Prep buffer (min)'],['pre_event_buffer_mins','Pre-event buffer (min)'],
          ['post_event_buffer_mins','Post-event buffer (min)'],['default_journey_mins','Default journey (min, optional)']].map(([k,l])=>(
          <div key={k}>
            <div style={{fontSize:12,marginBottom:4}}>{l}</div>
            <input className="input" type="number" min="0" value={editPreset[k]??''} onChange={e=>setEditPreset(p=>({...p,[k]:e.target.value}))}/>
          </div>
        ))}
      </div>
      <div className="row" style={{gap:8}}>
        <button className="btn btn-primary" disabled={saving||!editPreset.name} onClick={savePreset}>{saving?'Saving…':'Save'}</button>
        <button className="btn btn-ghost" onClick={()=>setEditPreset(null)}>Cancel</button>
      </div>
      {prepItems.length > 0 && (
        <div style={{marginTop:12,paddingTop:10,borderTop:'1px solid var(--border)'}}>
          <div style={{fontSize:12,fontWeight:600,marginBottom:6}}>Default prep items for this preset</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:4}}>
            {prepItems.map(pi=>{
              const sel = (editPreset.prep_item_ids||[]).includes(pi.id);
              return (
                <label key={pi.id} style={{fontSize:11,display:'flex',gap:4,alignItems:'center',cursor:'pointer'}}>
                  <input type="checkbox" checked={sel}
                    onChange={()=>setEditPreset(p=>({...p,prep_item_ids:sel?(p.prep_item_ids||[]).filter(x=>x!==pi.id):[...(p.prep_item_ids||[]),pi.id]}))}/>
                  {pi.name}
                </label>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );

  return (
    <div className="page">
      <h1 style={{fontSize:18,fontWeight:700,marginBottom:16}}>Travel Buffer Settings</h1>

      <div className="card" style={{marginBottom:16}}>
        <Toggle label="Enable Travel Buffer Assistant" val={ts.enabled} onChange={v=>persist({enabled:v})}/>
        <Toggle label="Show suggestions on dashboard" val={ts.show_on_dashboard} onChange={v=>persist({show_on_dashboard:v})}/>
        <Toggle label="Include travel context in Plan My Day" val={ts.include_in_helm} onChange={v=>persist({include_in_helm:v})}/>
        <Toggle label="Require approval before creating calendar blocks" val={ts.require_approval} onChange={v=>persist({require_approval:v})}/>
        <div style={{padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
          <div style={{fontSize:13,marginBottom:5}}>Planning window</div>
          <select className="input" value={ts.planning_window||'48h'} onChange={e=>persist({planning_window:e.target.value})}>
            <option value="today">Today only</option>
            <option value="48h">Next 48 hours</option>
            <option value="7d">Next 7 days</option>
          </select>
        </div>
        <div style={{padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
          <div style={{fontSize:13,marginBottom:5}}>Default travel mode</div>
          <select className="input" value={ts.default_travel_mode||'driving'} onChange={e=>persist({default_travel_mode:e.target.value})}>
            {Object.entries(TRAVEL_MODE_LABEL).map(([v,l])=><option key={v} value={v}>{l}</option>)}
          </select>
        </div>
        <div style={{padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
          <div style={{fontSize:13,marginBottom:5}}>Default start location name</div>
          <input className="input" value={ts.default_start_name||''} onChange={e=>persist({default_start_name:e.target.value})} placeholder="e.g. Home"/>
        </div>
        <div style={{padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
          <div style={{fontSize:13,marginBottom:5}}>Default start address / postcode</div>
          <input className="input" value={ts.default_start_address||''} onChange={e=>persist({default_start_address:e.target.value})} placeholder="e.g. KT6 5AA"/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,padding:'10px 0'}}>
          {[['prep_buffer_mins','Prep buffer (min)'],['pre_event_buffer_mins','Pre-event buffer (min)'],
            ['post_event_buffer_mins','Post-event buffer (min)'],['min_journey_mins','Min journey to flag (min)']].map(([k,l])=>(
            <div key={k}>
              <div style={{fontSize:12,marginBottom:4}}>{l}</div>
              <input className="input" type="number" min="0" value={ts[k]??''} onChange={e=>persist({[k]:+e.target.value})}/>
            </div>
          ))}
        </div>
      </div>

      <div className="row-between" style={{marginBottom:8}}>
        <div className="section-title" style={{margin:0}}>Trip presets</div>
        <button className="btn btn-ghost btn-sm" onClick={()=>setEditPreset({name:'',travel_mode:'driving',prep_buffer_mins:15,pre_event_buffer_mins:15,post_event_buffer_mins:10})}>+ Add</button>
      </div>
      {presets.map(p=>(
        <div key={p.id} className="card-sm" style={{marginBottom:8}}>
          <div className="row-between">
            <div>
              <div style={{fontSize:13,fontWeight:600}}>{p.name}</div>
              <div className="meta">{TRAVEL_MODE_LABEL[p.travel_mode]||p.travel_mode} · Prep {p.prep_buffer_mins}m · Buffer {p.pre_event_buffer_mins}m{p.default_journey_mins?` · Journey ~${p.default_journey_mins}m`:''}</div>
              {p.notes && <div className="meta" style={{fontSize:11,fontStyle:'italic'}}>{p.notes}</div>}
            </div>
            <div className="row" style={{gap:6}}>
              <button className="btn btn-ghost btn-sm" onClick={()=>setEditPreset({...p})}>Edit</button>
              <button className="btn btn-ghost btn-sm" style={{color:'var(--muted)'}} onClick={()=>deletePreset(p.id)}>×</button>
            </div>
          </div>
        </div>
      ))}
      {presets.length===0 && <div className="meta">No presets yet. Add one above.</div>}
    </div>
  );
}

// ── TRAVEL PAGE ───────────────────────────────────────────────
function TravelPage() {
  const [ts,       setTs]       = useState(null);
  const [presets,  setPresets]  = useState([]);
  const [prepItems,setPrepItems]= useState([]);
  const [events,   setEvents]   = useState([]);
  const [userId,   setUserId]   = useState(null);
  const [loading,  setLoading]  = useState(true);
  const [calError, setCalError] = useState(null);
  const [editId,   setEditId]   = useState(null);
  const [editVals, setEditVals] = useState({});
  const [proposing,setProposing]= useState(null);
  const [pendingBlock,setPendingBlock] = useState(null);
  const [submitting, setSubmitting]   = useState(false); // prevents double-approve
  const [etaBusy,    setEtaBusy]      = useState(null);   // event id currently auto-estimating

  // Stable fingerprint for duplicate detection — survives page reload via localStorage
  const travelIKey = (e, startTime, endTime) =>
    [e.id||'', (e.start||'').slice(0,16), (e.location||'').slice(0,30), startTime, endTime].join('|');

  useEffect(()=>{ load(); },[]);

  const load = async () => {
    setLoading(true);
    const {data:{user}} = await supabase.auth.getUser();
    const [tsRes, prRes, piRes] = await Promise.all([
      supabase.from('travel_settings').select('*').eq('user_id',user.id).maybeSingle(),
      supabase.from('travel_presets').select('*').eq('user_id',user.id).eq('is_active',true).order('sort_order'),
      supabase.from('prep_items').select('*').eq('user_id',user.id).eq('is_active',true).order('sort_order'),
    ]);
    const cfg = tsRes.data || DEFAULT_TRAVEL_SETTINGS;
    setTs(cfg); setPresets(prRes.data||[]); setPrepItems(piRes.data||[]);
    setUserId(user.id);

    // v3.1: hydrate weather snapshot from store if the Weather tab hasn't populated it this session
    if (!_wxCache?.data) { const stored = loadWxSnap(); if (stored?.data && !stored.data.error) _wxCache = { data:stored.data, locId:stored.locId, ts:stored.ts }; }
    if (!_wxSettings) { try { const wr = await supabase.from('weather_settings').select('*').eq('user_id',user.id).maybeSingle(); if (wr.data) _wxSettings = wr.data; } catch(e) {} }

    // Travel persistence tables — each isolated so one failure can't block the others
    let ovRows = [], blkRows = [], clRows = [];
    try { const r = await supabase.from('travel_event_overrides').select('*').eq('user_id',user.id); ovRows = r.data||[]; } catch(e) {}
    try { const r = await supabase.from('travel_created_blocks').select('*').eq('user_id',user.id); blkRows = r.data||[]; } catch(e) {}
    try { const r = await supabase.from('travel_checklist_items').select('*').eq('user_id',user.id).order('sort_order'); clRows = r.data||[]; } catch(e) {}

    // Merge DB state into localStorage (DB wins per-event)
    const local = loadTravelState();
    ovRows.forEach(row => {
      if (row.dismissed) {
        if (!local.dismissed.includes(row.source_event_id)) local.dismissed.push(row.source_event_id);
      } else {
        local.overrides[row.source_event_id] = {
          journeyMins: row.journey_time_minutes, mode: row.travel_mode,
          presetId: row.preset_id, startLocationCustom: row.custom_start_location,
        };
      }
    });
    if (!local.createdBlocks) local.createdBlocks = {};
    blkRows.forEach(row => {
      local.createdBlocks[row.source_event_id] = {
        ikey:row.travel_idempotency_key, title:row.block_title,
        date:row.block_date, status:row.status, created_at:row.created_at,
      };
    });
    const dbCl = {};
    clRows.forEach(row => {
      if (!dbCl[row.source_event_id]) dbCl[row.source_event_id] = {items:[],custom:[],generated_at:null};
      const item = {id:row.prep_item_id||('c_'+row.id), name:row.name, timing:row.timing, importance:row.importance, done:row.completed};
      if (row.prep_item_id) dbCl[row.source_event_id].items.push(item);
      else dbCl[row.source_event_id].custom.push(item);
    });
    if (Object.keys(dbCl).length > 0) local.checklists = {...(local.checklists||{}), ...dbCl};
    if (ovRows.length || blkRows.length || clRows.length) saveTravelState(local);
    const days = cfg.planning_window==='today'?1:cfg.planning_window==='7d'?7:2;
    const cal  = await fetchCalendarEvents(days);
    if (cal?.error) { setCalError(cal.error); }
    // Filter timed events with location
    const timed = (cal?.events||[]).filter(e=>!e.allDay && e.start && !/travel.?prep/i.test(e.title||''));
    setEvents(timed); setLoading(false);

    // v3.1: keep weather fresh on the Travel page. If the cached snapshot is older
    // than stale_after (default 1h), re-fetch for the default location and re-render.
    try {
      const age = Date.now() - (_wxCache?.ts || 0);
      if (!_wxCache?.data || _wxCache.data.error || age > getStaleMs(_wxSettings)) {
        const { data: wlocs } = await supabase.from('weather_locations').select('*').eq('user_id', user.id).order('sort_order').order('name');
        const wloc = (wlocs||[]).find(l => l.id === _wxSettings?.dashboard_location_id) || (wlocs||[])[0];
        if (wloc) {
          const wd = await fetchWeather(wloc.latitude, wloc.longitude, _wxSettings, wloc.name);
          if (!wd.error) { _wxCache = { data:wd, locId:wloc.id, ts:Date.now() }; saveWxSnap(wd, wloc.id); setEvents(ev=>[...ev]); }
        }
      }
    } catch(e) {}
  };

  const state = loadTravelState();

  const getSuggestion = (e, preset, cfg, allTimedEvents) => {
    const override = state.overrides[e.id] || {};
    const pr    = override.presetId ? (presets.find(p=>p.id===override.presetId)||preset) : preset;
    const mode  = override.mode || pr?.travel_mode || cfg.default_travel_mode;
    const jMins = (override.journeyMins > 0 ? override.journeyMins : null) ?? pr?.default_journey_mins ?? null;
    const prep  = pr?.prep_buffer_mins  ?? cfg.prep_buffer_mins;
    const pre   = pr?.pre_event_buffer_mins ?? cfg.pre_event_buffer_mins;
    // v3.1: weather-aware buffer (today only; snapshot is a today-only forecast)
    const wxImpact = calcWeatherTravelImpact(e.start, _wxCache?.data, _wxSettings);
    const preAdj = pre + (wxImpact.extraMins||0);
    const times = jMins!=null ? calcTravelTimes(e.start, jMins, preAdj, prep) : null;

    // v2: start location intelligence
    const startLoc = override.startLocationCustom
      ? {...override.startLocationCustom, source:'custom'}
      : calcStartLocation(e, allTimedEvents||[], cfg.default_start_name, cfg.default_start_address);

    const nav = buildNavLinks(e.location, startLoc.address||startLoc.name, mode);

    // v2: gap label from previous event end
    const prevEvent = [...(allTimedEvents||[])]
      .filter(ev => ev.id!==e.id && !ev.allDay && new Date(ev.start) < new Date(e.start))
      .sort((a,b) => new Date(b.start) - new Date(a.start))[0];
    const prevEnd = prevEvent?.end || (prevEvent ? new Date(new Date(prevEvent.start).getTime()+3600000).toISOString() : null);
    const norm = s => (s||'').toLowerCase().replace(/[\s,]+/g,'').trim();
    const sameLoc = !!e.location && !!startLoc.address && norm(startLoc.address)===norm(e.location);
    const gapLabel = calcGapLabel(times?.getReady, prevEnd, {sameLocation: sameLoc, hasEstimate: jMins!=null});

    // v2: profile and prep
    const profile  = override.profile || {};
    const prepItems = calcPrepSuggestions(profile);

    return { mode, jMins, prep, pre, times, nav, pr, override, startLoc, gapLabel, profile, prepItems, wxImpact };
  };

  const defaultPreset = presets[0] || null;

  const travelEvents = events.filter(e=>{
    if (state.dismissed.includes(e.id)) return false;
    // No-location events: surface them so the user can add a journey/destination via Edit
    if (!e.location) return true;
    // Always show events the user has manually configured (set journey time, preset, etc.)
    if (state.overrides[e.id]?.journeyMins > 0) return true;
    const {jMins} = getSuggestion(e, defaultPreset, ts||DEFAULT_TRAVEL_SETTINGS, events);
    if (jMins!=null && jMins < (ts?.min_journey_mins||20)) return false;
    return true;
  });

  // v2: pre-compute all suggestions for pressure calculation
  const cfg0 = ts||DEFAULT_TRAVEL_SETTINGS;
  const allSugs = travelEvents.map(e => ({...getSuggestion(e, defaultPreset, cfg0, events), _eventStart: e.start}));
  const todayStr    = new Date().toISOString().slice(0,10);
  const tomorrowStr = new Date(Date.now()+86400000).toISOString().slice(0,10);
  const todayP    = calcTravelPressure(allSugs.filter(s=>s._eventStart?.slice(0,10)===todayStr));
  const tomorrowP = calcTravelPressure(allSugs.filter(s=>s._eventStart?.slice(0,10)===tomorrowStr));
  const pColour   = p => p==='overloaded'?'var(--red)':p==='tight'?'var(--amber)':p==='moderate'?'var(--text)':'var(--muted)';

  const dismiss = (id) => {
    const event = events.find(e=>e.id===id);
    const s = loadTravelState();
    s.dismissed = [...new Set([...s.dismissed, id])];
    saveTravelState(s);
    setEvents(ev=>ev.filter(e=>e.id!==id));
    upsertTravelOverrideDB(userId, id, event, {dismissed:true}); // non-blocking
  };

  const saveOverride = (id, eventMeta) => {
    const normalized = { ...editVals, journeyMins: (editVals.journeyMins > 0 ? editVals.journeyMins : null) };
    const s = loadTravelState();
    s.overrides[id] = normalized;
    // Auto-generate checklist from new preset if one isn't already started
    const chosenPreset = normalized.presetId ? presets.find(p=>p.id===normalized.presetId) : defaultPreset;
    if (chosenPreset?.prep_item_ids?.length > 0 && !s.checklists?.[id]) {
      const clItems = (chosenPreset.prep_item_ids||[]).map(pid=>{
        const pi = prepItems.find(p=>p.id===pid);
        return pi ? {id:pi.id, name:pi.name, timing:pi.default_timing, importance:pi.importance, done:false} : null;
      }).filter(Boolean);
      if (!s.checklists) s.checklists = {};
      s.checklists[id] = {items:clItems, custom:[], generated_at:new Date().toISOString()};
    }
    saveTravelState(s);
    upsertTravelOverrideDB(userId, id, eventMeta, normalized); // non-blocking
    setEditId(null); setEvents(ev=>[...ev]);
  };

  // Auto-estimate journey time via the travel-eta Edge Function (Google Routes, cached server-side).
  // Merges into the existing override so preset/profile choices are preserved. Fails soft.
  const autoEstimate = async (e, sg) => {
    const origin = sg.startLoc?.address || sg.startLoc?.name;
    const dest   = e.location;
    if (!origin || !dest) { alert('Need both a start location and a destination. Tap Edit to set the start.'); return; }
    setEtaBusy(e.id);
    try {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { alert('Please sign in again.'); setEtaBusy(null); return; }
      const res = await fetch(SUPABASE_URL+'/functions/v1/travel-eta', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token,'apikey':SUPABASE_KEY},
        body: JSON.stringify({ origin, destination: dest, mode: sg.mode, departure_time: e.start }),
      });
      const j = await res.json().catch(()=>({}));
      if (j?.journey_mins == null) {
        alert('Could not auto-estimate right now — enter a time manually via Edit.');
      } else {
        const s = loadTravelState();
        const prev = s.overrides[e.id] || {};
        s.overrides[e.id] = { ...prev, journeyMins: j.journey_mins, journeySource:'auto' };
        saveTravelState(s);
        upsertTravelOverrideDB(userId, e.id, e, s.overrides[e.id]); // non-blocking
        setEvents(ev=>[...ev]);
      }
    } catch(err) {
      alert('Could not auto-estimate right now — enter a time manually via Edit.');
    } finally {
      setEtaBusy(null);
    }
  };

  const proposeBlock = (e, sg, cfg) => {
    const { times, mode, jMins, prep, pre, nav, pr } = sg;
    if (!times) { alert('Enter a journey time estimate first (tap Edit).'); return; }
    const startISO  = times.getReady;
    const endISO    = new Date(e.start);
    const fmtHHMM   = d => d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false});
    const date      = startISO.toISOString().slice(0,10);
    const title     = `Travel/prep for ${e.title}`;
    const ikey      = travelIKey(e, fmtHHMM(startISO), fmtHHMM(endISO));

    // Idempotency check — prevent duplicate before even showing the confirm panel
    const tstate = loadTravelState();
    if (tstate.createdBlocks?.[e.id]) {
      alert('A travel block already exists for this event. Check your Lovejoy OS calendar.');
      return;
    }

    const desc = [
      `Original event: ${e.title}`,
      `Destination: ${e.location}`,
      'Start location: ' + (cfg.default_start_name||'') + (cfg.default_start_address ? ' (' + cfg.default_start_address + ')' : ''),
      `Travel mode: ${TRAVEL_MODE_LABEL[mode]||mode}`,
      `Preset: ${pr?.name||'Default'}`,
      `Estimated journey: ${jMins} min`,
      `Prep buffer: ${prep} min`,
      `Pre-event buffer: ${pre} min`,
      `Get-ready: ${fmtHHMM(times.getReady)}`,
      `Leave by: ${fmtHHMM(times.leaveBy)}`,
      `Target arrival: ${fmtHHMM(times.arrivalTarget)}`,
      `Confidence: ${jMins!=null?'Manual estimate':'Default'}`,
      `Google Maps: ${nav.google}`,
      `Idempotency key: ${ikey}`,
      `\nCreated by Lovejoy OS Travel Buffer Assistant`,
    ].join('\n');
    setPendingBlock({
      type:'create_calendar_block',
      title, date,
      start_time: fmtHHMM(startISO),
      end_time:   fmtHHMM(endISO),
      description: desc,
      block_type: 'travel',
      // Idempotency metadata
      ikey,
      source_event_id:    e.id,
      source_event_title: e.title,
      source_event_start: e.start,
    });
    setProposing(e.id);
  };

  const approvePendingBlock = async () => {
    if (!pendingBlock || submitting) return; // guard: disable during submission
    const eId = pendingBlock.source_event_id;

    // Second idempotency check at approve time (protects rapid double-click on Approve)
    const tstate = loadTravelState();
    if (eId && tstate.createdBlocks?.[eId]) {
      setPendingBlock(null); setProposing(null);
      alert('Travel block already exists for this event — not creating another.');
      return;
    }

    setSubmitting(true); // disable Approve button immediately
    // Cross-device duplicate check: Supabase wins over localStorage
    const dbBlock = await checkTravelBlockDB(userId, eId);
    if (dbBlock) {
      // DB says block already exists — update localStorage too
      const s3 = loadTravelState();
      if (!s3.createdBlocks) s3.createdBlocks = {};
      s3.createdBlocks[eId] = {title:dbBlock.block_title,status:dbBlock.status,created_at:new Date().toISOString()};
      saveTravelState(s3);
      setSubmitting(false); setPendingBlock(null); setProposing(null);
      alert('Travel block already exists for this event (confirmed in database).');
      return;
    }
    const r = await applyProposedAction('create_calendar_block', pendingBlock);
    const {data:{user}} = await supabase.auth.getUser();

    await logProposal({
      action_type:'create_calendar_block',
      explanation: r.ok
        ? 'Travel block created: ' + (pendingBlock.source_event_title||pendingBlock.title)
        : 'Travel block failed: ' + (pendingBlock.source_event_title||pendingBlock.title),
      payload: pendingBlock,
      status: r.ok ? 'approved' : 'failed',
      result_note: r.note || (r.ok?'Created':'Failed'),
    });

    if (r.ok) {
      const s2 = loadTravelState();
      if (!s2.createdBlocks) s2.createdBlocks = {};
      s2.createdBlocks[eId] = {
        ikey: pendingBlock.ikey, title: pendingBlock.title,
        date: pendingBlock.date, created_at: new Date().toISOString(),
      };
      saveTravelState(s2);
      upsertTravelBlockDB(userId, eId, pendingBlock); // non-blocking DB write
      // Debug Log entry
      if (user) supabase.from('helm_logs').insert({
        user_id:user.id, function_name:'travel_buffer', action:'block_created', status:'success',
        meta:{ event_id:eId, event_title:pendingBlock.source_event_title, ikey:pendingBlock.ikey },
      }).then(()=>{}).catch(()=>{});
    } else {
      // Debug Log failure
      if (user) supabase.from('helm_logs').insert({
        user_id:user.id, function_name:'travel_buffer', action:'block_creation_failed', status:'error',
        error_code:'calendar_block_failed', error_detail:r.note||'unknown',
        meta:{ event_id:eId, ikey:pendingBlock.ikey },
      }).then(()=>{}).catch(()=>{});
    }

    setSubmitting(false); setPendingBlock(null); setProposing(null);
    if (!r.ok) alert('Could not create block: '+(r.note||'unknown error'));
  };

  if (loading) return <div className="page"><div className="meta">Loading travel suggestions…</div></div>;
  if (!ts?.enabled) return (
    <div className="page">
      <h1 style={{fontSize:18,fontWeight:700,marginBottom:12}}>Travel Buffer</h1>
      <div className="meta">Travel Buffer Assistant is disabled. Enable it in Travel Settings.</div>
    </div>
  );

  const fmtT = d => d ? new Date(d).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false}) : '—';
  const fmtDT = d => d ? new Date(d).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',hour12:false}) : '—';

  return (
    <div className="page">
      <div className="row-between" style={{marginBottom:4}}>
        <h1 style={{fontSize:18,fontWeight:700,margin:0}}>Travel Buffer</h1>
        <button className="btn btn-ghost btn-sm" onClick={load}>↻ Sync</button>
      </div>
      <div className="meta" style={{marginBottom:4}}>
        {ts.planning_window==='today'?'Today only':ts.planning_window==='7d'?'Next 7 days':'Next 48 hours'} · From: {ts.default_start_name||'Home'}
        {calError && <span style={{color:'var(--red)'}}> · Calendar error</span>}
      </div>
      {/* DB sync status */}
      <div style={{fontSize:10,color:'var(--muted)',marginBottom:12,padding:'3px 6px',background:'var(--surface2)',borderRadius:4,display:'inline-block'}}>
        {userId
          ? 'DB synced · ' + Object.keys(loadTravelState().overrides||{}).length + ' overrides · ' + Object.keys(loadTravelState().createdBlocks||{}).length + ' blocks · id:…' + userId.slice(-4)
          : '⚠ Not signed in — changes will not sync'}
      </div>

      {/* Travel pressure summary */}
      {allSugs.length > 0 && (
        <div className="card" style={{marginBottom:12,padding:'10px 12px'}}>
          <div style={{fontSize:11,fontWeight:600,marginBottom:6}}>Travel pressure</div>
          <div className="row" style={{gap:20}}>
            {todayP && <div style={{textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--muted)',marginBottom:2}}>TODAY</div>
              <div style={{fontWeight:700,fontSize:13,color:pColour(todayP)}}>{todayP.charAt(0).toUpperCase()+todayP.slice(1)}</div>
            </div>}
            {tomorrowP && <div style={{textAlign:'center'}}>
              <div style={{fontSize:9,color:'var(--muted)',marginBottom:2}}>TOMORROW</div>
              <div style={{fontWeight:700,fontSize:13,color:pColour(tomorrowP)}}>{tomorrowP.charAt(0).toUpperCase()+tomorrowP.slice(1)}</div>
            </div>}
          </div>
        </div>
      )}

      {travelEvents.length===0 && (
        <div className="empty">
          <div className="empty-icon">🗺️</div>
          <div>No travel events found</div>
          <div className="meta">Timed calendar events with a location will appear here.</div>
        </div>
      )}

      {travelEvents.map(e=>{
        const cfg = ts||DEFAULT_TRAVEL_SETTINGS;
        const sg  = getSuggestion(e, defaultPreset, cfg, events);
        const { times, mode, jMins, prep, pre, nav, pr, startLoc, gapLabel, profile, prepItems: profilePrep, wxImpact } = sg;
        const isEditing  = editId===e.id;
        const isProposing = proposing===e.id;

        return (
          <div key={e.id} className="card" style={{marginBottom:12}}>
            <div className="row-between" style={{marginBottom:6}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600}}>{e.title}</div>
                <div className="meta">{fmtDT(e.start)}</div>
                <div className="meta">{e.location ? '📍 '+e.location : '📍 No location set — tap Edit'}</div>
                {/* v2: start location */}
                <div style={{fontSize:10,color: startLoc.source==='previous_event'?'var(--accent)':startLoc.source==='previous_event_uncertain'?'var(--amber)':'var(--muted)',marginTop:2}}>
                  {startLoc.source==='previous_event'
                    ? '↩ From: ' + startLoc.name + ' (' + startLoc.prevTitle + ' +' + startLoc.gapFromPrev + 'm)'
                    : startLoc.source==='previous_event_uncertain'
                    ? '↩? From: ' + startLoc.name + ' — uncertain (' + Math.round(startLoc.gapFromPrev/60) + 'h gap), tap Edit to confirm'
                    : startLoc.source==='custom'
                      ? '📌 From: ' + startLoc.name
                      : '🏠 From: ' + startLoc.name}
                </div>
              </div>
              <div style={{flexShrink:0,textAlign:'right'}}>
                <div style={{fontSize:11,color:'var(--muted)'}}>{TRAVEL_MODE_LABEL[mode]||mode}</div>
                {gapLabel && gapLabel!=='comfortable' && gapLabel!=='unknown' && gapLabel!=='needs_estimate' && (
                  <div style={{fontSize:9,fontWeight:700,color:GAP_COLOUR[gapLabel],marginTop:2}}>
                    {GAP_LABEL[gapLabel]}
                  </div>
                )}
              </div>

            {times ? (
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:4,marginBottom:8,background:'var(--surface2)',borderRadius:6,padding:'8px 10px'}}>
                {[['🎒 Get ready', fmtT(times.getReady)],['🚗 Leave by', fmtT(times.leaveBy)],['📍 Arrive by', fmtT(times.arrivalTarget)]].map(([l,v])=>(
                  <div key={l} style={{textAlign:'center'}}>
                    <div style={{fontSize:10,color:'var(--muted)'}}>{l}</div>
                    <div style={{fontSize:15,fontWeight:700,color:'var(--accent)'}}>{v}</div>
