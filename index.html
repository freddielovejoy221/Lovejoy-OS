<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #181c27;
      --surface2:  #1e2335;
      --border:    #2a3050;
      --text:      #e8eaf2;
      --muted:     #7b82a0;
      --accent:    #4f7cff;
      --accent2:   #7c5cfc;
      --green:     #22c55e;
      --amber:     #f59e0b;
      --red:       #ef4444;
      --radius:    12px;
      --nav-h:     64px;
    }

    html, body, #root { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── LAYOUT ── */
    .app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
    .topbar { height: var(--nav-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
    .topbar-logo { font-size: 17px; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar-title { font-size: 15px; color: var(--muted); flex: 1; }
    .topbar-user { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: white; cursor: pointer; }

    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .page { flex: 1; overflow-y: auto; padding: 16px 16px 80px; }

    .bottomnav { height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; flex-shrink: 0; padding: 0 4px; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 12px; border-radius: 10px; cursor: pointer; transition: all 0.15s; flex: 1; border: none; background: none; color: var(--muted); font-size: 10px; }
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 22px; height: 22px; }

    /* ── CARDS & SURFACES ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
    .card-sm { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
    .section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin: 20px 0 8px; }
    .section-title:first-child { margin-top: 0; }

    /* ── PILLS & BADGES ── */
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }

    .pill-green  { background: rgba(34,197,94,0.15);  color: #4ade80; }
    .pill-amber  { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .pill-red    { background: rgba(239,68,68,0.15);  color: #f87171; }
    .pill-purple { background: rgba(124,92,252,0.15); color: #a78bfa; }
    .pill-muted  { background: rgba(123,130,160,0.12); color: var(--muted); }

    /* ── BUTTONS ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #3d6ae0; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-danger { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-icon { padding: 8px; border-radius: 8px; }

    /* ── FORMS ── */
    .input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; color: var(--text); outline: none; transition: border 0.15s; }
    .input:focus { border-color: var(--accent); }
    .input::placeholder { color: var(--muted); }
    .label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; }
    .field { margin-bottom: 14px; }
    select.input { appearance: none; cursor: pointer; }
    textarea.input { resize: vertical; min-height: 80px; }

    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 18px; }

    .login-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; padding: 32px 24px; gap: 8px; }
    .login-logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
    .login-sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; text-align: center; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 360px; }

    /* ── MISC ── */
    .row { display: flex; align-items: center; gap: 8px; }
    .row-between { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .icon-area { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .divider { height: 1px; background: var(--border); margin: 12px 0; }
    .empty { text-align: center; padding: 40px 16px; color: var(--muted); font-size: 14px; }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fab { position: fixed; bottom: calc(var(--nav-h) + 16px); right: 16px; width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(79,124,255,0.4); z-index: 50; }
    .name { font-size: 14px; font-weight: 500; color: var(--text); }
    .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }

    .score-ring { width: 80px; height: 80px; }
    .dash-stat { text-align: center; }
    .dash-stat-num { font-size: 28px; font-weight: 700; line-height: 1; }
    .dash-stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; }

    .qc-type-btn { padding: 6px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }

  </style>
</head>

const isDueSoon = d => { const n = daysUntil(d); return n !== null && n >= 0 && n <= 30; };

async function loadHelmSettings() {

async function saveHelmSettings(settings) {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return { error: 'no_user' };
  const row = { ...settings, user_id: user.id };
  delete row.id; delete row.created_at; delete row.updated_at;
  return await supabase.from('helm_settings').upsert(row, { onConflict: 'user_id' });

// ── PROPOSED ACTIONS: log + apply on approval ─────────────────
// Records a proposal (and its outcome) in proposed_actions for the audit trail.
async function logProposal({ action_type, explanation, payload, status, final_payload, result_ref, result_note, source_request }) {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return null;
  const { data } = await supabase.from('proposed_actions').insert({
    user_id: user.id,
    action_type, explanation, payload,
    final_payload: final_payload || null,
    status,
    result_ref: result_ref || null,
    result_note: result_note || null,
    source_request: source_request || null,
    resolved_at: status === 'pending' ? null : new Date().toISOString(),
  }).select().single();
  return data;
}

// Applies an approved action to the real tables. Returns { ok, ref, note }.
// This is the ONLY place writes happen — and only ever on explicit approval.
async function applyProposedAction(type, p) {
  try {
    if (type === 'create_task') {
      const { data, error } = await supabase.from('tasks').insert({
        name: p.name,
        priority: p.priority || 'medium',
        due_date: p.due_date || null,
        project_id: p.project_id || null,
        area_id: p.area_id || null,
        notes: p.notes || null,
        status: 'todo',
        is_next_action: !!p.is_next_action,
      }).select().single();
      if (error) return { ok:false, note:error.message };
      return { ok:true, ref:data.id };
    }

    if (type === 'update_project_next_action') {
      // Clear any existing next-action flag on this project so there's a single clear next action
      await supabase.from('tasks').update({ is_next_action: false }).eq('project_id', p.project_id).eq('is_next_action', true);
      // Create the new task flagged as the project's next action
      const { data, error } = await supabase.from('tasks').insert({
        name: p.task_name || p.name,
        project_id: p.project_id,
        priority: p.priority || 'medium',
        due_date: p.due_date || null,
        status: 'todo',
        is_next_action: true,
      }).select().single();
      if (error) return { ok:false, note:error.message };
      return { ok:true, ref:data.id };
    }

    if (type === 'update_task_priority') {
      const { error } = await supabase.from('tasks').update({ priority: p.priority }).eq('id', p.task_id);
      if (error) return { ok:false, note:error.message };
      return { ok:true, ref:p.task_id };
    }

    if (type === 'create_waiting_for') {
      const { data, error } = await supabase.from('waiting_for').insert({
        name: p.name,
        waiting_on: p.waiting_on || null,
        due_date: p.due_date || null,
        area_id: p.area_id || null,
        status: 'open',
      }).select().single();
      if (error) return { ok:false, note:error.message };
      return { ok:true, ref:data.id };
    }

    if (type === 'update_decision_status') {
      const { error } = await supabase.from('decisions').update({
        status: p.status,
        outcome: p.outcome || null,
        decided_at: p.status === 'decided' ? new Date().toISOString() : null,
      }).eq('id', p.decision_id);
      if (error) return { ok:false, note:error.message };
      return { ok:true, ref:p.decision_id };
    }

    if (type === 'archive_project') {
      // Archive, never delete (Part 6 safe defaults)
      const { error } = await supabase.from('projects').update({ status: 'archived' }).eq('id', p.project_id);
      if (error) return { ok:false, note:error.message };
      return { ok:true, ref:p.project_id };
    }

    if (type === 'create_calendar_block') {
      // Writes a tagged event to the shared calendar via the calendar function.
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) return { ok:false, note:'Not signed in.' };
      const res = await fetch(CALENDAR_FN_URL, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${session.access_token}`,
          'apikey': SUPABASE_KEY,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ action: 'create_block', block: {
          title: p.title, block_type: p.block_type || 'focus',
          date: p.date, start_time: p.start_time, end_time: p.end_time,
        }}),
      });
      const out = await res.json();
      if (out.error) return { ok:false, note: out.detail ? `${out.error}: ${String(out.detail).slice(0,160)}` : (out.message||out.error) };
      if (out.created) return { ok:true, ref: out.created.id };
      return { ok:false, note:'Unexpected calendar response.' };
    }

    return { ok:false, note:'Unknown action type' };
  } catch (e) {
    return { ok:false, note:String(e) };
  }
}

// Fetch today's most recent stored Plan My Day brief (does NOT call Claude).
async function fetchTodaysBrief() {
  const { data } = await supabase.from('reviews')
    .select('*')
    .eq('review_type', 'daily')
    .eq('title', 'Plan My Day')
    .order('created_at', { ascending: false })
    .limit(1)
    .maybeSingle();
  if (!data) return null;
  // Only count it as "today's" if it was created on the local calendar day
  const created = new Date(data.created_at);
  if (localDateKey(created) !== localDateKey()) return null;
  return data;
}

// Call Helm (the embedded assistant) with a request type.
async function callHelm(type, extra = {}) {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) return { error: 'no_session' };
  try {
    const res = await fetch(HELM_FN_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${session.access_token}`,
        'apikey': SUPABASE_KEY,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ type, ...extra }),
    });
    return await res.json();
  } catch (e) {
    return { error: 'fetch_failed', detail: String(e) };
  }
}

// Kick off Google sign-in WITH calendar scope + offline access.
// This re-uses Supabase Auth; on return the session carries a
// provider_token + provider_refresh_token we hand to the Edge Function.
async function connectGoogleCalendar() {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      scopes: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.app.created',
      queryParams: { access_type: 'offline', prompt: 'consent' },
      redirectTo: window.location.href.split('#')[0],
    },
  });
  if (error) console.error('Google connect error', error);
}

// After an OAuth return, store the Google refresh token via the Edge Function.
async function storeGoogleToken(session) {
  if (!session?.provider_refresh_token && !session?.provider_token) return;
  try {
    await fetch(CALENDAR_FN_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${session.access_token}`,
        'apikey': SUPABASE_KEY,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        provider_token: session.provider_token,
        provider_refresh_token: session.provider_refresh_token,
        scope: 'calendar.readonly',
      }),
    });
  } catch (e) { console.error('storeGoogleToken failed', e); }
}

// Fetch events for the next `daysAhead` days from the Edge Function.
async function fetchCalendarEvents(daysAhead = 7) {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) return { error: 'no_session' };
  try {
    const res = await fetch(CALENDAR_FN_URL, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${session.access_token}`,
        'apikey': SUPABASE_KEY,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ daysAhead }),
    });
    return await res.json();
  } catch (e) {
    return { error: 'fetch_failed', detail: String(e) };
  }
}

// Event time formatting
const fmtTime = iso => {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
};
// Returns a local-time YYYY-MM-DD key (NOT UTC). Using toISOString() would
// roll over to the wrong day late at night, so we build it from local parts.
const localDateKey = (date = new Date()) => {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
};
const fmtDayLabel = d => {
  const date = new Date(d);
  const today = new Date(); today.setHours(0,0,0,0);
  const cmp = new Date(date); cmp.setHours(0,0,0,0);
  const diff = Math.round((cmp - today) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  return date.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' });
};
// Group events by calendar day (YYYY-MM-DD)
function groupEventsByDay(events) {
  const groups = {};
  events.forEach(e => {
    const key = (e.start || '').split('T')[0];
    if (!key) return;
    (groups[key] = groups[key] || []).push(e);
  });
  return groups;
}
// Find free gaps in a day's timed events, within working hours.
function findGaps(dayEvents, dayKey, workStart = 8, workEnd = 22, minGapMins = 30) {
  const timed = dayEvents
    .filter(e => !e.allDay && e.start && e.end)
    .map(e => ({ start: new Date(e.start), end: new Date(e.end) }))
    .sort((a, b) => a.start - b.start);
  const dayStart = new Date(dayKey + 'T00:00:00'); dayStart.setHours(workStart, 0, 0, 0);
  const dayEnd = new Date(dayKey + 'T00:00:00'); dayEnd.setHours(workEnd, 0, 0, 0);
  const gaps = [];
  let cursor = new Date(dayStart);
  // Don't suggest gaps in the past for today
  const now = new Date();
  if (cursor < now && dayKey === localDateKey(now)) cursor = new Date(now);
  timed.forEach(ev => {
    if (ev.start > cursor) {
      const mins = (ev.start - cursor) / 60000;
      if (mins >= minGapMins) gaps.push({ start: new Date(cursor), end: new Date(ev.start), mins });
    }
    if (ev.end > cursor) cursor = new Date(ev.end);
  });
  if (dayEnd > cursor) {
    const mins = (dayEnd - cursor) / 60000;
    if (mins >= minGapMins) gaps.push({ start: new Date(cursor), end: new Date(dayEnd), mins });
  }
  return gaps;
}
// Classify a day's load
function classifyDay(dayEvents) {
  const timed = dayEvents.filter(e => !e.allDay);
  const totalMins = timed.reduce((sum, e) => {
    if (e.start && e.end) return sum + (new Date(e.end) - new Date(e.start)) / 60000;
    return sum;
  }, 0);
  const hours = totalMins / 60;
  if (timed.length === 0) return { label: 'Empty', tone: 'green', hours };
  if (hours >= 6 || timed.length >= 6) return { label: 'Overloaded', tone: 'red', hours };
  if (hours >= 3 || timed.length >= 3) return { label: 'Busy', tone: 'amber', hours };
  return { label: 'Light', tone: 'blue', hours };
}

  const saveTask = async () => {
    if (!form.name) return;
    if (editing) await supabase.from('tasks').update(form).eq('id', editing.id);
    else await supabase.from('tasks').insert({...form, status:'todo', priority:form.priority||'medium'});
    setModal(null); setForm({}); setEditing(null); load();
  };

  const saveWaiting = async () => {
    if (!form.name) return;
    if (editing) await supabase.from('waiting_for').update(form).eq('id', editing.id);
    else await supabase.from('waiting_for').insert({...form, status:'open'});
    setModal(null); setForm({}); setEditing(null); load();
  };

  const completeTask = async (id, e) => {
    e.stopPropagation();
    await supabase.from('tasks').update({status:'done', completed_at: new Date().toISOString()}).eq('id', id);
    load();
  };

  const chaseWaiting = async (id, e) => {
    e.stopPropagation();
    await supabase.from('waiting_for').update({status:'chased', chased_at: new Date().toISOString()}).eq('id', id);
    load();
  };

  const areaMap = Object.fromEntries(areas.map(a=>[a.id,a]));
  const projMap = Object.fromEntries(projects.map(p=>[p.id,p]));

  if (loading) return <div className="spinner"/>;

  return (
    <div className="page">
      <div className="row-between" style={{marginBottom:12}}>
        <h1 style={{fontSize:20,fontWeight:700}}>Tasks</h1>
        <button className="btn btn-primary btn-sm" onClick={()=>{setEditing(null);setForm({priority:'medium',status:'todo'});setModal(tab==='tasks'?'task':'waiting');}}>
          <Icon name="plus" size={14}/> New
        </button>
      </div>

      <div style={{display:'flex',gap:6,marginBottom:16}}>
        <button className={`qc-type-btn ${tab==='tasks'?'active':''}`} onClick={()=>setTab('tasks')}>Tasks ({tasks.length})</button>
        <button className={`qc-type-btn ${tab==='waiting'?'active':''}`} onClick={()=>setTab('waiting')}>Waiting for ({waitingFor.length})</button>
      </div>

      {tab === 'tasks' && (
        <>
          {tasks.length === 0 && <div className="empty"><div className="empty-icon">✅</div>No open tasks</div>}
          {tasks.map(t => {
            const area = areaMap[t.area_id];
            const proj = projMap[t.project_id];
            return (
              <div key={t.id} className="card-sm" style={{cursor:'pointer'}} onClick={()=>{setEditing(t);setForm({...t});setModal('task');}}>
                <div className="row-between">
                  <div style={{flex:1,minWidth:0}}>
                    <div className="row" style={{gap:6,marginBottom:t.is_next_action?4:0}}>
                      {t.is_next_action && <span style={{color:'var(--accent)',fontSize:11,fontWeight:600}}>⚡ NEXT</span>}
                      <div className="name" style={{fontSize:13}}>{t.name}</div>
                    </div>
                    <div className="tag-row">
                      {priorityPill(t.priority)}
                      {area && <span className="pill pill-muted">{area.icon} {area.name}</span>}
                      {proj && <span className="pill pill-muted">📁 {proj.name}</span>}
                      {t.due_date && <span className={`pill ${isOverdue(t.due_date)?'pill-red':isDueSoon(t.due_date)?'pill-amber':'pill-muted'}`}>
                        {isOverdue(t.due_date)?'Overdue':'Due '}{fmtDate(t.due_date)}
                      </span>}
                    </div>
                  </div>
                  <button className="btn btn-ghost btn-sm btn-icon" style={{marginLeft:8,flexShrink:0,borderRadius:'50%'}} onClick={e=>completeTask(t.id,e)}>
                    <Icon name="check" size={14}/>
                  </button>
                </div>
              </div>
            );
          })}
        </>
      )}

      {tab === 'waiting' && (
        <>
          {waitingFor.length === 0 && <div className="empty"><div className="empty-icon">👥</div>Nothing waiting</div>}
          {waitingFor.map(w => {
            const area = areaMap[w.area_id];
            return (
              <div key={w.id} className="card-sm" style={{cursor:'pointer'}} onClick={()=>{setEditing(w);setForm({...w});setModal('waiting');}}>
                <div className="row-between">
                  <div style={{flex:1,minWidth:0}}>
                    <div className="name" style={{fontSize:13}}>{w.name}</div>
                    <div className="tag-row">
                      {w.waiting_on && <span className="pill pill-purple">👤 {w.waiting_on}</span>}
                      {area && <span className="pill pill-muted">{area.icon} {area.name}</span>}
                      {w.due_date && <span className={`pill ${isOverdue(w.due_date)?'pill-red':'pill-amber'}`}>Expected {fmtDate(w.due_date)}</span>}
                      {w.chased_at && <span className="pill pill-muted">Chased {fmtDate(w.chased_at)}</span>}
                    </div>
                  </div>
                  <button className="btn btn-ghost btn-sm" style={{marginLeft:8,flexShrink:0,fontSize:11}} onClick={e=>chaseWaiting(w.id,e)}>
                    Chase
                  </button>
                </div>
              </div>
            );
          })}
        </>
      )}

      {modal === 'task' && (
        <Modal title={editing?'Edit task':'New task'} onClose={()=>{setModal(null);setForm({});setEditing(null);}}>
          <div className="field"><label className="label">Task</label><input className="input" value={form.name||''} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="What needs doing?"/></div>
          <div className="field"><label className="label">Area</label>
            <select className="input" value={form.area_id||''} onChange={e=>setForm(p=>({...p,area_id:e.target.value||null}))}>
              <option value="">No area</option>
              {areas.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}
            </select>
          </div>
          <div className="field"><label className="label">Project</label>
            <select className="input" value={form.project_id||''} onChange={e=>setForm(p=>({...p,project_id:e.target.value||null}))}>
              <option value="">No project</option>
              {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
          <div className="row" style={{gap:8,marginBottom:14}}>
            <div style={{flex:1}}>
              <label className="label">Priority</label>
              <select className="input" value={form.priority||'medium'} onChange={e=>setForm(p=>({...p,priority:e.target.value}))}>
                <option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>
              </select>
            </div>
            <div style={{flex:1}}>
              <label className="label">Status</label>
              <select className="input" value={form.status||'todo'} onChange={e=>setForm(p=>({...p,status:e.target.value}))}>
                <option value="todo">To do</option><option value="in_progress">In progress</option><option value="done">Done</option><option value="cancelled">Cancelled</option>
              </select>
            </div>
          </div>
          <div className="field"><label className="label">Due date</label><input className="input" type="date" value={form.due_date||''} onChange={e=>setForm(p=>({...p,due_date:e.target.value||null}))}/></div>
          <div className="field" style={{display:'flex',alignItems:'center',gap:10}}>
            <input type="checkbox" id="isNext" checked={!!form.is_next_action} onChange={e=>setForm(p=>({...p,is_next_action:e.target.checked}))} style={{width:16,height:16}}/>
            <label htmlFor="isNext" style={{fontSize:13,color:'var(--text)'}}>⚡ Mark as next action</label>
          </div>
          <div className="field"><label className="label">Notes</label><textarea className="input" value={form.notes||''} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Any context"/></div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={saveTask}>Save task</button>
        </Modal>
      )}

      {modal === 'waiting' && (
        <Modal title={editing?'Edit waiting for':'New waiting for'} onClose={()=>{setModal(null);setForm({});setEditing(null);}}>
          <div className="field"><label className="label">What are you waiting for?</label><input className="input" value={form.name||''} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="e.g. Quote from plumber"/></div>
          <div className="field"><label className="label">Waiting on (person or org)</label><input className="input" value={form.waiting_on||''} onChange={e=>setForm(p=>({...p,waiting_on:e.target.value}))} placeholder="e.g. HMRC"/></div>
          <div className="field"><label className="label">Area</label>
            <select className="input" value={form.area_id||''} onChange={e=>setForm(p=>({...p,area_id:e.target.value||null}))}>
              <option value="">No area</option>
              {areas.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}
            </select>
          </div>
          <div className="field"><label className="label">Expected by</label><input className="input" type="date" value={form.due_date||''} onChange={e=>setForm(p=>({...p,due_date:e.target.value||null}))}/></div>
          <div className="field"><label className="label">Notes</label><textarea className="input" value={form.notes||''} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Any context"/></div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={saveWaiting}>Save</button>
        </Modal>
      )}
    </div>
  );
}

// ── DECISIONS & ASSETS PAGE ───────────────────────────────────
function DecisionsAssetsPage() {
  const [decisions, setDecisions] = useState([]);
  const [assets, setAssets] = useState([]);
  const [areas, setAreas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('decisions');
  const [modal, setModal] = useState(null);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});

  const load = async () => {
    const [d, a, ar] = await Promise.all([
      supabase.from('decisions').select('*').order('created_at',{ascending:false}),
      supabase.from('assets').select('*').order('name'),
      supabase.from('areas').select('id,name,icon').order('sort_order'),
    ]);
    setDecisions(d.data||[]); setAssets(a.data||[]); setAreas(ar.data||[]); setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  const saveDecision = async () => {
    if (!form.name) return;
    if (editing) await supabase.from('decisions').update(form).eq('id', editing.id);
    else await supabase.from('decisions').insert({...form, status:'open'});
    setModal(null); setForm({}); setEditing(null); load();
  };

  const saveAsset = async () => {
    if (!form.name) return;
    if (editing) await supabase.from('assets').update(form).eq('id', editing.id);
    else await supabase.from('assets').insert({...form, status:'active'});
    setModal(null); setForm({}); setEditing(null); load();
  };

  const areaMap = Object.fromEntries(areas.map(a=>[a.id,a]));
  const openDecisions = decisions.filter(d=>d.status==='open');
  const otherDecisions = decisions.filter(d=>d.status!=='open');

  const assetCategories = ['vehicle','device','subscription','account','property','insurance','membership','other'];

  if (loading) return <div className="spinner"/>;

  return (
    <div className="page">
      <div className="row-between" style={{marginBottom:12}}>
        <h1 style={{fontSize:20,fontWeight:700}}>{tab==='decisions'?'Decisions':'Assets'}</h1>
        <button className="btn btn-primary btn-sm" onClick={()=>{setEditing(null);setForm({status:tab==='decisions'?'open':'active'});setModal(tab==='decisions'?'decision':'asset');}}>
          <Icon name="plus" size={14}/> New
        </button>
      </div>

      <div style={{display:'flex',gap:6,marginBottom:16}}>
        <button className={`qc-type-btn ${tab==='decisions'?'active':''}`} onClick={()=>setTab('decisions')}>Decisions ({openDecisions.length} open)</button>
        <button className={`qc-type-btn ${tab==='assets'?'active':''}`} onClick={()=>setTab('assets')}>Assets ({assets.length})</button>
      </div>

      {tab === 'decisions' && (
        <>
          {decisions.length === 0 && <div className="empty"><div className="empty-icon">🤔</div>No decisions logged</div>}
          {openDecisions.length > 0 && <div className="section-title">Open</div>}
          {openDecisions.map(d => {
            const area = areaMap[d.area_id];
            return (
              <div key={d.id} className="card" style={{cursor:'pointer',borderLeft:'3px solid var(--amber)'}} onClick={()=>{setEditing(d);setForm({...d});setModal('decision');}}>
                <div className="name" style={{marginBottom:4}}>{d.name}</div>
                {d.context && <div className="meta" style={{marginBottom:6}}>{d.context}</div>}
                <div className="tag-row">
                  {area && <span className="pill pill-muted">{area.icon} {area.name}</span>}
                  {d.decide_by && <span className={`pill ${isOverdue(d.decide_by)?'pill-red':'pill-amber'}`}>Decide by {fmtDate(d.decide_by)}</span>}
                </div>
              </div>
            );
          })}
          {otherDecisions.length > 0 && <div className="section-title">Decided / deferred</div>}
          {otherDecisions.map(d => (
            <div key={d.id} className="card-sm" style={{cursor:'pointer',opacity:0.6}} onClick={()=>{setEditing(d);setForm({...d});setModal('decision');}}>
              <div className="row-between">
                <div className="name" style={{fontSize:13}}>{d.name}</div>
                {statusPill(d.status)}
              </div>
            </div>
          ))}
        </>
      )}

      {tab === 'assets' && (
        <>
          {assets.length === 0 && <div className="empty"><div className="empty-icon">📦</div>No assets tracked</div>}
          {assetCategories.map(cat => {
            const catAssets = assets.filter(a=>a.category===cat);
            if (catAssets.length === 0) return null;
            return (
              <div key={cat}>
                <div className="section-title">{cat.charAt(0).toUpperCase()+cat.slice(1)}</div>
                {catAssets.map(a => {
                  const area = areaMap[a.area_id];
                  const alerts = [];
                  if (isOverdue(a.expires_at)) alerts.push({label:'Expired', type:'red'});
                  else if (isDueSoon(a.expires_at)) alerts.push({label:`Renews ${fmtDate(a.expires_at)}`, type:'amber'});
                  if (isOverdue(a.mot_due_at)) alerts.push({label:'MOT overdue', type:'red'});
                  else if (isDueSoon(a.mot_due_at)) alerts.push({label:`MOT ${fmtDate(a.mot_due_at)}`, type:'amber'});
                  if (isDueSoon(a.next_service_at)) alerts.push({label:`Service ${fmtDate(a.next_service_at)}`, type:'amber'});
                  return (
                    <div key={a.id} className="card-sm" style={{cursor:'pointer'}} onClick={()=>{setEditing(a);setForm({...a});setModal('asset');}}>
                      <div className="row-between">
                        <div style={{flex:1,minWidth:0}}>
                          <div className="name" style={{fontSize:13}}>{a.name}</div>
                          {a.provider && <div className="meta">{a.provider}</div>}
                          <div className="tag-row">
                            {area && <span className="pill pill-muted">{area.icon}</span>}
                            {alerts.map((al,i)=><span key={i} className={`pill pill-${al.type}`}>{al.label}</span>)}
                            {a.monthly_cost && <span className="pill pill-muted">£{a.monthly_cost}/mo</span>}
                            {a.annual_cost && <span className="pill pill-muted">£{a.annual_cost}/yr</span>}
                          </div>
                        </div>
                        <Icon name="chevron" size={16} style={{color:'var(--muted)',flexShrink:0}}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </>
      )}

      {modal === 'decision' && (
        <Modal title={editing?'Edit decision':'New decision'} onClose={()=>{setModal(null);setForm({});setEditing(null);}}>
          <div className="field"><label className="label">Decision to make</label><input className="input" value={form.name||''} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="e.g. Which savings account to use"/></div>
          <div className="field"><label className="label">Context</label><textarea className="input" value={form.context||''} onChange={e=>setForm(p=>({...p,context:e.target.value}))} placeholder="Background and what is known"/></div>
          <div className="field"><label className="label">Options being considered</label><textarea className="input" value={form.options||''} onChange={e=>setForm(p=>({...p,options:e.target.value}))} placeholder="Option A, Option B…"/></div>
          <div className="field"><label className="label">Area</label>
            <select className="input" value={form.area_id||''} onChange={e=>setForm(p=>({...p,area_id:e.target.value||null}))}>
              <option value="">No area</option>
              {areas.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}
            </select>
          </div>
          <div className="row" style={{gap:8,marginBottom:14}}>
            <div style={{flex:1}}>
              <label className="label">Status</label>
              <select className="input" value={form.status||'open'} onChange={e=>setForm(p=>({...p,status:e.target.value}))}>
                <option value="open">Open</option><option value="decided">Decided</option><option value="deferred">Deferred</option><option value="dropped">Dropped</option>
              </select>
            </div>
            <div style={{flex:1}}>
              <label className="label">Decide by</label>
              <input className="input" type="date" value={form.decide_by||''} onChange={e=>setForm(p=>({...p,decide_by:e.target.value||null}))}/>
            </div>
          </div>
          {form.status === 'decided' && <div className="field"><label className="label">Outcome</label><textarea className="input" value={form.outcome||''} onChange={e=>setForm(p=>({...p,outcome:e.target.value}))} placeholder="What was decided and why"/></div>}
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={saveDecision}>Save</button>
        </Modal>
      )}

      {modal === 'asset' && (
        <Modal title={editing?'Edit asset':'New asset'} onClose={()=>{setModal(null);setForm({});setEditing(null);}}>
          <div className="field"><label className="label">Name</label><input className="input" value={form.name||''} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="e.g. Car Insurance"/></div>
          <div className="row" style={{gap:8,marginBottom:14}}>
            <div style={{flex:1}}>
              <label className="label">Category</label>
              <select className="input" value={form.category||''} onChange={e=>setForm(p=>({...p,category:e.target.value||null}))}>
                <option value="">Select…</option>
                {assetCategories.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div style={{flex:1}}>
              <label className="label">Area</label>
              <select className="input" value={form.area_id||''} onChange={e=>setForm(p=>({...p,area_id:e.target.value||null}))}>
                <option value="">No area</option>
                {areas.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}
              </select>
            </div>
          </div>
          <div className="field"><label className="label">Provider / brand</label><input className="input" value={form.provider||''} onChange={e=>setForm(p=>({...p,provider:e.target.value}))} placeholder="e.g. Admiral, Apple, Monzo"/></div>
          <div className="field"><label className="label">Account / policy ref</label><input className="input" value={form.account_ref||''} onChange={e=>setForm(p=>({...p,account_ref:e.target.value}))} placeholder="Reference number"/></div>
          <div className="section-title" style={{marginTop:4}}>Key dates</div>
          <div className="row" style={{gap:8,marginBottom:14}}>
            <div style={{flex:1}}><label className="label">Renewal / expires</label><input className="input" type="date" value={form.expires_at||''} onChange={e=>setForm(p=>({...p,expires_at:e.target.value||null}))}/></div>
            <div style={{flex:1}}><label className="label">Next service</label><input className="input" type="date" value={form.next_service_at||''} onChange={e=>setForm(p=>({...p,next_service_at:e.target.value||null}))}/></div>
          </div>
          <div className="row" style={{gap:8,marginBottom:14}}>
            <div style={{flex:1}}><label className="label">MOT due</label><input className="input" type="date" value={form.mot_due_at||''} onChange={e=>setForm(p=>({...p,mot_due_at:e.target.value||null}))}/></div>
            <div style={{flex:1}}><label className="label">Warranty until</label><input className="input" type="date" value={form.warranty_until||''} onChange={e=>setForm(p=>({...p,warranty_until:e.target.value||null}))}/></div>
          </div>
          <div className="section-title" style={{marginTop:4}}>Costs</div>
          <div className="row" style={{gap:8,marginBottom:14}}>
            <div style={{flex:1}}><label className="label">Monthly cost (£)</label><input className="input" type="number" value={form.monthly_cost||''} onChange={e=>setForm(p=>({...p,monthly_cost:e.target.value||null}))}/></div>
            <div style={{flex:1}}><label className="label">Annual cost (£)</label><input className="input" type="number" value={form.annual_cost||''} onChange={e=>setForm(p=>({...p,annual_cost:e.target.value||null}))}/></div>
          </div>
          <div className="field"><label className="label">Notes</label><textarea className="input" value={form.notes||''} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Any extra details"/></div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={saveAsset}>Save asset</button>
        </Modal>
      )}
    </div>
  );
}

// ── QUICK CAPTURE ─────────────────────────────────────────────
function QuickCapturePage() {
  const [type, setType] = useState('task');
  const [areas, setAreas] = useState([]);
  const [projects, setProjects] = useState([]);
  const [form, setForm] = useState({priority:'medium'});
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  useEffect(()=>{
    const load = async () => {
      const [a,p] = await Promise.all([
        supabase.from('areas').select('id,name,icon').order('sort_order'),
        supabase.from('projects').select('id,name').eq('status','active').order('name'),
      ]);
      setAreas(a.data||[]); setProjects(p.data||[]);
    };
    load();
  },[]);

  const save = async () => {
    if (!form.name) return;
    setSaving(true);
    const tables = { task:'tasks', waiting:'waiting_for', decision:'decisions', project:'projects' };
    const defaults = {
      task: { status:'todo', priority:'medium' },
      waiting: { status:'open' },
      decision: { status:'open' },
      project: { status:'active', priority:'medium', horizon:'active' },
    };
    await supabase.from(tables[type]).insert({...defaults[type], ...form});
    setSaving(false); setSaved(true); setForm({priority:'medium'});
    setTimeout(()=>setSaved(false), 2000);
  };

  const types = [
    { id:'task', label:'Task' },
    { id:'waiting', label:'Waiting for' },
    { id:'decision', label:'Decision' },
    { id:'project', label:'Project' },
  ];

  return (
    <div className="page">
      <h1 style={{fontSize:20,fontWeight:700,marginBottom:16}}>Quick Capture</h1>
      <div className="card">
        <div className="qc-type-row">
          {types.map(t=>(
            <button key={t.id} className={`qc-type-btn ${type===t.id?'active':''}`} onClick={()=>{setType(t.id);setForm({priority:'medium'});}}>
              {t.label}
            </button>
          ))}
        </div>

        <div className="field">
          <label className="label">{type==='task'?'What needs doing?':type==='waiting'?'What are you waiting for?':type==='decision'?'What decision needs making?':'Project name'}</label>
          <textarea className="input" style={{minHeight:64}} value={form.name||''} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Describe it in plain English…" autoFocus/>
        </div>

        <div className="field">
          <label className="label">Area</label>

// ── SHARED REVIEW PROMPT BUILDER ──────────────────────────────
function buildReviewPrompt(data) {
  if (!data) return '';
  const overdue = data.tasks.filter(t=>isOverdue(t.due_date));
  const dueToday = data.tasks.filter(t=>t.due_date===data.today);
  const nextActions = data.tasks.filter(t=>t.is_next_action);
  const staleProjects = data.projects
    .filter(p=>['critical','active'].includes(p.horizon||'active'))
    .filter(p => !data.tasks.some(t=>t.project_id===p.id&&t.is_next_action));
  const staleDecisions = data.decisions.filter(d=>{
    const age = Math.floor((new Date(data.today)-new Date(d.created_at))/86400000);
    return age >= 7;
  });
  const urgentAssets = data.assets.filter(a=>isOverdue(a.expires_at)||isOverdue(a.mot_due_at)||isDueSoon(a.expires_at)||isDueSoon(a.mot_due_at)||isDueSoon(a.next_service_at));
  const critical = data.projects.filter(p=>p.horizon==='critical');

  return `# Lovejoy OS — Weekly Review Brief
Generated: ${new Date().toLocaleDateString('en-GB', {weekday:'long',day:'numeric',month:'long',year:'numeric'})}

## System snapshot
- Open tasks: ${data.tasks.length}
- Active projects: ${data.projects.length} (${critical.length} critical)
- Open waiting for: ${data.waiting.length}
- Open decisions: ${data.decisions.length}

## Critical projects (${critical.length})
${critical.length===0?'None flagged critical.':critical.map(p=>`- ${p.name}${p.description?`: ${p.description}`:''}`).join('\n')}

## Overdue tasks (${overdue.length})
${overdue.length===0?'None overdue.':overdue.map(t=>`- ${t.name}${t.due_date?` (was due ${fmtDate(t.due_date)})`:''}${t.notes?`\n  Context: ${t.notes}`:''}`).join('\n')}

## Due today (${dueToday.length})
${dueToday.length===0?'Nothing due today.':dueToday.map(t=>`- ${t.name}`).join('\n')}

## Next actions (${nextActions.length})
${nextActions.length===0?'No next actions flagged — consider reviewing your projects.':nextActions.map(t=>`- ${t.name}`).join('\n')}

## Critical/active projects with no next action (${staleProjects.length})
${staleProjects.length===0?'All active projects have a next action.':staleProjects.map(p=>`- ${p.name}${p.description?`: ${p.description}`:''}`).join('\n')}

## Open waiting for (${data.waiting.length})
${data.waiting.length===0?'Nothing outstanding.':data.waiting.map(w=>`- ${w.name}${w.waiting_on?` — waiting on ${w.waiting_on}`:''}${w.due_date?` (expected ${fmtDate(w.due_date)})`:''}`).join('\n')}

## Decisions open 7+ days (${staleDecisions.length})
${staleDecisions.length===0?'No stale decisions.':staleDecisions.map(d=>`- ${d.name}${d.context?`\n  Context: ${d.context}`:''}${d.options?`\n  Options: ${d.options}`:''}`).join('\n')}

## Asset alerts (${urgentAssets.length})
${urgentAssets.length===0?'No upcoming asset dates.':urgentAssets.map(a=>{
  const alerts=[];
  if(isOverdue(a.expires_at))alerts.push(`EXPIRED ${fmtDate(a.expires_at)}`);
  else if(isDueSoon(a.expires_at))alerts.push(`renews ${fmtDate(a.expires_at)}`);
  if(isOverdue(a.mot_due_at))alerts.push(`MOT OVERDUE`);
  else if(isDueSoon(a.mot_due_at))alerts.push(`MOT ${fmtDate(a.mot_due_at)}`);
  if(isDueSoon(a.next_service_at))alerts.push(`service ${fmtDate(a.next_service_at)}`);
  return `- ${a.name}: ${alerts.join(', ')}`;
}).join('\n')}

---
## Prompt for AI review

Please act as Helm, my calm personal steering system, and help me with my weekly review. Using the data above:

1. What are the 3 most important things I should focus on this week?
2. What is at risk of slipping that I should address today?
3. Are there any decisions I should make now to unblock progress?
4. What can I safely ignore or defer this week?
5. Any patterns or concerns you notice in my system?

Be direct and practical. I want clear recommendations, not summaries of what I already know.`;
}

// ── DEBUG PAGE ────────────────────────────────────────────────
function DebugPage() {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [expanded, setExpanded] = useState(new Set());

  const load = async () => {
    setLoading(true);
    const { data } = await supabase.from('helm_logs')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(50);
    setLogs(data || []);
    setLoading(false);
  };

  useEffect(()=>{ load(); },[]);

  const clearLogs = async () => {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return;
    await supabase.from('helm_logs').delete().eq('user_id', user.id);
    setLogs([]);
  };

  const toggle = (id) => setExpanded(prev => {
    const next = new Set(prev);
    if (next.has(id)) next.delete(id); else next.add(id);
    return next;
  });

  const statusColour = s => s==='error'?'var(--red)':s==='warning'?'var(--amber)':'var(--green)';
  const statusIcon   = s => s==='error'?'✗':s==='warning'?'⚠':'✓';

  if (loading) return <div className="page"><div className="spinner"/></div>;

  return (
    <div className="page">
      <div className="row-between" style={{marginBottom:4}}>
        <h1 style={{fontSize:20,fontWeight:700}}>Debug Log</h1>
        <div className="row" style={{gap:8}}>
          <button className="btn btn-ghost btn-sm" onClick={load}>↻ Refresh</button>
          <button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={clearLogs}>Clear</button>
        </div>
      </div>
      <div className="meta" style={{marginBottom:14}}>Last 50 Edge Function calls. Tap any entry to see full detail.</div>

      {logs.length === 0 && (
        <div className="empty"><div className="empty-icon">🪵</div>No logs yet — logs appear here after the first Helm or Calendar action.</div>
      )}

      {logs.map(log => {
        const isOpen = expanded.has(log.id);
        const colour = statusColour(log.status);
        return (
          <div key={log.id} className="card-sm" style={{marginBottom:6,borderLeft:`3px solid ${colour}`,cursor:'pointer'}} onClick={()=>toggle(log.id)}>
            <div className="row-between">
              <div className="row" style={{gap:6,flex:1,minWidth:0}}>
                <span style={{fontSize:12,color:colour,flexShrink:0}}>{statusIcon(log.status)}</span>
                <span style={{fontSize:12,fontWeight:600,flexShrink:0}}>{log.function_name}</span>
                {log.action && <span className="pill pill-muted" style={{fontSize:10}}>{log.action.replace(/_/g,' ')}</span>}
              </div>
              <div className="row" style={{gap:8,flexShrink:0,marginLeft:8}}>
                {log.duration_ms != null && <span className="meta">{log.duration_ms}ms</span>}
                <span className="meta">{fmtTime(log.created_at)}</span>
              </div>
            </div>

            {log.error_code && (
              <div style={{fontSize:11,color:'var(--red)',marginTop:3,fontFamily:'monospace'}}>{log.error_code}</div>
            )}

            {log.meta && Object.keys(log.meta).length>0 && (
              <div className="meta" style={{marginTop:2}}>
                {Object.entries(log.meta).map(([k,v])=>`${k}: ${v}`).join(' · ')}
              </div>
            )}

            {isOpen && log.error_detail && (
              <div style={{fontSize:11,color:'var(--muted)',marginTop:8,wordBreak:'break-all',lineHeight:1.5,background:'var(--bg)',padding:8,borderRadius:6,fontFamily:'monospace'}}>
                {log.error_detail}
              </div>
            )}

            {isOpen && !log.error_detail && (
              <div className="meta" style={{marginTop:6}}>No error detail. Created at {new Date(log.created_at).toLocaleString('en-GB', {timeZone:'Europe/London'})}.</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── PROPOSED ACTIONS (approve / reject / edit) ────────────────
// Each proposal is its own card. Nothing writes until Approve is
// tapped. Edit lets you change details first. Every outcome is
// logged to proposed_actions (the audit trail).
function ProposedActions({ changes, sourceRequest }) {
  // status per card: 'pending' | 'approved' | 'rejected' | 'failed'
  const [states, setStates] = useState(() => changes.map(c => ({ status:'pending', edited:{...c}, editing:false, note:'' })));

  // Human-readable description of what a change will do
  const describe = (c) => {
    switch (c.type) {
      case 'create_task': return `Create a task: "${c.name}"`;
      case 'update_project_next_action': return `Set next action on a project: "${c.task_name || c.name}"`;
      case 'update_task_priority': return `Change a task's priority to ${c.priority}`;
      case 'create_waiting_for': return `Track waiting for: "${c.name}"${c.waiting_on ? ` (from ${c.waiting_on})` : ''}`;
      case 'update_decision_status': return `Mark a decision as ${c.status}`;
      case 'create_calendar_block': return `Block calendar: "${c.title}" ${c.date || ''} ${c.start_time || ''}–${c.end_time || ''}`;
      case 'archive_project': return `Archive a project`;
      default: return c.type;
    }
  };

  // Which fields are editable per action type
  const editableFields = (type) => {
    if (type === 'create_task') return [['name','Task title','text'],['due_date','Due date','date'],['priority','Priority','priority'],['notes','Notes','text']];
    if (type === 'update_project_next_action') return [['task_name','Next action','text'],['due_date','Due date','date'],['priority','Priority','priority']];
    if (type === 'create_waiting_for') return [['name','Waiting for','text'],['waiting_on','From whom','text'],['due_date','Expected by','date']];
    if (type === 'update_decision_status') return [['status','New status','decstatus'],['outcome','Outcome','text']];
    if (type === 'create_calendar_block') return [['title','Title','text'],['date','Date','date'],['start_time','Start','time'],['end_time','End','time']];
    if (type === 'update_task_priority') return [['priority','Priority','priority']];
    return [];
  };

  const setCard = (i, patch) => setStates(prev => prev.map((s,idx)=> idx===i ? {...s, ...patch} : s));
  const setField = (i, key, val) => setStates(prev => prev.map((s,idx)=> idx===i ? {...s, edited:{...s.edited, [key]:val}} : s));

  const approve = async (i, wasEdited) => {
    const card = states[i];
    const c = card.edited;
    setCard(i, { status:'applying' });
    const res = await applyProposedAction(c.type, c);
    await logProposal({
      action_type: c.type,
      explanation: c.rationale || '',
      payload: changes[i],
      final_payload: c,
      status: res.ok ? (wasEdited ? 'edited_approved' : 'approved') : 'failed',
      result_ref: res.ref,
      result_note: res.note,
      source_request: sourceRequest,
    });
    setCard(i, { status: res.ok ? 'approved' : 'failed', note: res.note || '', editing:false });
  };

  const reject = async (i) => {
    const c = states[i].edited;
    await logProposal({
      action_type: c.type,
      explanation: c.rationale || '',
      payload: changes[i],
      status: 'rejected',
      source_request: sourceRequest,
    });
    setCard(i, { status:'rejected' });
  };

  return (
    <div className="card" style={{marginBottom:10,borderLeft:'3px solid var(--accent2)'}}>
      <div className="section-title" style={{marginTop:0}}>Proposed by {ASSISTANT_NAME}</div>
      <div className="meta" style={{marginBottom:10}}>Nothing changes until you approve. Edit any proposal first if you want to tweak it.</div>

      {states.map((card, i) => {
        const c = card.edited;
        return (
          <div key={i} className="card-sm" style={{background:'var(--surface2)',marginBottom:8}}>
            <div className="row" style={{gap:6,marginBottom:4}}>
              <span className="pill pill-purple">{(c.type||'change').replace(/_/g,' ')}</span>
              {card.status==='approved' && <span className="pill pill-green">✓ Approved</span>}
              {card.status==='rejected' && <span className="pill pill-muted">Rejected</span>}
              {card.status==='failed' && <span className="pill pill-red">Failed</span>}
            </div>

            <div style={{fontSize:13,marginBottom:2}}>{describe(c)}</div>
            {c.rationale && <div className="meta" style={{marginBottom:6}}>{c.rationale}</div>}

            {/* Editing form */}
            {card.editing && card.status==='pending' && (
              <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)'}}>
                {editableFields(c.type).map(([key,label,kind])=>(
                  <div className="field" key={key} style={{marginBottom:8}}>
                    <label className="label">{label}</label>
                    {kind==='priority' ? (
                      <select className="input" value={c[key]||'medium'} onChange={e=>setField(i,key,e.target.value)}>
                        <option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>
                      </select>
                    ) : kind==='decstatus' ? (
                      <select className="input" value={c[key]||'decided'} onChange={e=>setField(i,key,e.target.value)}>
                        <option value="decided">Decided</option><option value="deferred">Deferred</option><option value="dropped">Dropped</option>
                      </select>
                    ) : (
                      <input className="input" type={kind==='date'?'date':kind==='time'?'time':'text'} value={c[key]||''} onChange={e=>setField(i,key,e.target.value)}/>
                    )}
                  </div>
                ))}
              </div>
            )}

            {/* Action buttons */}
            {card.status==='pending' && (
              <div className="row" style={{gap:6,marginTop:8}}>
                <button className="btn btn-primary btn-sm" onClick={()=>approve(i, card.editing)}>Approve</button>
                <button className="btn btn-ghost btn-sm" onClick={()=>setCard(i,{editing:!card.editing})}>{card.editing?'Done editing':'Edit'}</button>
                <button className="btn btn-ghost btn-sm" style={{color:'var(--red)'}} onClick={()=>reject(i)}>Reject</button>
              </div>
            )}
            {card.status==='applying' && <div className="meta" style={{marginTop:6}}>Applying…</div>}
            {card.status==='failed' && <div className="meta" style={{marginTop:6,color:'var(--red)'}}>{card.note}</div>}
            {card.status==='approved' && <div className="meta" style={{marginTop:6,color:'var(--green)'}}>Done — added to your system.</div>}
          </div>
        );
      })}
    </div>
  );
}

// ── HELM PAGE (Stages 1, 2) ───────────────────────────────────
function HelmPage() {
  const [loading, setLoading] = useState(false);
  const [activeType, setActiveType] = useState(null);
  const [result, setResult] = useState(null);
  const [decisions, setDecisions] = useState([]);
  const [pickDecision, setPickDecision] = useState(false);
  const [history, setHistory] = useState(null);   // null=not loaded, []=loaded
  const [showHistory, setShowHistory] = useState(false);
  const [expandedHistory, setExpandedHistory] = useState(new Set());

  useEffect(()=>{
    supabase.from('decisions').select('id,name').eq('status','open').then(({data})=>setDecisions(data||[]));
  },[]);

  const loadHistory = async () => {
    const { data } = await supabase.from('reviews')
      .select('id,title,review_type,notes,prompt_used,created_at')
      .order('created_at', { ascending: false })
      .limit(20);
    setHistory(data || []);
  };

  const toggleHistory = () => {
    const next = !showHistory;
    setShowHistory(next);
    if (next && history === null) loadHistory();
  };

  const toggleHistoryItem = (id) => {
    setExpandedHistory(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const run = async (type, extra={}) => {
    setActiveType(type); setLoading(true); setResult(null); setPickDecision(false);
