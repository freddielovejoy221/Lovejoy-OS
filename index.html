<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Lovejoy OS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #181c27;
      --surface2:  #1e2335;
      --border:    #2a3050;
      --text:      #e8eaf2;
      --muted:     #7b82a0;
      --accent:    #4f7cff;
      --accent2:   #7c5cfc;
      --green:     #22c55e;
      --amber:     #f59e0b;
      --red:       #ef4444;
      --radius:    12px;
      --nav-h:     64px;
    }

    html, body, #root { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── LAYOUT ── */
    .app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
    .topbar { height: var(--nav-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; }
    .topbar-logo { font-size: 17px; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .topbar-title { font-size: 15px; color: var(--muted); flex: 1; }
    .topbar-user { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: white; cursor: pointer; }

    .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .page { flex: 1; overflow-y: auto; padding: 16px 16px 80px; }

    .bottomnav { height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; flex-shrink: 0; padding: 0 4px; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 12px; border-radius: 10px; cursor: pointer; transition: all 0.15s; flex: 1; border: none; background: none; color: var(--muted); font-size: 10px; }
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 22px; height: 22px; }

    /* ── CARDS & SURFACES ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
    .card-sm { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
    .section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin: 20px 0 8px; }
    .section-title:first-child { margin-top: 0; }

    /* ── PILLS & BADGES ── */
    .pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .pill-blue   { background: rgba(79,124,255,0.15); color: #7ba4ff; }
    .pill-green  { background: rgba(34,197,94,0.15);  color: #4ade80; }
    .pill-amber  { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .pill-red    { background: rgba(239,68,68,0.15);  color: #f87171; }
    .pill-purple { background: rgba(124,92,252,0.15); color: #a78bfa; }
    .pill-muted  { background: rgba(123,130,160,0.12); color: var(--muted); }

    /* ── BUTTONS ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #3d6ae0; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-danger { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn-icon { padding: 8px; border-radius: 8px; }

    /* ── FORMS ── */
    .input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 14px; color: var(--text); outline: none; transition: border 0.15s; }
    .input:focus { border-color: var(--accent); }
    .input::placeholder { color: var(--muted); }
    .label { font-size: 12px; color: var(--muted); margin-bottom: 5px; display: block; }
    .field { margin-bottom: 14px; }
    select.input { appearance: none; cursor: pointer; }
    textarea.input { resize: vertical; min-height: 80px; }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-end; justify-content: center; padding: 0; }
    .modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; max-height: 90dvh; overflow-y: auto; padding: 20px 16px 32px; }
    .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 18px; }

    /* ── LOGIN ── */
    .login-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100dvh; padding: 32px 24px; gap: 8px; }
    .login-logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
    .login-sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; text-align: center; }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 360px; }

    /* ── MISC ── */
    .row { display: flex; align-items: center; gap: 8px; }
    .row-between { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .icon-area { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .divider { height: 1px; background: var(--border); margin: 12px 0; }
    .empty { text-align: center; padding: 40px 16px; color: var(--muted); font-size: 14px; }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fab { position: fixed; bottom: calc(var(--nav-h) + 16px); right: 16px; width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(79,124,255,0.4); z-index: 50; }
    .name { font-size: 14px; font-weight: 500; color: var(--text); }
    .meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }

    /* ── DASHBOARD SCORE ── */
    .score-ring { width: 80px; height: 80px; }
    .dash-stat { text-align: center; }
    .dash-stat-num { font-size: 28px; font-weight: 700; line-height: 1; }
    .dash-stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* ── QUICK CAPTURE ── */
    .qc-type-row { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .qc-type-btn { padding: 6px 12px; border-radius: 20px; font-size: 12px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .qc-type-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SUPABASE_URL = 'https://kulljpwjmkqxtoqueovz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1bGxqcHdqbWtxeHRvcXVlb3Z6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTE1NzIsImV4cCI6MjA5NzM2NzU3Mn0.E1Eq5Z0TIDuVKmU92LXwaRiGIlLo70TwNP4GBwnOmNo';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const { useState, useEffect, useCallback } = React;

// ── ICONS ────────────────────────────────────────────────────
const Icon = ({ name, size = 20 }) => {
  const icons = {
    home: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    layers: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
    folder: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>,
    check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><polyline points="20 6 9 17 4 12"/></svg>,
    plus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    zap: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
    clock: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    box: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>,
    user: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    x: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    chevron: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><polyline points="9 18 15 12 9 6"/></svg>,
    alert: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
    decision: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
    wait: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>,
    logout: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
    edit: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    trash: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" width={size} height={size}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>,
  };
  return icons[name] || null;
};

// ── HELPERS ──────────────────────────────────────────────────
const priorityPill = p => {
  if (p === 'high')   return <span className="pill pill-red">High</span>;
  if (p === 'medium') return <span className="pill pill-amber">Medium</span>;
  return <span className="pill pill-muted">Low</span>;
};
const statusPill = s => {
  const map = { active:'pill-blue', on_hold:'pill-amber', complete:'pill-green', cancelled:'pill-muted',
                todo:'pill-blue', in_progress:'pill-purple', done:'pill-green',
                open:'pill-amber', decided:'pill-green', deferred:'pill-muted', dropped:'pill-muted',
                chased:'pill-purple', received:'pill-green' };
  const label = s.replace('_',' ');
  return <span className={`pill ${map[s] || 'pill-muted'}`}>{label}</span>;
};
const fmtDate = d => d ? new Date(d).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}) : null;
const daysUntil = d => {
  if (!d) return null;
  return Math.ceil((new Date(d) - new Date()) / 86400000);
};
const isOverdue = d => d && daysUntil(d) < 0;
const isDueSoon = d => { const n = daysUntil(d); return n !== null && n >= 0 && n <= 30; };

// ── LOGIN ─────────────────────────────────────────────────────
function Login({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleLogin = async () => {
    setLoading(true); setError('');
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { setError(error.message); setLoading(false); }
    else onLogin(data.user);
  };

  return (
    <div className="login-wrap">
      <div className="login-logo">Lovejoy OS</div>
      <div className="login-sub">Your personal chief of staff</div>
      <div className="login-card">
        <div className="field">
          <label className="label">Email</label>
          <input className="input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@example.com" />
        </div>
        <div className="field">
          <label className="label">Password</label>
          <input className="input" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&handleLogin()} />
        </div>
        {error && <div style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{error}</div>}
        <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={handleLogin} disabled={loading}>
          {loading ? 'Signing in…' : 'Sign in'}
        </button>
      </div>
    </div>
  );
}

// ── MODAL WRAPPER ─────────────────────────────────────────────
function Modal({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-handle" />
        <div className="row-between" style={{marginBottom:18}}>
          <div className="modal-title">{title}</div>
          <button className="btn btn-ghost btn-sm btn-icon" onClick={onClose}><Icon name="x" size={16}/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── AREAS PAGE ────────────────────────────────────────────────
function AreasPage() {
  const [areas, setAreas] = useState([]);
  const [roles, setRoles] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null); // null | 'area' | 'role'
  const [editing, setEditing] = useState(null);
  const [expanded, setExpanded] = useState({});
  const [form, setForm] = useState({});

  const load = async () => {
    const [a, r] = await Promise.all([
      supabase.from('areas').select('*').order('sort_order'),
      supabase.from('roles').select('*').order('sort_order'),
    ]);
    setAreas(a.data || []); setRoles(r.data || []); setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  const saveArea = async () => {
    if (!form.name) return;
    if (editing) await supabase.from('areas').update(form).eq('id', editing.id);
    else await supabase.from('areas').insert(form);
    setModal(null); setForm({}); setEditing(null); load();
  };

  const saveRole = async () => {
    if (!form.name || !form.area_id) return;
    if (editing) await supabase.from('roles').update(form).eq('id', editing.id);
    else await supabase.from('roles').insert(form);
    setModal(null); setForm({}); setEditing(null); load();
  };

  const openEdit = (type, item) => {
    setEditing(item); setForm({...item}); setModal(type);
  };

  if (loading) return <div className="spinner"/>;

  return (
    <div className="page">
      <div className="row-between" style={{marginBottom:16}}>
        <h1 style={{fontSize:20,fontWeight:700}}>Areas & Roles</h1>
        <button className="btn btn-primary btn-sm" onClick={()=>{setEditing(null);setForm({is_active:true});setModal('area');}}>
          <Icon name="plus" size={14}/> Area
        </button>
      </div>

      {areas.map(area => {
        const areaRoles = roles.filter(r => r.area_id === area.id);
        const open = expanded[area.id];
        return (
          <div key={area.id} className="card" style={{marginBottom:10}}>
            <div className="row-between" onClick={()=>setExpanded(p=>({...p,[area.id]:!p[area.id]}))}>
              <div className="row" style={{gap:10}}>
                <div className="icon-area" style={{background:`${area.colour}22`}}>
                  <span>{area.icon}</span>
                </div>
                <div>
                  <div className="name">{area.name}</div>
                  <div className="meta">{areaRoles.length} role{areaRoles.length!==1?'s':''}</div>
                </div>
              </div>
              <div className="row" style={{gap:6}}>
                <button className="btn btn-ghost btn-sm btn-icon" onClick={e=>{e.stopPropagation();openEdit('area',area);}}>
                  <Icon name="edit" size={14}/>
                </button>
                <Icon name="chevron" size={16} style={{transform:open?'rotate(90deg)':'', transition:'transform 0.2s', color:'var(--muted)'}}/>
              </div>
            </div>

            {open && (
              <div style={{marginTop:12}}>
                <div className="divider"/>
                {area.description && <div className="meta" style={{marginBottom:10}}>{area.description}</div>}
                {areaRoles.map(role => (
                  <div key={role.id} className="card-sm" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div>
                      <div className="name" style={{fontSize:13}}>{role.name}</div>
                      {role.description && <div className="meta">{role.description}</div>}
                    </div>
                    <button className="btn btn-ghost btn-sm btn-icon" onClick={()=>openEdit('role',{...role,area_id:role.area_id})}>
                      <Icon name="edit" size={13}/>
                    </button>
                  </div>
                ))}
                <button className="btn btn-ghost btn-sm" style={{marginTop:6,width:'100%',justifyContent:'center'}}
                  onClick={()=>{setEditing(null);setForm({area_id:area.id,is_active:true});setModal('role');}}>
                  <Icon name="plus" size={13}/> Add role
                </button>
              </div>
            )}
          </div>
        );
      })}

      {modal === 'area' && (
        <Modal title={editing?'Edit area':'New area'} onClose={()=>{setModal(null);setForm({});setEditing(null);}}>
          <div className="field"><label className="label">Name</label><input className="input" value={form.name||''} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="e.g. Health & Fitness"/></div>
          <div className="field"><label className="label">Description</label><input className="input" value={form.description||''} onChange={e=>setForm(p=>({...p,description:e.target.value}))} placeholder="What this area covers"/></div>
          <div className="row" style={{gap:8,marginBottom:14}}>
            <div className="field" style={{flex:1,marginBottom:0}}><label className="label">Icon (emoji)</label><input className="input" value={form.icon||''} onChange={e=>setForm(p=>({...p,icon:e.target.value}))} placeholder="🏃"/></div>
            <div className="field" style={{flex:1,marginBottom:0}}><label className="label">Colour (hex)</label><input className="input" value={form.colour||''} onChange={e=>setForm(p=>({...p,colour:e.target.value}))} placeholder="#22C55E"/></div>
          </div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={saveArea}>Save</button>
        </Modal>
      )}

      {modal === 'role' && (

// ── PROJECTS PAGE ─────────────────────────────────────────────
function ProjectsPage() {
  const [projects, setProjects] = useState([]);
  const [areas, setAreas] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  const [filter, setFilter] = useState('active');

  const load = async () => {
    const [p, a] = await Promise.all([
      supabase.from('projects').select('*').order('created_at', {ascending:false}),
      supabase.from('areas').select('id,name,icon').order('sort_order'),
    ]);
    setProjects(p.data||[]); setAreas(a.data||[]); setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  const save = async () => {
    if (!form.name) return;
    if (editing) await supabase.from('projects').update(form).eq('id', editing.id);
    else await supabase.from('projects').insert({...form, status: form.status||'active', priority: form.priority||'medium'});
    setModal(false); setForm({}); setEditing(null); load();
  };

  const openEdit = item => { setEditing(item); setForm({...item}); setModal(true); };

  const areaMap = Object.fromEntries(areas.map(a=>[a.id, a]));
  const filtered = projects.filter(p => filter === 'all' ? true : filter === 'active' ? p.status === 'active' : p.status === filter);

  const horizonMeta = {
    critical:    { label:'Critical',    pill:'pill-red' },
    active:      { label:'Active',      pill:'pill-blue' },
    maintenance: { label:'Maintenance', pill:'pill-muted' },
    someday:     { label:'Someday',     pill:'pill-purple' },
  };

  if (loading) return <div className="spinner"/>;

  return (
    <div className="page">
      <div className="row-between" style={{marginBottom:12}}>
        <h1 style={{fontSize:20,fontWeight:700}}>Projects</h1>
        <button className="btn btn-primary btn-sm" onClick={()=>{setEditing(null);setForm({status:'active',priority:'medium',horizon:'active'});setModal(true);}}>
          <Icon name="plus" size={14}/> New
        </button>
      </div>

      <div style={{display:'flex',gap:6,marginBottom:16,overflowX:'auto',paddingBottom:4}}>
        {['active','on_hold','complete','all'].map(f=>(
          <button key={f} className={`qc-type-btn ${filter===f?'active':''}`} onClick={()=>setFilter(f)}>
            {f === 'all' ? 'All' : f.replace('_',' ')}
          </button>
        ))}
      </div>

      {filtered.length === 0 && <div className="empty"><div className="empty-icon">📁</div>No {filter} projects</div>}

      {/* When viewing active projects, group by horizon */}
      {filter === 'active' ? (
        ['critical','active','maintenance','someday'].map(h=>{
          const group = filtered.filter(p=>(p.horizon||'active')===h);
          if (group.length===0) return null;
          return (
            <div key={h}>
              <div className="section-title">{horizonMeta[h].label} ({group.length})</div>
              {group.map(p=>{
                const area = areaMap[p.area_id];
                return (
                  <div key={p.id} className="card" onClick={()=>openEdit(p)} style={{cursor:'pointer'}}>
                    <div className="row-between">
                      <div style={{flex:1,minWidth:0}}>
                        <div className="name" style={{marginBottom:4}}>{p.name}</div>
                        {p.description && <div className="meta" style={{marginBottom:6}}>{p.description}</div>}
                        <div className="tag-row">
                          {priorityPill(p.priority)}
                          {area && <span className="pill pill-muted">{area.icon} {area.name}</span>}
                          {p.due_date && <span className={`pill ${isOverdue(p.due_date)?'pill-red':isDueSoon(p.due_date)?'pill-amber':'pill-muted'}`}>
                            {isOverdue(p.due_date)?'Overdue: ':'Due: '}{fmtDate(p.due_date)}
                          </span>}
                        </div>
                      </div>
                      <Icon name="chevron" size={16} style={{color:'var(--muted)',flexShrink:0,marginLeft:8}}/>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })
      ) : (
        filtered.map(p => {
          const area = areaMap[p.area_id];
          return (
            <div key={p.id} className="card" onClick={()=>openEdit(p)} style={{cursor:'pointer'}}>
              <div className="row-between">
                <div style={{flex:1,minWidth:0}}>
                  <div className="name" style={{marginBottom:4}}>{p.name}</div>
                  {p.description && <div className="meta" style={{marginBottom:6}}>{p.description}</div>}
                  <div className="tag-row">
                    {statusPill(p.status)}
                    {p.horizon && <span className={`pill ${horizonMeta[p.horizon]?.pill||'pill-muted'}`}>{horizonMeta[p.horizon]?.label}</span>}
                    {priorityPill(p.priority)}
                    {area && <span className="pill pill-muted">{area.icon} {area.name}</span>}
                    {p.due_date && <span className={`pill ${isOverdue(p.due_date)?'pill-red':isDueSoon(p.due_date)?'pill-amber':'pill-muted'}`}>
                      {isOverdue(p.due_date)?'Overdue: ':'Due: '}{fmtDate(p.due_date)}
                    </span>}
                  </div>
                </div>
                <Icon name="chevron" size={16} style={{color:'var(--muted)',flexShrink:0,marginLeft:8}}/>
              </div>
            </div>
          );
        })
      )}

      {modal && (
        <Modal title={editing?'Edit project':'New project'} onClose={()=>{setModal(false);setForm({});setEditing(null);}}>
          <div className="field"><label className="label">Name</label><input className="input" value={form.name||''} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Project name"/></div>
          <div className="field"><label className="label">Description</label><textarea className="input" value={form.description||''} onChange={e=>setForm(p=>({...p,description:e.target.value}))} placeholder="What does success look like?"/></div>
          <div className="field"><label className="label">Area</label>
            <select className="input" value={form.area_id||''} onChange={e=>setForm(p=>({...p,area_id:e.target.value||null}))}>
              <option value="">No area</option>
              {areas.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}
            </select>
          </div>
          <div className="field"><label className="label">Horizon</label>
            <select className="input" value={form.horizon||'active'} onChange={e=>setForm(p=>({...p,horizon:e.target.value}))}>
              <option value="critical">Critical — top focus, watched closely</option>
              <option value="active">Active — moving, needs a next action</option>
              <option value="maintenance">Maintenance — ticking over, low attention</option>
              <option value="someday">Someday — parked, won't nag you</option>
            </select>
          </div>
          <div className="row" style={{gap:8,marginBottom:14}}>
            <div style={{flex:1}}>
              <label className="label">Status</label>
              <select className="input" value={form.status||'active'} onChange={e=>setForm(p=>({...p,status:e.target.value}))}>
                <option value="active">Active</option>
                <option value="on_hold">On hold</option>
                <option value="complete">Complete</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div style={{flex:1}}>
              <label className="label">Priority</label>
              <select className="input" value={form.priority||'medium'} onChange={e=>setForm(p=>({...p,priority:e.target.value}))}>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
          </div>
          <div className="field"><label className="label">Due date</label><input className="input" type="date" value={form.due_date||''} onChange={e=>setForm(p=>({...p,due_date:e.target.value||null}))}/></div>
          <div className="field"><label className="label">Notes</label><textarea className="input" value={form.notes||''} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Any context or notes"/></div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={save}>Save project</button>
        </Modal>
      )}
    </div>
  );
}

// ── TASKS PAGE ────────────────────────────────────────────────
function TasksPage() {
  const [tasks, setTasks] = useState([]);
  const [waitingFor, setWaitingFor] = useState([]);
  const [areas, setAreas] = useState([]);
  const [projects, setProjects] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null);
  const [editing, setEditing] = useState(null);
  const [form, setForm] = useState({});
  const [tab, setTab] = useState('tasks');

  const load = async () => {
    const [t, w, a, p] = await Promise.all([
      supabase.from('tasks').select('*').neq('status','done').neq('status','cancelled').order('due_date', {ascending:true,nullsFirst:false}),
      supabase.from('waiting_for').select('*').eq('status','open').order('due_date',{ascending:true,nullsFirst:false}),
      supabase.from('areas').select('id,name,icon').order('sort_order'),
      supabase.from('projects').select('id,name').eq('status','active').order('name'),
    ]);
    setTasks(t.data||[]); setWaitingFor(w.data||[]); setAreas(a.data||[]); setProjects(p.data||[]); setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  const saveTask = async () => {
    if (!form.name) return;
    if (editing) await supabase.from('tasks').update(form).eq('id', editing.id);
    else await supabase.from('tasks').insert({...form, status:'todo', priority:form.priority||'medium'});
    setModal(null); setForm({}); setEditing(null); load();
  };

  const saveWaiting = async () => {
    if (!form.name) return;
    if (editing) await supabase.from('waiting_for').update(form).eq('id', editing.id);
    else await supabase.from('waiting_for').insert({...form, status:'open'});
    setModal(null); setForm({}); setEditing(null); load();
  };

  const completeTask = async (id, e) => {
    e.stopPropagation();
    await supabase.from('tasks').update({status:'done', completed_at: new Date().toISOString()}).eq('id', id);
    load();
  };

  const chaseWaiting = async (id, e) => {
    e.stopPropagation();
    await supabase.from('waiting_for').update({status:'chased', chased_at: new Date().toISOString()}).eq('id', id);
    load();
  };

  const areaMap = Object.fromEntries(areas.map(a=>[a.id,a]));
  const projMap = Object.fromEntries(projects.map(p=>[p.id,p]));

  if (loading) return <div className="spinner"/>;

  return (
    <div className="page">
      <div className="row-between" style={{marginBottom:12}}>
        <h1 style={{fontSize:20,fontWeight:700}}>Tasks</h1>
        <button className="btn btn-primary btn-sm" onClick={()=>{setEditing(null);setForm({priority:'medium',status:'todo'});setModal(tab==='tasks'?'task':'waiting');}}>
          <Icon name="plus" size={14}/> New
        </button>
      </div>

      <div style={{display:'flex',gap:6,marginBottom:16}}>
        <button className={`qc-type-btn ${tab==='tasks'?'active':''}`} onClick={()=>setTab('tasks')}>Tasks ({tasks.length})</button>
        <button className={`qc-type-btn ${tab==='waiting'?'active':''}`} onClick={()=>setTab('waiting')}>Waiting for ({waitingFor.length})</button>
      </div>

      {tab === 'tasks' && (
        <>
          {tasks.length === 0 && <div className="empty"><div className="empty-icon">✅</div>No open tasks</div>}
          {tasks.map(t => {
            const area = areaMap[t.area_id];
            const proj = projMap[t.project_id];
            return (
              <div key={t.id} className="card-sm" style={{cursor:'pointer'}} onClick={()=>{setEditing(t);setForm({...t});setModal('task');}}>
                <div className="row-between">
                  <div style={{flex:1,minWidth:0}}>
                    <div className="row" style={{gap:6,marginBottom:t.is_next_action?4:0}}>
                      {t.is_next_action && <span style={{color:'var(--accent)',fontSize:11,fontWeight:600}}>⚡ NEXT</span>}
                      <div className="name" style={{fontSize:13}}>{t.name}</div>
                    </div>
                    <div className="tag-row">
                      {priorityPill(t.priority)}
                      {area && <span className="pill pill-muted">{area.icon} {area.name}</span>}
                      {proj && <span className="pill pill-muted">📁 {proj.name}</span>}
                      {t.due_date && <span className={`pill ${isOverdue(t.due_date)?'pill-red':isDueSoon(t.due_date)?'pill-amber':'pill-muted'}`}>
                        {isOverdue(t.due_date)?'Overdue':'Due '}{fmtDate(t.due_date)}
                      </span>}
                    </div>
                  </div>
                  <button className="btn btn-ghost btn-sm btn-icon" style={{marginLeft:8,flexShrink:0,borderRadius:'50%'}} onClick={e=>completeTask(t.id,e)}>
                    <Icon name="check" size={14}/>
                  </button>
                </div>
              </div>
            );
          })}
        </>
      )}

      {tab === 'waiting' && (
        <>
          {waitingFor.length === 0 && <div className="empty"><div className="empty-icon">👥</div>Nothing waiting</div>}
          {waitingFor.map(w => {
            const area = areaMap[w.area_id];
            return (
              <div key={w.id} className="card-sm" style={{cursor:'pointer'}} onClick={()=>{setEditing(w);setForm({...w});setModal('waiting');}}>
                <div className="row-between">
                  <div style={{flex:1,minWidth:0}}>
                    <div className="name" style={{fontSize:13}}>{w.name}</div>
                    <div className="tag-row">
                      {w.waiting_on && <span className="pill pill-purple">👤 {w.waiting_on}</span>}
                      {area && <span className="pill pill-muted">{area.icon} {area.name}</span>}
                      {w.due_date && <span className={`pill ${isOverdue(w.due_date)?'pill-red':'pill-amber'}`}>Expected {fmtDate(w.due_date)}</span>}
                      {w.chased_at && <span className="pill pill-muted">Chased {fmtDate(w.chased_at)}</span>}
                    </div>
                  </div>
                  <button className="btn btn-ghost btn-sm" style={{marginLeft:8,flexShrink:0,fontSize:11}} onClick={e=>chaseWaiting(w.id,e)}>
                    Chase
                  </button>
                </div>
              </div>
            );
          })}
        </>
      )}

      {modal === 'task' && (
        <Modal title={editing?'Edit task':'New task'} onClose={()=>{setModal(null);setForm({});setEditing(null);}}>
          <div className="field"><label className="label">Task</label><input className="input" value={form.name||''} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="What needs doing?"/></div>
          <div className="field"><label className="label">Area</label>
            <select className="input" value={form.area_id||''} onChange={e=>setForm(p=>({...p,area_id:e.target.value||null}))}>
              <option value="">No area</option>
              {areas.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}
            </select>
          </div>
          <div className="field"><label className="label">Project</label>
            <select className="input" value={form.project_id||''} onChange={e=>setForm(p=>({...p,project_id:e.target.value||null}))}>
              <option value="">No project</option>
              {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
          <div className="row" style={{gap:8,marginBottom:14}}>
            <div style={{flex:1}}>
              <label className="label">Priority</label>
              <select className="input" value={form.priority||'medium'} onChange={e=>setForm(p=>({...p,priority:e.target.value}))}>
                <option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>
              </select>
            </div>
            <div style={{flex:1}}>
              <label className="label">Status</label>
              <select className="input" value={form.status||'todo'} onChange={e=>setForm(p=>({...p,status:e.target.value}))}>
                <option value="todo">To do</option><option value="in_progress">In progress</option><option value="done">Done</option><option value="cancelled">Cancelled</option>
              </select>
            </div>
          </div>
          <div className="field"><label className="label">Due date</label><input className="input" type="date" value={form.due_date||''} onChange={e=>setForm(p=>({...p,due_date:e.target.value||null}))}/></div>
          <div className="field" style={{display:'flex',alignItems:'center',gap:10}}>
            <input type="checkbox" id="isNext" checked={!!form.is_next_action} onChange={e=>setForm(p=>({...p,is_next_action:e.target.checked}))} style={{width:16,height:16}}/>
            <label htmlFor="isNext" style={{fontSize:13,color:'var(--text)'}}>⚡ Mark as next action</label>
          </div>
          <div className="field"><label className="label">Notes</label><textarea className="input" value={form.notes||''} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Any context"/></div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={saveTask}>Save task</button>
        </Modal>
      )}

      {modal === 'waiting' && (
        <Modal title={editing?'Edit waiting for':'New waiting for'} onClose={()=>{setModal(null);setForm({});setEditing(null);}}>
          <div className="field"><label className="label">What are you waiting for?</label><input className="input" value={form.name||''} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="e.g. Quote from plumber"/></div>
          <div className="field"><label className="label">Waiting on (person or org)</label><input className="input" value={form.waiting_on||''} onChange={e=>setForm(p=>({...p,waiting_on:e.target.value}))} placeholder="e.g. HMRC"/></div>
          <div className="field"><label className="label">Area</label>
            <select className="input" value={form.area_id||''} onChange={e=>setForm(p=>({...p,area_id:e.target.value||null}))}>
              <option value="">No area</option>
              {areas.map(a=><option key={a.id} value={a.id}>{a.icon} {a.name}</option>)}
            </select>
          </div>
          <div className="field"><label className="label">Expected by</label><input className="input" type="date" value={form.due_date||''} onChange={e=>setForm(p=>({...p,due_date:e.target.value||null}))}/></div>
          <div className="field"><label className="label">Notes</label><textarea className="input" value={form.notes||''} onChange={e=>setForm(p=>({...p,notes:e.target.value}))} placeholder="Any context"/></div>
          <button className="btn btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={saveWaiting}>Save</button>
        </Modal>
      )}
    </div>
  );
}

// ── SHARED REVIEW PROMPT BUILDER ──────────────────────────────
function buildReviewPrompt(data) {
  if (!data) return '';
  const overdue = data.tasks.filter(t=>isOverdue(t.due_date));
  const dueToday = data.tasks.filter(t=>t.due_date===data.today);
  const nextActions = data.tasks.filter(t=>t.is_next_action);
  const staleProjects = data.projects
    .filter(p=>['critical','active'].includes(p.horizon||'active'))
    .filter(p => !data.tasks.some(t=>t.project_id===p.id&&t.is_next_action));
  const staleDecisions = data.decisions.filter(d=>{
    const age = Math.floor((new Date(data.today)-new Date(d.created_at))/86400000);
    return age >= 7;
  });
  const urgentAssets = data.assets.filter(a=>isOverdue(a.expires_at)||isOverdue(a.mot_due_at)||isDueSoon(a.expires_at)||isDueSoon(a.mot_due_at)||isDueSoon(a.next_service_at));
  const critical = data.projects.filter(p=>p.horizon==='critical');

  return `# Lovejoy OS — Weekly Review Brief
Generated: ${new Date().toLocaleDateString('en-GB', {weekday:'long',day:'numeric',month:'long',year:'numeric'})}

## System snapshot
- Open tasks: ${data.tasks.length}
- Active projects: ${data.projects.length} (${critical.length} critical)
- Open waiting for: ${data.waiting.length}
- Open decisions: ${data.decisions.length}

## Critical projects (${critical.length})
${critical.length===0?'None flagged critical.':critical.map(p=>`- ${p.name}${p.description?`: ${p.description}`:''}`).join('\n')}

## Overdue tasks (${overdue.length})
${overdue.length===0?'None overdue.':overdue.map(t=>`- ${t.name}${t.due_date?` (was due ${fmtDate(t.due_date)})`:''}${t.notes?`\n  Context: ${t.notes}`:''}`).join('\n')}

## Due today (${dueToday.length})
${dueToday.length===0?'Nothing due today.':dueToday.map(t=>`- ${t.name}`).join('\n')}

## Next actions (${nextActions.length})
${nextActions.length===0?'No next actions flagged — consider reviewing your projects.':nextActions.map(t=>`- ${t.name}`).join('\n')}

## Critical/active projects with no next action (${staleProjects.length})
${staleProjects.length===0?'All active projects have a next action.':staleProjects.map(p=>`- ${p.name}${p.description?`: ${p.description}`:''}`).join('\n')}

## Open waiting for (${data.waiting.length})
${data.waiting.length===0?'Nothing outstanding.':data.waiting.map(w=>`- ${w.name}${w.waiting_on?` — waiting on ${w.waiting_on}`:''}${w.due_date?` (expected ${fmtDate(w.due_date)})`:''}`).join('\n')}

## Decisions open 7+ days (${staleDecisions.length})
${staleDecisions.length===0?'No stale decisions.':staleDecisions.map(d=>`- ${d.name}${d.context?`\n  Context: ${d.context}`:''}${d.options?`\n  Options: ${d.options}`:''}`).join('\n')}

## Asset alerts (${urgentAssets.length})
${urgentAssets.length===0?'No upcoming asset dates.':urgentAssets.map(a=>{
  const alerts=[];
  if(isOverdue(a.expires_at))alerts.push(`EXPIRED ${fmtDate(a.expires_at)}`);
  else if(isDueSoon(a.expires_at))alerts.push(`renews ${fmtDate(a.expires_at)}`);
  if(isOverdue(a.mot_due_at))alerts.push(`MOT OVERDUE`);
  else if(isDueSoon(a.mot_due_at))alerts.push(`MOT ${fmtDate(a.mot_due_at)}`);
  if(isDueSoon(a.next_service_at))alerts.push(`service ${fmtDate(a.next_service_at)}`);
  return `- ${a.name}: ${alerts.join(', ')}`;
}).join('\n')}

---
## Prompt for AI review

Please act as my personal Chief of Staff and help me with my weekly review. Using the data above:

1. What are the 3 most important things I should focus on this week?
2. What is at risk of slipping that I should address today?
3. Are there any decisions I should make now to unblock progress?
4. What can I safely ignore or defer this week?
5. Any patterns or concerns you notice in my system?

Be direct and practical. I want clear recommendations, not summaries of what I already know.`;
}

// ── ATTENTION ENGINE ──────────────────────────────────────────
// Pure function: takes system data, returns a ranked list of
// items that need attention, most urgent first.
const DECISION_STALE_DAYS = 7;          // configurable threshold
const CHASE_AFTER_DAYS = 0;             // waiting-for is chase-worthy once due
const DEADLINE_HORIZON_DAYS = 14;       // upcoming deadline window

function buildAttention(data) {
  const items = [];
  const today = data.today;

  // Horizons that the system actively manages. Maintenance/someday
  // projects are deliberately left alone — they should never nag.
  const activeHorizons = ['critical','active'];

  // 1. Overdue tasks — highest severity
  data.tasks.filter(t=>isOverdue(t.due_date)).forEach(t=>{
    const days = Math.abs(daysUntil(t.due_date));
    items.push({
      id:'task-'+t.id, kind:'Overdue task', name:t.name,
      detail:`Was due ${fmtDate(t.due_date)} · ${days} day${days!==1?'s':''} ago`,
      severity: 100 + days + (t.priority==='high'?20:t.priority==='medium'?10:0),
      colour:'var(--red)', goto:'tasks',
    });
  });

  // 2. Waiting For due for chase
  data.waiting.filter(w=>w.due_date && daysUntil(w.due_date) <= CHASE_AFTER_DAYS && !w.chased_at).forEach(w=>{
    const overdueChase = isOverdue(w.due_date);
    items.push({
      id:'wait-'+w.id, kind:'Chase needed', name:w.name,
      detail:`${w.waiting_on?`Waiting on ${w.waiting_on} · `:''}${overdueChase?'Past expected date':'Due today'}`,
      severity: 80 + (overdueChase?Math.abs(daysUntil(w.due_date)):0),
      colour:'var(--accent2)', goto:'tasks',
    });
  });

  // 3. Upcoming deadlines (tasks + projects + asset dates within window)
  data.tasks.filter(t=>{ const n=daysUntil(t.due_date); return n!==null && n>=0 && n<=DEADLINE_HORIZON_DAYS; }).forEach(t=>{
    const n = daysUntil(t.due_date);
    items.push({
      id:'due-'+t.id, kind:'Upcoming deadline', name:t.name,
      detail:`Due ${n===0?'today':n===1?'tomorrow':`in ${n} days`} · ${fmtDate(t.due_date)}`,
      severity: 60 - n + (t.priority==='high'?15:0),
      colour:'var(--amber)', goto:'tasks',
    });
  });
  data.assets.forEach(a=>{
    const checks = [
      {date:a.expires_at, label:'Renews'}, {date:a.mot_due_at, label:'MOT due'},
      {date:a.next_service_at, label:'Service due'}, {date:a.warranty_until, label:'Warranty ends'},
    ];
    checks.forEach(c=>{
      const n = daysUntil(c.date);
      if (c.date && (isOverdue(c.date) || (n>=0 && n<=DEADLINE_HORIZON_DAYS*2))) {
        items.push({
          id:`asset-${a.id}-${c.label}`, kind:'Asset date', name:a.name,
          detail:`${c.label} ${isOverdue(c.date)?`overdue (${fmtDate(c.date)})`:fmtDate(c.date)}`,
          severity: isOverdue(c.date) ? 85+Math.abs(n) : 55-Math.floor(n/2),
          colour: isOverdue(c.date)?'var(--red)':'var(--amber)', goto:'decisions',
        });
      }
    });
  });

  // 4. Critical/Active projects with no next action
  data.projects
    .filter(p=>activeHorizons.includes(p.horizon||'active'))
    .filter(p=>!data.tasks.some(t=>t.project_id===p.id && t.is_next_action))
    .forEach(p=>{
      items.push({
        id:'proj-'+p.id, kind:'No next action', name:p.name,
        detail:`${p.horizon==='critical'?'Critical':'Active'} project with nothing teed up`,
        severity: (p.horizon==='critical'?70:45),
        colour:'var(--amber)', goto:'projects',
      });
    });

  // 5. Open decisions older than threshold
  data.decisions.forEach(d=>{
    const age = Math.floor((new Date(today) - new Date(d.created_at)) / 86400000);
    if (age >= DECISION_STALE_DAYS) {
      items.push({
        id:'dec-'+d.id, kind:'Stale decision', name:d.name,
        detail:`Open for ${age} days · needs deciding`,
        severity: 50 + Math.min(age, 30),
        colour:'var(--accent)', goto:'decisions',
      });
    }
  });

  return items.sort((a,b)=>b.severity-a.severity);
}

// ── DASHBOARD ─────────────────────────────────────────────────
function DashboardPage({ user, onNavigate }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [showAll, setShowAll] = useState(false);
  const [copied, setCopied] = useState(false);

  const load = async () => {
    const today = new Date().toISOString().split('T')[0];
    const [tasks, waiting, decisions, projects, assets] = await Promise.all([
      supabase.from('tasks').select('*').neq('status','done').neq('status','cancelled'),
      supabase.from('waiting_for').select('*').eq('status','open'),
      supabase.from('decisions').select('*').eq('status','open'),
      supabase.from('projects').select('*').eq('status','active'),
      supabase.from('assets').select('*').eq('status','active'),
    ]);
    setData({ tasks:tasks.data||[], waiting:waiting.data||[], decisions:decisions.data||[], projects:projects.data||[], assets:assets.data||[], today });
    setLoading(false);
  };
  useEffect(()=>{ load(); },[]);

  const copyReview = () => {
    const prompt = buildReviewPrompt(data);
    navigator.clipboard.writeText(prompt);
    setCopied(true);
    setTimeout(()=>setCopied(false), 2500);
  };

  if (loading) return <div className="spinner"/>;

  const attention = buildAttention(data);
  const visible = showAll ? attention : attention.slice(0, 6);

  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';

  return (
    <div className="page">
      <div style={{marginBottom:18}}>
        <div style={{fontSize:13,color:'var(--muted)'}}>{greeting}</div>
        <div style={{fontSize:22,fontWeight:700,letterSpacing:'-0.5px'}}>Freddie</div>
      </div>

      {/* Weekly review button */}
      <button className="btn btn-ghost" style={{width:'100%',justifyContent:'center',marginBottom:18,padding:'11px'}} onClick={copyReview}>
        {copied ? '✓ Review brief copied' : '📋 Copy weekly review brief'}
      </button>

      {/* Attention Required */}
      <div className="row-between" style={{marginBottom:8}}>
        <div className="section-title" style={{margin:0}}>Attention required</div>
        {attention.length>0 && <span className="pill pill-muted">{attention.length}</span>}
      </div>

      {attention.length === 0 && (
        <div className="empty" style={{marginTop:12}}>
          <div className="empty-icon">✨</div>
          <div style={{color:'var(--text)',fontWeight:500}}>Nothing needs you right now</div>
          <div className="meta" style={{marginTop:4}}>Everything's on track. Good time to do focused work.</div>
        </div>
      )}

      {visible.map(item=>(
        <div key={item.id} className="card-sm" style={{borderLeft:`3px solid ${item.colour}`,cursor:'pointer'}} onClick={()=>onNavigate(item.goto)}>
          <div className="row-between">
            <div style={{flex:1,minWidth:0}}>
              <div className="row" style={{gap:6,marginBottom:2}}>
                <span style={{fontSize:10,fontWeight:600,color:item.colour,textTransform:'uppercase',letterSpacing:'0.05em'}}>{item.kind}</span>
              </div>
              <div className="name" style={{fontSize:13}}>{item.name}</div>
              <div className="meta">{item.detail}</div>
            </div>
            <Icon name="chevron" size={16} style={{color:'var(--muted)',flexShrink:0,marginLeft:8}}/>
          </div>
        </div>
      ))}

      {attention.length > 6 && (
        <button className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'center',marginTop:4}} onClick={()=>setShowAll(s=>!s)}>
          {showAll ? 'Show less' : `Show ${attention.length-6} more`}
        </button>
      )}

      {/* Waiting for summary (informational, not urgent) */}
      {data.waiting.length > 0 && (
        <div className="card" style={{marginTop:16,background:'rgba(124,92,252,0.06)',border:'1px solid rgba(124,92,252,0.2)'}}>
          <div style={{fontSize:12,color:'var(--muted)'}}>
            <strong style={{color:'var(--accent2)'}}>Also waiting for ({data.waiting.length})</strong>
            <div style={{marginTop:4}}>{data.waiting.slice(0,2).map(w=>`${w.name}${w.waiting_on?` — ${w.waiting_on}`:''}`).join(' · ')}{data.waiting.length>2?` · +${data.waiting.length-2} more`:''}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [checking, setChecking] = useState(true);
  const [page, setPage] = useState('dashboard');

  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null); setChecking(false);
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  if (checking) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100dvh'}}><div className="spinner"/></div>;
  if (!user) return <Login onLogin={setUser}/>;

  const navItems = [
    { id:'dashboard', label:'Dashboard', icon:'home' },
    { id:'projects',  label:'Projects',  icon:'folder' },
    { id:'tasks',     label:'Tasks',     icon:'check' },
    { id:'capture',   label:'Capture',   icon:'zap' },
    { id:'more',      label:'More',      icon:'layers' },
  ];

  const moreItems = [
    { id:'areas',     label:'Areas & Roles', icon:'layers' },
    { id:'decisions', label:'Decisions & Assets', icon:'box' },
    { id:'reviews',   label:'Weekly Review', icon:'clock' },
  ];

  const renderPage = () => {
    if (page==='dashboard') return <DashboardPage user={user} onNavigate={setPage}/>;
    if (page==='projects')  return <ProjectsPage/>;
    if (page==='tasks')     return <TasksPage/>;
    if (page==='capture')   return <QuickCapturePage/>;
    if (page==='areas')     return <AreasPage/>;
    if (page==='decisions') return <DecisionsAssetsPage/>;
    if (page==='reviews')   return <ReviewsPage/>;
    if (page==='more') return (
      <div className="page">
        <h1 style={{fontSize:20,fontWeight:700,marginBottom:16}}>More</h1>
        {moreItems.map(item=>(
          <div key={item.id} className="card" style={{cursor:'pointer',marginBottom:8}} onClick={()=>setPage(item.id)}>
            <div className="row-between">
              <div className="row" style={{gap:12}}>
                <div className="icon-area" style={{background:'var(--surface2)'}}><Icon name={item.icon} size={18}/></div>
                <div className="name">{item.label}</div>
              </div>
              <Icon name="chevron" size={16} style={{color:'var(--muted)'}}/>
            </div>
          </div>
        ))}
        <div className="divider" style={{margin:'24px 0 16px'}}/>
        <div className="card-sm" style={{cursor:'pointer'}} onClick={()=>supabase.auth.signOut()}>
          <div className="row" style={{gap:10,color:'var(--muted)'}}>
            <Icon name="logout" size={16}/><span style={{fontSize:14}}>Sign out</span>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-logo">Lovejoy OS</div>
        <div className="topbar-title">
          {page==='dashboard'?'Dashboard':page==='projects'?'Projects':page==='tasks'?'Tasks':page==='capture'?'Quick Capture':page==='areas'?'Areas & Roles':page==='decisions'?'Decisions & Assets':page==='reviews'?'Weekly Review':'More'}
        </div>
        <div className="topbar-user" onClick={()=>setPage('more')}>F</div>
      </div>
      <div className="main">
        {renderPage()}
      </div>
      <div className="bottomnav">
        {navItems.map(item=>(
          <button key={item.id} className={`nav-item ${page===item.id||(item.id==='more'&&['areas','decisions','reviews'].includes(page))?'active':''}`} onClick={()=>setPage(item.id)}>
            <Icon name={item.icon} size={22}/>
            <span>{item.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
